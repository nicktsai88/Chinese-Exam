        const playTone = (freq, type, duration) => {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) { }
        };

        const getPinyinDistractors = (correctPinyin) => {
            let set = new Set();
            
            // 處理多字注音 (例如 ㄎㄨㄟˊ ㄎㄨㄟˊ)
            if (correctPinyin.includes(' ')) {
                set.add(correctPinyin.replace(/ˊ/g, 'ˇ'));
                set.add(correctPinyin.replace(/ˋ/g, 'ˊ'));
                set.add(correctPinyin.replace(/ˇ/g, 'ˋ'));
                set.add(correctPinyin.replace(/˙/g, ' '));
                set.add(correctPinyin.replace(/ㄢ/g, 'ㄤ'));
                set.add(correctPinyin.replace(/ㄣ/g, 'ㄥ'));
            } else {
                // 單字注音處理
                const tones = ['', 'ˊ', 'ˇ', 'ˋ', '˙'];
                const currentToneMatch = correctPinyin.match(/[ˊˇˋ˙]/);
                const currentTone = currentToneMatch ? currentToneMatch[0] : '';
                const base = correctPinyin.replace(/[ˊˇˋ˙]/g, '');

                // 替換聲調
                tones.forEach(t => {
                    if (t !== currentTone) {
                        let fake = base + t;
                        if (t === '˙') fake = '˙' + base; // 輕聲要放前面
                        set.add(fake);
                    }
                });

                // 替換易混淆的聲母/韻母

                    ['ㄓ', 'ㄗ'], ['ㄔ', 'ㄘ'], ['ㄕ', 'ㄙ'],

                ];
                
                confusions.forEach(([a, b]) => {
                    if (base.includes(a)) {
                        set.add(base.replace(a, b) + currentTone);
                        set.add(base.replace(a, b) + (currentTone === 'ˋ' ? 'ˇ' : 'ˋ'));
                    } else if (base.includes(b)) {
                        set.add(base.replace(b, a) + currentTone);
                        set.add(base.replace(b, a) + (currentTone === 'ˋ' ? 'ˇ' : 'ˋ'));
                    }
                });
            }
            
            // 補足數量
            let arr = Array.from(set).filter(x => x !== correctPinyin && x.trim() !== '');
            if (arr.length < 3) {
                arr.push(correctPinyin + 'ㄧ');
                arr.push(correctPinyin + 'ㄨ');
                arr.push(correctPinyin + 'ㄚ');
            }
            
            return arr.sort(() => 0.5 - Math.random()).slice(0, 3);

                '箋': ['緘', '賤', '踐', '淺', '殘'],
                '膳': ['繕', '贍', '擅', '鱔', '禪'],
                '殷': ['段', '殿', '假', '毀', '毅'],
                '闔': ['閤', '閣', '閹', '閻', '闈'],
                '蒙款': ['矇款', '濛款', '朦款', '蒙欸', '家款'],
                '撥冗': ['撥穴', '拔冗', '潑冗', '發冗', '廢冗'],
                '竭': ['渴', '喝', '褐', '揭', '歇'],
                '軼': ['秩', '跌', '轍', '鐵', '帙'],
                '襲': ['壟', '龔', '襲', '聾', '寵'],
                '鷂': ['謠', '搖', '瑤', '遙', '繇'],
                '脩': ['修', '條', '倏', '悠', '攸'],
                '諡': ['謐', '溢', '鎰', '隘', '益'],
                '睨': ['蜺', '霓', '猊', '兒', '倪'],
                '酌': ['灼', '釣', '豹', '的', '杓'],
                '迪': ['迴', '迥', '迫', '迢', '迦'],
                '殄': ['珍', '診', '疹', '趁', '畛']
            };

            let set = new Set();
            if (confusingMap[correctChar]) {
                confusingMap[correctChar].forEach(c => set.add(c));
            }

            // 如果字典裡沒有或不夠，從同字數的國字中找出來充數
            if (set.size < 3) {
                const sameLengthItems = fullVocab.filter(d => d.type === '國字' && d.ans.length === correctChar.length && d.ans !== correctChar);
                const fallbacks = Array.from(new Set(sameLengthItems.map(d => d.ans))).sort(() => 0.5 - Math.random());
                for(let f of fallbacks) {
                    set.add(f);
                    if(set.size >= 3) break;
                }
            }

            return Array.from(set).filter(x => x !== correctChar).sort(() => 0.5 - Math.random()).slice(0, 3);
        };

        const generateCustomQuiz = (lessons, types, count) => {
            let pool = fullVocab.filter(item => (lessons.includes(item.lesson)) && (types.includes(item.type)));
            if(pool.length === 0) return [];

            pool = pool.sort(() => 0.5 - Math.random());
            if(count !== 'all') pool = pool.slice(0, parseInt(count, 10));

            return pool.map(item => {
                let distractors = [];
                
                // 套用智慧干擾選項生成
                if (item.type === '注音') {
                    distractors = getPinyinDistractors(item.ans);
                } else {
                    distractors = getCharDistractors(item.ans, fullVocab);
                }

                // 防呆，確保一定有3個干擾項
                while(distractors.length < 3) {
                    distractors.push(item.type === '國字' ? '缺' : 'ㄑㄩㄝ');
                }

                const opts = [item.ans, ...distractors].sort(() => 0.5 - Math.random());
                const ansIdx = opts.indexOf(item.ans);

                const questionText = item.type === '國字' 
                    ? `請問 ${item.q} ，引號中正確的「國字」為何？`
                    : `請問 ${item.q} ，引號中正確的「注音」為何？`;

                return {
                    id: item.id,
                    q: questionText,
                    opts: opts,
                    ans: ansIdx,
                    exp: `【正確答案】：<strong class="text-xl mx-2 text-emerald-600">${item.ans}</strong><br>完整寫法：${item.q.replace(/「.*?」/, `<span class="text-red-500 font-bold">${item.ans}</span>`)}`

                                    </div>
                                </div>

                                <div class="bg-gray-50 p-5 rounded-lg border border-gray-200">
                                    <h3 class="font-bold text-xl mb-3 text-gray-700">3. 題數設定</h3>
                                    <select id="qCount" class="w-full p-3 border-2 border-gray-300 rounded text-lg outline-none focus:border-red-500">
                                        <option value="10">10 題 (牛刀小試)</option>
                                        <option value="20" selected>20 題 (標準練習)</option>
                                        <option value="50">50 題 (魔王挑戰)</option>
                                        <option value="all">全部題庫 (極限挑戰)</option>
                                    </select>
                                </div>
                            </div>

                            <button onclick="startConfiguredQuiz()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-12 text-2xl rounded-lg shadow-lg transition transform hover:scale-[1.02]">產生考卷並開始</button>
                        </div>
                    </div>
                `;
            } else {
                renderAllQuestions(container);
            }
        };

        window.startConfiguredQuiz = () => {
            const typeCb = [el('qType-char'), el('qType-pinyin')];
            const types = typeCb.filter(cb => cb && cb.checked).map(cb => cb.value);
            
            const lessonCbs = document.querySelectorAll('input[name="qLesson"]:checked');
            const lessons = Array.from(lessonCbs).map(cb => cb.value);

            const count = el('qCount').value;

            if(types.length === 0) return customAlert("請至少選擇一種題型！");
            if(lessons.length === 0) return customAlert("請至少選擇一個範圍！");

            const qList = generateCustomQuiz(lessons, types, count);

            if(qList.length === 0) {
                return customAlert("在您選擇的範圍內找不到題目，請擴大範圍！");
            }

            quizState = { 
                active: true, 
                score: 0, 
                questions: qList, 
                userAnswers: new Array(qList.length).fill(null),
                answeredCount: 0
            };
            renderQuizView(el('main-content'));
        };

        window.getQuestionInnerHtml = (qIdx) => {
            const q = quizState.questions[qIdx];
            const userAns = quizState.userAnswers[qIdx];
            const isAnswered = userAns !== null;
            const isCorrect = isAnswered && (userAns === q.ans);

            let optionsHtml = '';
            q.opts.forEach((opt, i) => {
                let btnClass = "w-full text-left p-4 md:p-5 text-lg md:text-xl rounded-lg border-2 transition-all flex items-center group ";
                let iconHtml = `<span class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center mr-4 md:mr-5 font-bold text-lg md:text-xl transition-colors shrink-0">${String.fromCharCode(65+i)}</span>`;
                
                if (!isAnswered) {
                    btnClass += "border-gray-300 hover:border-red-400 hover:bg-red-50 cursor-pointer";
                } else {
                    btnClass += " cursor-default ";
                    if (i === q.ans) {
                        btnClass += "border-emerald-500 bg-emerald-100 text-emerald-800 font-bold shadow-sm";
                        iconHtml = `<span class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-emerald-500 text-white flex items-center justify-center mr-4 md:mr-5 font-bold text-lg md:text-xl shrink-0"><i class="fas fa-check"></i></span>`;
                    } else if (i === userAns) {
                        btnClass += "border-red-500 bg-red-50 text-red-800 font-bold";
                        iconHtml = `<span class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-red-500 text-white flex items-center justify-center mr-4 md:mr-5 font-bold text-lg md:text-xl shrink-0"><i class="fas fa-times"></i></span>`;
                    } else {
                        btnClass += "border-gray-200 bg-gray-50 opacity-50";
                    }
                }

                optionsHtml += `
                    <button ${isAnswered ? 'disabled' : `onclick="answerQuestion(${qIdx}, ${i})"`} class="${btnClass}">
                        ${iconHtml}
                        <span class="text-xl md:text-2xl font-medium">${opt}</span>
                    </button>
                `;
            });

            return `
                <div class="bg-gray-50 px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                    <span class="font-bold text-gray-600 text-lg">第 ${qIdx + 1} 題</span>
                    ${isAnswered ? (isCorrect ? '<span class="text-emerald-600 font-bold"><i class="fas fa-check-circle mr-1"></i> 答對</span>' : '<span class="text-red-600 font-bold"><i class="fas fa-times-circle mr-1"></i> 答錯</span>') : '<span class="text-gray-400"><i class="fas fa-edit mr-1"></i> 未作答</span>'}
                </div>
                <div class="p-6 md:p-8">
                    <h3 class="text-xl md:text-2xl font-bold text-gray-800 mb-6 leading-relaxed">${q.q}</h3>
                    <div class="space-y-3 md:space-y-4">
                        ${optionsHtml}
                    </div>
                    
                    ${isAnswered ? `
                        <div class="mt-6 p-5 rounded-xl border ${isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'} animate-fade-in shadow-inner">
                            <p class="font-bold mb-2 text-lg border-b pb-2 ${isCorrect ? 'text-emerald-800 border-emerald-200' : 'text-red-800 border-red-200'}"><i class="fas fa-lightbulb text-yellow-500 mr-2"></i> 解析：</p>
                            <div class="text-gray-700 leading-relaxed text-base md:text-lg mt-3">
                                ${q.exp}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        };

        const renderAllQuestions = (container) => {
            const progress = (quizState.answeredCount / quizState.questions.length) * 100;
            
            let html = `
                <div class="w-full flex flex-col items-center p-4 md:p-6 overflow-y-auto relative pb-32">
                    <!-- 浮動進度標頭 -->
                    <div class="sticky top-0 w-full max-w-4xl bg-white rounded-xl shadow-md border border-gray-100 mb-6 z-20">
                        <div class="bg-red-50 px-6 py-4 border-b border-red-100 flex justify-between items-center rounded-t-xl">
                            <span class="font-bold text-red-800 text-lg md:text-xl">作答進度：<span id="quiz-progress-text">${quizState.answeredCount} / ${quizState.questions.length}</span></span>
                            <div class="w-1/2 bg-gray-200 rounded-full h-3">
                                <div id="quiz-progress-bar" class="bg-red-500 h-3 rounded-full transition-all duration-300" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        <div class="px-6 py-3 flex justify-between items-center">
                            <span class="text-gray-600 font-bold text-lg">目前得分：<span id="quiz-score-text" class="text-emerald-600">${quizState.score}</span></span>
                            <button onclick="finishQuiz()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg shadow transition">提早交卷</button>
                        </div>
                    </div>

                    <!-- 瀑布流題目區 -->
                    <div class="w-full max-w-4xl space-y-6">
                        ${quizState.questions.map((q, i) => `
                            <div id="q-card-${i}" class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 scroll-mt-32">
                                ${getQuestionInnerHtml(i)}
                            </div>
                        `).join('')}
                    </div>
                    
                    <!-- 底部完成按鈕 -->
                    <div id="finish-btn-container" class="mt-10">
                        ${quizState.answeredCount === quizState.questions.length ? `
                            <button onclick="finishQuiz()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-12 text-2xl rounded-full shadow-lg transition transform hover:scale-105 animate-fade-in">完成測驗，看成績！</button>
                        ` : ''}
                    </div>
                </div>
            `;
            container.innerHTML = html;
        };

        window.answerQuestion = (qIdx, optIdx) => {
            // 防止重複作答
            if (quizState.userAnswers[qIdx] !== null) return;

            const q = quizState.questions[qIdx];
            const isCorrect = optIdx === q.ans;
            
            quizState.userAnswers[qIdx] = optIdx;
            quizState.answeredCount++;
            
            if (isCorrect) {
                quizState.score++;
                playCorrectSound();
                // 答對時噴灑少量彩帶慶祝
                confetti({
                    particleCount: 30,
                    spread: 50,
                    origin: { y: 0.8 },
                    colors: ['#34d399', '#fbbf24']
                });
            } else {
                playWrongSound();
                // 記錄錯題
                const mistakeId = q.id;
                const exists = userData.mistakes.find(m => m.id === mistakeId);
                if(!exists) {
                    userData.mistakes.push({
                        id: mistakeId,
                        q: q.q,
                        opts: q.opts,
                        ans: q.ans,
                        exp: q.exp,
                        time: new Date().toISOString()
                    });
                    saveUserData();
                }
            }

            // 只更新該題的 HTML，不重洗整個畫面以保留捲動位置
            const card = document.getElementById(`q-card-${qIdx}`);
            if (card) {
                card.innerHTML = getQuestionInnerHtml(qIdx);
            }

            // 更新頂部狀態列
            const progressText = document.getElementById('quiz-progress-text');
            const progressBar = document.getElementById('quiz-progress-bar');
            const scoreText = document.getElementById('quiz-score-text');
            
            if(progressText) progressText.innerText = `${quizState.answeredCount} / ${quizState.questions.length}`;
            if(progressBar) progressBar.style.width = `${(quizState.answeredCount / quizState.questions.length) * 100}%`;
            if(scoreText) scoreText.innerText = quizState.score;

            // 若全部答完，在底部顯示結束按鈕
            if (quizState.answeredCount === quizState.questions.length) {
                const btnContainer = document.getElementById('finish-btn-container');
                if (btnContainer) {
                    btnContainer.innerHTML = `<button onclick="finishQuiz()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-12 text-2xl rounded-full shadow-lg transition transform hover:scale-105 animate-fade-in">完成測驗，看成績！</button>`;
                }
            }
        };

        window.finishQuiz = async () => {
            const total = quizState.questions.length;
            const answered = quizState.answeredCount;
            
            if (answered < total) {
                const confirmFinish = await customConfirm(`您還有 ${total - answered} 題未作答，確定要提早交卷嗎？\n(未作答將視為錯誤)`);
                if (!confirmFinish) return;
            }

            quizState.active = false;
            const finalScore = Math.round((quizState.score / total) * 100);
            
            if(isFirebaseInitialized && currentUser && username) {
                const docRef = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME + '_quizzes_' + username));
                try {
                    await setDoc(docRef, { score: finalScore, date: new Date(), total, answered, username });
                } catch(e) { }
            }

            const container = el('main-content');
            container.innerHTML = `
                <div class="w-full flex items-center justify-center p-6 overflow-y-auto mt-10 animate-fade-in">
                    <div class="bg-white p-12 rounded-xl shadow-xl text-center max-w-2xl border-t-8 border-blue-600 w-full">
                        <i class="fas fa-trophy text-8xl text-yellow-500 mb-6"></i>
                        <h2 class="text-4xl font-bold mb-4">測驗完成！</h2>
                        <p class="text-7xl font-extrabold text-blue-600 mb-8">${finalScore} <span class="text-3xl text-gray-500">分</span></p>
                        <p class="text-gray-600 mb-8 text-2xl">共 ${total} 題，作答 ${answered} 題，答對了 <span class="text-blue-600 font-bold">${quizState.score}</span> 題。</p>
                        <div class="space-y-4">
                            <button onclick="switchTab('mistakes')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 text-xl rounded-lg shadow transition">查看錯題本進行訂正</button>
                            <button onclick="switchTab('quiz')" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 px-6 text-xl rounded-lg shadow transition">再挑戰一次</button>
                        </div>
                    </div>
                </div>
            `;
            
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.5 },
                colors: ['#34d399', '#fbbf24', '#f87171', '#3b82f6']
            });
        };

        // --- 錯題本 ---
        window.renderMistakes = (container) => {
            if(!container) container = el('main-content');
            
            if(userData.mistakes.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex items-center justify-center p-6 text-gray-400 flex-col mt-20 animate-fade-in">
                        <i class="fas fa-check-circle text-8xl mb-6 text-emerald-200"></i>
                        <p class="text-2xl font-bold">太棒了！目前沒有錯題紀錄。</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full p-6 md:p-10 overflow-y-auto animate-fade-in">
                    <div class="max-w-4xl mx-auto">
                        <div class="flex justify-between items-center border-b-4 border-red-200 pb-4 mb-8">
                            <h2 class="text-3xl font-bold text-red-800"><i class="fas fa-book-dead mr-3"></i>錯題本</h2>
                            <button onclick="clearMistakes()" class="text-lg text-red-500 hover:text-red-700 font-bold underline">清空錯題</button>
                        </div>
                        <div class="space-y-6">
                            ${userData.mistakes.map((m, i) => `
                                <div class="bg-white p-6 md:p-8 rounded-xl shadow-md border-l-8 border-red-400">
                                    <h3 class="font-bold text-gray-800 mb-5 text-xl md:text-2xl">${i+1}. ${m.q}</h3>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-lg mb-6">
                                        ${m.opts.map((opt, idx) => `
                                            <div class="p-3 rounded-lg ${idx === m.ans ? 'bg-emerald-100 text-emerald-800 font-bold border-2 border-emerald-300 shadow-sm' : 'bg-gray-50 text-gray-500 border border-gray-200'}">
                                                ${String.fromCharCode(65+idx)}. ${opt}
                                                ${idx === m.ans ? '<i class="fas fa-check ml-2"></i>(正確答案)' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                    <div class="bg-gray-50 p-5 rounded-lg border border-gray-200 text-lg text-gray-700 leading-relaxed">
                                        ${m.exp}
                                    </div>
                                </div>
                            `).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.clearMistakes = async () => {
            const confirmClear = await customConfirm('確定要清空所有錯題紀錄嗎？');
            if(confirmClear) {
                userData.mistakes = [];
                saveUserData();
                renderMistakes();
            }
        };

        // --- 我的最愛 ---
        window.renderFavorites = (container) => {
            if(!container) container = el('main-content');
            
            if(userData.favorites.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex items-center justify-center p-6 text-gray-400 flex-col mt-20 animate-fade-in">
                        <i class="fas fa-heart-broken text-8xl mb-6 text-pink-200"></i>
                        <p class="text-2xl font-bold">目前還沒有收藏任何項目。</p>
                        <p class="text-lg mt-3">到「單字總覽」點擊愛心圖示即可收藏單字！</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full p-6 md:p-10 overflow-y-auto animate-fade-in">
                    <div class="max-w-5xl mx-auto">
                        <h2 class="text-3xl font-bold text-pink-800 border-b-4 border-pink-200 pb-4 mb-8"><i class="fas fa-heart mr-3"></i>我的最愛 (單字收藏)</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            ${userData.favorites.map(favId => `
                                <div class="bg-white p-6 rounded-xl shadow-md border-2 border-pink-100 flex justify-between items-center group relative overflow-hidden transition-shadow hover:shadow-lg">
                                    <div class="absolute inset-0 bg-pink-50 transform translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                                    <span class="font-bold text-gray-800 z-10 text-xl md:text-2xl">${favId}</span>
                                    <button onclick="toggleFavorite('${favId}')" class="text-pink-500 hover:text-red-600 z-10 text-3xl"><i class="fas fa-heart"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        initApp();

    </script>
</body>
</html>
