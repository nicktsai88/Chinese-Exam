            });

        const playTone = (freq, type, duration) => {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) { }
        };

        //  測驗題庫生成引擎 (動態產生干擾選項)
        // ==========================================
        const generateCustomQuiz = (lessons, types, count) => {
            // 1. 根據條件篩選題庫
            let pool = fullVocab.filter(item => 
                (lessons.includes(item.lesson)) && 
                (types.includes(item.type))
            );

            if(pool.length === 0) return [];

            // 2. 打亂並取指定數量
            pool = pool.sort(() => 0.5 - Math.random());
            if(count !== 'all') {
                pool = pool.slice(0, parseInt(count, 10));
            }

            // 3. 為每一題動態產生三個同類別(國字/注音)的假選項
            return pool.map(item => {
                const sameTypeItems = fullVocab.filter(d => d.type === item.type && d.ans !== item.ans);
                // 取得唯一不重複的假答案庫
                const distractorSet = new Set(sameTypeItems.map(d => d.ans));
                const distractors = Array.from(distractorSet).sort(() => 0.5 - Math.random()).slice(0, 3);
                
                // 萬一假答案不夠 (雖然現有資料量夠大不可能發生)，提供備用值
                while(distractors.length < 3) {
                    distractors.push(item.type === '國字' ? '缺' : 'ㄑㄩㄝ');
                }

                // 組合四個選項並打亂
                const opts = [item.ans, ...distractors].sort(() => 0.5 - Math.random());
                const ansIdx = opts.indexOf(item.ans);

                const questionText = item.type === '國字' 
                    ? `請問 ${item.q} ，引號中正確的「國字」為何？`
                    : `請問 ${item.q} ，引號中正確的「注音」為何？`;

                return {
                    id: item.id,
                    q: questionText,
                    opts: opts,
                    ans: ansIdx,
                    exp: `【正確答案】：<strong class="text-xl mx-2">${item.ans}</strong><br>完整詞語寫法：${item.q} -> ${item.ans}`
                };
            });
        };

            if(tab === 'quiz') renderQuizView(content);
            if(tab === 'mistakes') renderMistakes(content);
            if(tab === 'favorites') renderFavorites(content);
        };

        // --- 單字總覽 (重點精華) ---
        const renderLearnView = (container) => {
            const currentCat = learnCategories.find(c => c.id === learnSubTab);
            container.innerHTML = `
                <div class="w-full bg-amber-50 border-b border-amber-200 p-4 flex items-center shadow-sm z-10 shrink-0">
                    <button onclick="toggleLearnMenu(true)" class="text-amber-800 hover:text-amber-600 focus:outline-none flex items-center px-4 py-2 bg-white rounded border border-amber-300 shadow-sm mr-4 transition-colors">
                        <i class="fas fa-bars text-2xl mr-3"></i>
                        <span class="font-bold text-xl hidden sm:inline">分類選單</span>
                    </button>
                    <span class="font-bold text-xl md:text-2xl text-wood-dark truncate" id="current-learn-title">${currentCat ? currentCat.title : ''}</span>
                </div>
                <div id="learn-overlay" onclick="toggleLearnMenu(false)" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden transition-opacity"></div>
                <div id="learn-drawer" class="fixed inset-y-0 left-0 w-[22rem] bg-gray-50 border-r border-gray-200 z-40 transform -translate-x-full transition-transform duration-300 ease-in-out overflow-y-auto shadow-2xl flex flex-col">
                    <div class="p-6 bg-amber-100 flex justify-between items-center border-b border-amber-200 shrink-0">
                        <span class="font-bold text-2xl text-amber-900"><i class="fas fa-list-ul mr-3"></i>單元目錄</span>
                        <button onclick="toggleLearnMenu(false)" class="text-amber-800 hover:text-red-600 transition-colors"><i class="fas fa-times text-3xl"></i></button>
                    </div>
                    <ul class="py-4 flex-1">
                        ${learnCategories.map(c => `
                            <li>
                                <button onclick="selectLearnTab('${c.id}')" id="ltab-${c.id}" class="w-full text-left px-8 py-5 text-xl font-bold hover:bg-amber-100 transition-colors ${learnSubTab === c.id ? 'bg-amber-100 text-amber-800 border-l-8 border-amber-600' : 'text-gray-600 border-l-8 border-transparent'}">
                                    ${c.title}
                                </button>
                            </li>
                        `).join('')}
                    </ul>
                </div>
                <div class="flex-1 p-6 md:p-10 overflow-y-auto" id="learn-content-area"></div>
            `;
            renderLearnContent();
        };

        window.selectLearnTab = (id) => {
            learnSubTab = id;
            const cat = learnCategories.find(c => c.id === id);
            const titleEl = el('current-learn-title');
            if(titleEl && cat) titleEl.innerText = cat.title;

            learnCategories.forEach(c => {
                const btn = el(`ltab-${c.id}`);
                if(btn) {
                    if(c.id === id) {
                        btn.classList.add('bg-amber-100', 'text-amber-800', 'border-l-8', 'border-amber-600');
                        btn.classList.remove('text-gray-600', 'border-transparent');
                    } else {
                        btn.classList.remove('bg-amber-100', 'text-amber-800', 'border-l-8', 'border-amber-600');
                        btn.classList.add('text-gray-600', 'border-transparent');
                    }
                }
            });
            renderLearnContent();
            toggleLearnMenu(false);
        };

        window.renderLearnContent = () => {
            const area = el('learn-content-area');
            if(!area) return;
            
            const chars = fullVocab.filter(v => v.lesson === learnSubTab && v.type === '國字');
            const pinyins = fullVocab.filter(v => v.lesson === learnSubTab && v.type === '注音');

            const createTable = (items, typeName) => {
                if(items.length === 0) return '';
                return `
                    <div class="bg-white p-6 rounded shadow-sm border-t-4 ${typeName === '國字' ? 'border-indigo-500' : 'border-teal-500'} mb-8">
                        <h3 class="font-bold text-2xl ${typeName === '國字' ? 'text-indigo-800' : 'text-teal-800'} mb-4">${typeName}練習</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            ${items.map(v => {
                                const isFav = userData.favorites.includes(v.id);
                                return `
                                    <div class="border border-gray-200 rounded p-4 flex justify-between items-center bg-gray-50 hover:bg-gray-100 transition">
                                        <div class="text-lg">
                                            <span class="font-medium text-gray-600">${v.q} -> </span>
                                            <strong class="text-xl ${typeName === '國字' ? 'text-indigo-600' : 'text-teal-600'} ml-1">${v.ans}</strong>
                                        </div>
                                        <button onclick="toggleFavorite('${v.id}')" class="fav-btn text-2xl transition-transform hover:scale-110 ml-2 ${isFav ? 'text-red-500' : 'text-gray-300 hover:text-red-400'}" data-id="${v.id}">
                                            <i class="fas fa-heart"></i>
                                        </button>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            };

            area.innerHTML = `
                <div class="max-w-7xl mx-auto animate-fade-in">
                    ${createTable(chars, '國字')}
                    ${createTable(pinyins, '注音')}
                </div>
            `;
        };

        // --- 測驗中心 (自訂題庫) ---
        const renderQuizView = (container) => {
            if(!quizState.active) {
                container.innerHTML = `
                    <div class="w-full flex items-center justify-center p-6 mt-10">
                        <div class="bg-white p-10 rounded-xl shadow-md text-center max-w-3xl border-t-8 border-red-600 w-full animate-fade-in">
                            <i class="fas fa-sliders-h text-6xl text-red-600 mb-6"></i>
                            <h2 class="text-3xl font-bold mb-6">自訂測驗中心</h2>
                            
                            <div class="text-left space-y-6 mb-8">
                                <div class="bg-gray-50 p-5 rounded-lg border border-gray-200">
                                    <h3 class="font-bold text-xl mb-3 text-gray-700">1. 選擇題型 (可複選)</h3>
                                    <div class="flex gap-6 text-lg">
                                        <label class="flex items-center cursor-pointer">
                                            <input type="checkbox" id="qType-char" value="國字" checked class="w-6 h-6 text-red-600 rounded mr-2"> 國字測驗
                                        </label>
                                        <label class="flex items-center cursor-pointer">
                                            <input type="checkbox" id="qType-pinyin" value="注音" checked class="w-6 h-6 text-red-600 rounded mr-2"> 注音測驗
                                        </label>
                                    </div>
                                </div>

                                <div class="bg-gray-50 p-5 rounded-lg border border-gray-200">
                                    <h3 class="font-bold text-xl mb-3 text-gray-700">2. 選擇範圍 (可複選)</h3>
                                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4 text-lg">
                                        ${learnCategories.map(c => `
                                            <label class="flex items-center cursor-pointer">
                                                <input type="checkbox" name="qLesson" value="${c.id}" checked class="w-6 h-6 text-red-600 rounded mr-2"> ${c.id}
                                            </label>
                                        `).join('')}
                                    </div>
                                </div>

                                <div class="bg-gray-50 p-5 rounded-lg border border-gray-200">
                                    <h3 class="font-bold text-xl mb-3 text-gray-700">3. 題數設定</h3>
                                    <select id="qCount" class="w-full p-3 border-2 border-gray-300 rounded text-lg outline-none focus:border-red-500">
                                        <option value="10">10 題 (牛刀小試)</option>
                                        <option value="20" selected>20 題 (標準練習)</option>
                                        <option value="50">50 題 (魔王挑戰)</option>
                                        <option value="all">全部題庫 (極限挑戰)</option>
                                    </select>
                                </div>
                            </div>

                            <button onclick="startConfiguredQuiz()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-12 text-2xl rounded-lg shadow-lg transition transform hover:scale-[1.02]">產生考卷並開始</button>
                        </div>
                    </div>
                `;
            } else {
                renderQuizQuestion(container);
            }
        };

        window.startConfiguredQuiz = () => {
            const typeCb = [el('qType-char'), el('qType-pinyin')];
            const types = typeCb.filter(cb => cb && cb.checked).map(cb => cb.value);
            
            const lessonCbs = document.querySelectorAll('input[name="qLesson"]:checked');
            const lessons = Array.from(lessonCbs).map(cb => cb.value);

            const count = el('qCount').value;

            if(types.length === 0) return customAlert("請至少選擇一種題型！");
            if(lessons.length === 0) return customAlert("請至少選擇一個範圍！");

            const qList = generateCustomQuiz(lessons, types, count);

            if(qList.length === 0) {
                return customAlert("在您選擇的範圍內找不到題目，請擴大範圍！");
            }

            quizState = { active: true, currentQ: 0, score: 0, answers: [], questions: qList, showExplanation: false, selectedAns: null };
            renderQuizView(el('main-content'));
        };

        const renderQuizQuestion = (container) => {
            const qIdx = quizState.currentQ;
            if(qIdx >= quizState.questions.length) {
                finishQuiz(container);
                return;
            }
            
            const q = quizState.questions[qIdx];
            const progress = ((qIdx) / quizState.questions.length) * 100;

            let optionsHtml = '';
            q.opts.forEach((opt, i) => {
                let btnClass = "w-full text-left p-5 text-xl rounded-lg border-2 transition-all flex items-center group ";
                let iconHtml = `<span class="w-10 h-10 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center mr-5 font-bold text-xl transition-colors shrink-0">${String.fromCharCode(65+i)}</span>`;
                
                if (!quizState.showExplanation) {
                    btnClass += "border-gray-300 hover:border-red-400 hover:bg-red-50 group-hover:bg-red-500 group-hover:text-white";
                } else {
                    if (i === q.ans) {
                        btnClass += "border-emerald-500 bg-emerald-100 text-emerald-800 font-bold scale-100 shadow-md";
                        iconHtml = `<span class="w-10 h-10 rounded-full bg-emerald-500 text-white flex items-center justify-center mr-5 font-bold text-xl shrink-0"><i class="fas fa-check"></i></span>`;
                    } else if (i === quizState.selectedAns) {
                        btnClass += "border-red-500 bg-red-50 text-red-800 font-bold scale-[0.98]";
                        iconHtml = `<span class="w-10 h-10 rounded-full bg-red-500 text-white flex items-center justify-center mr-5 font-bold text-xl shrink-0"><i class="fas fa-times"></i></span>`;
                    } else {
                        btnClass += "border-gray-200 bg-gray-50 opacity-50";
                    }
                }

                optionsHtml += `
                    <button ${quizState.showExplanation ? 'disabled' : `onclick="answerQuestion(${i})"`} class="${btnClass}">
                        ${iconHtml}
                        <span class="text-2xl font-medium">${opt}</span>
                    </button>
                `;
            });

            container.innerHTML = `
                <div class="w-full flex flex-col items-center p-4 md:p-10 overflow-y-auto">
                    <div class="w-full max-w-4xl bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100 animate-fade-in">
                        <div class="bg-red-50 px-8 py-5 border-b border-red-100 flex justify-between items-center">
                            <span class="font-bold text-red-800 text-xl">測驗 第 ${qIdx + 1} / ${quizState.questions.length} 題</span>
                            <div class="w-1/2 bg-gray-200 rounded-full h-3">
                                <div class="bg-red-500 h-3 rounded-full transition-all duration-300" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        <div class="p-6 md:p-12">
                            <h3 class="text-2xl md:text-3xl font-bold text-gray-800 mb-8 leading-relaxed">${q.q}</h3>
                            <div class="space-y-4">
                                ${optionsHtml}
                            </div>
                            
                            ${quizState.showExplanation ? `
                                <div class="mt-8 p-6 rounded-xl border-2 ${quizState.selectedAns === q.ans ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'} animate-fade-in shadow-inner">
                                    <div class="flex items-center mb-4">
                                        <i class="fas ${quizState.selectedAns === q.ans ? 'fa-check-circle text-emerald-500' : 'fa-times-circle text-red-500'} text-3xl mr-3"></i>
                                        <span class="font-bold text-2xl">${quizState.selectedAns === q.ans ? '答對了，非常棒！' : '哎呀，選錯了！'}</span>
                                    </div>
                                    <div class="bg-white p-6 rounded-lg border ${quizState.selectedAns === q.ans ? 'border-emerald-100' : 'border-red-100'}">
                                        <div class="bg-gray-50 p-5 rounded-lg border border-gray-200 text-lg text-gray-700 leading-relaxed shadow-sm">
                                            ${q.exp}
                                        </div>
                                    </div>
                                    <button onclick="nextQuestion()" class="mt-6 w-full ${quizState.selectedAns === q.ans ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-red-600 hover:bg-red-700'} text-white font-bold py-4 text-xl rounded-lg shadow-md transition transform hover:scale-[1.02]">下一題 <i class="fas fa-arrow-right ml-2"></i></button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        };

        window.answerQuestion = (optIdx) => {
            const q = quizState.questions[quizState.currentQ];
            const isCorrect = optIdx === q.ans;
            
            quizState.selectedAns = optIdx;
            quizState.showExplanation = true;
            
            if (isCorrect) {
                playCorrectSound();
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#34d399', '#fbbf24', '#f87171', '#3b82f6']
                });
            } else {
                playWrongSound();
            }

            renderQuizView(el('main-content'));
        };

        window.nextQuestion = () => {
            const q = quizState.questions[quizState.currentQ];
            const isCorrect = quizState.selectedAns === q.ans;

            quizState.answers.push({
                q: q.q,
                opts: q.opts,
                userAns: quizState.selectedAns,
                correctAns: q.ans,
                isCorrect: isCorrect
            });

            if(isCorrect) quizState.score++;
            
            if(!isCorrect) {
                const mistakeId = q.id;
                const exists = userData.mistakes.find(m => m.id === mistakeId);
                if(!exists) {
                    userData.mistakes.push({
                        id: mistakeId,
                        q: q.q,
                        opts: q.opts,
                        ans: q.ans,
                        exp: q.exp,
                        time: new Date().toISOString()
                    });
                    saveUserData();
                }
            }

            quizState.currentQ++;
            quizState.showExplanation = false;
            quizState.selectedAns = null;
            renderQuizView(el('main-content'));
        };

        const finishQuiz = async (container) => {
            quizState.active = false;
            const total = quizState.questions.length;
            const score = Math.round((quizState.score / total) * 100);
            
            if(isFirebaseInitialized && currentUser && username) {
                const docRef = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME + '_quizzes_' + username));
                try {
                    await setDoc(docRef, { score, date: new Date(), total, username });
                } catch(e) { }
            }

            container.innerHTML = `
                <div class="w-full flex items-center justify-center p-6 overflow-y-auto mt-10">
                    <div class="bg-white p-12 rounded-xl shadow-xl text-center max-w-2xl border-t-8 border-blue-600 animate-fade-in w-full">
                        <i class="fas fa-trophy text-8xl text-yellow-500 mb-6"></i>
                        <h2 class="text-4xl font-bold mb-4">測驗完成！</h2>
                        <p class="text-7xl font-extrabold text-blue-600 mb-8">${score} <span class="text-3xl text-gray-500">分</span></p>
                        <p class="text-gray-600 mb-8 text-2xl">您答對了 <span class="text-blue-600 font-bold">${quizState.score}</span> 題，共 ${total} 題。</p>
                        <div class="space-y-4">
                            <button onclick="switchTab('mistakes')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 text-xl rounded-lg shadow transition">查看錯題本進行訂正</button>
                            <button onclick="switchTab('quiz')" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 px-6 text-xl rounded-lg shadow transition">再挑戰一次</button>
                        </div>
                    </div>
                </div>
            `;
        };

        // --- 錯題本 ---
        window.renderMistakes = (container) => {
            if(!container) container = el('main-content');
            
            if(userData.mistakes.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex items-center justify-center p-6 text-gray-400 flex-col mt-20 animate-fade-in">
                        <i class="fas fa-check-circle text-8xl mb-6 text-emerald-200"></i>
                        <p class="text-2xl font-bold">太棒了！目前沒有錯題紀錄。</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full p-6 md:p-10 overflow-y-auto animate-fade-in">
                    <div class="max-w-4xl mx-auto">
                        <div class="flex justify-between items-center border-b-4 border-red-200 pb-4 mb-8">
                            <h2 class="text-3xl font-bold text-red-800"><i class="fas fa-book-dead mr-3"></i>錯題本</h2>
                            <button onclick="clearMistakes()" class="text-lg text-red-500 hover:text-red-700 font-bold underline">清空錯題</button>
                        </div>
                        <div class="space-y-6">
                            ${userData.mistakes.map((m, i) => `
                                <div class="bg-white p-6 md:p-8 rounded-xl shadow-md border-l-8 border-red-400">
                                    <h3 class="font-bold text-gray-800 mb-5 text-xl md:text-2xl">${i+1}. ${m.q}</h3>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-lg mb-6">
                                        ${m.opts.map((opt, idx) => `
                                            <div class="p-3 rounded-lg ${idx === m.ans ? 'bg-emerald-100 text-emerald-800 font-bold border-2 border-emerald-300 shadow-sm' : 'bg-gray-50 text-gray-500 border border-gray-200'}">
                                                ${String.fromCharCode(65+idx)}. ${opt}
                                                ${idx === m.ans ? '<i class="fas fa-check ml-2"></i>(正確答案)' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                    <div class="bg-gray-50 p-5 rounded-lg border border-gray-200 text-lg text-gray-700 leading-relaxed">
                                        ${m.exp}
                                    </div>
                                </div>
                            `).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.clearMistakes = async () => {
            const confirmClear = await customConfirm('確定要清空所有錯題紀錄嗎？');
            if(confirmClear) {
                userData.mistakes = [];
                saveUserData();
                renderMistakes();
            }
        };

        // --- 我的最愛 ---
        window.renderFavorites = (container) => {
            if(!container) container = el('main-content');
            
            if(userData.favorites.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex items-center justify-center p-6 text-gray-400 flex-col mt-20 animate-fade-in">
                        <i class="fas fa-heart-broken text-8xl mb-6 text-pink-200"></i>
                        <p class="text-2xl font-bold">目前還沒有收藏任何項目。</p>
                        <p class="text-lg mt-3">到「單字總覽」點擊愛心圖示即可收藏單字！</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full p-6 md:p-10 overflow-y-auto animate-fade-in">
                    <div class="max-w-5xl mx-auto">
                        <h2 class="text-3xl font-bold text-pink-800 border-b-4 border-pink-200 pb-4 mb-8"><i class="fas fa-heart mr-3"></i>我的最愛 (單字收藏)</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            ${userData.favorites.map(favId => `
                                <div class="bg-white p-6 rounded-xl shadow-md border-2 border-pink-100 flex justify-between items-center group relative overflow-hidden transition-shadow hover:shadow-lg">
                                    <div class="absolute inset-0 bg-pink-50 transform translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                                    <span class="font-bold text-gray-800 z-10 text-xl md:text-2xl">${favId}</span>
                                    <button onclick="toggleFavorite('${favId}')" class="text-pink-500 hover:text-red-600 z-10 text-3xl"><i class="fas fa-heart"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        initApp();

    </script>
</body>
</html>
