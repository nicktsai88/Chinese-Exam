            try {

                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;

                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) { console.log('Audio error:', e); }
        };

            q.push({ q:"「思惟」一詞中的「惟」，字義為何？", opts:["因為", "只是", "思考、思量", "獨、只有"], ans:2, exp:"「惟」在此與「思」同義，皆為動詞，代表大腦的思考與思量活動。" });
            q.push({ q:"「萬般皆下品，惟有讀書高」與「人生惟有讀書好」中的「惟」，意義為何？", opts:["因為", "思考", "只是", "獨、只有"], ans:3, exp:"此處的「惟」作限定範圍的副詞使用，意思是世上『獨』、『只有』讀書這件事是最好的。" });
            q.push({ q:"下列哪一個選項中的「惟」字，與「惟吾德馨」的「惟」字意義相同？", opts:["「惟」命是從", "「惟」利是圖", "「惟」才是用", "「惟」仁為紀宇(因為仁愛而能治理天下)"], ans:3, exp:"「惟吾德馨」的惟解釋為「因為」。選項A,B,C的惟皆為副詞「只」；選項D的惟作介詞「因為」。(備註:此為進階字義題)" });
            q.push({ q:"「吾_有一小小心願，不知你能否答應？」空格中的「惟」字，意義與下列何者最相近？", opts:["「惟」吾德馨", "思「惟」", "「惟」膀子疼痛", "人生「惟」有讀書好"], ans:3, exp:"題幹的惟是「只、僅有」之意。與「惟有讀書好」的惟同義；「惟膀子疼痛」偏向轉折的「只是/但是」。" });
            q.push({ q:"下列「惟」字詞性的判斷，何者「錯誤」？", opts:["「惟」吾德馨：介詞", "思「惟」：動詞", "人生「惟」有讀書好：副詞", "「惟」膀子疼痛：名詞"], ans:3, exp:"「惟膀子疼痛」的惟用來表示語氣轉折，詞性為副詞(只是、但是)，而非名詞。" });

            q.push({ q:"承上題，孔子接著說：「不義而富且貴，於我如浮雲。」這代表孔子對於不義之財的看法為何？", opts:["極力追求", "視如敝屣", "若即若離", "隨遇而安"], ans:1, exp:"孔子將不符合道義所獲得的富貴比喻為天上飄忽不定的浮雲，代表他對此毫不在意、視如草芥(敝屣)。" });
            q.push({ q:"「曲肱而枕之」的「肱」，指的是身體的哪一部位？", opts:["大腿", "膝蓋", "手臂", "脖子"], ans:2, exp:"「肱」音ㄍㄨㄥ，指的是手臂從手肘到肩膀的部分。曲肱即彎起手臂。" });
            q.push({ q:"孔子稱讚哪一位學生：「一簞食，一瓢飲，在陋巷，人不堪其憂，回也不改其樂」？", opts:["子路", "子貢", "顏回", "曾參"], ans:2, exp:"這是孔子在《論語·雍也》中對顏回的極高評價，讚賞他能在極度貧困的物質生活中保持精神上的快樂。" });
            q.push({ q:"「人不堪其憂」的「堪」，意思為何？", opts:["忍受", "足以", "可以", "悲傷"], ans:0, exp:"「堪」在此作動詞，意思是忍受。一般人都無法忍受那種貧窮帶來的愁苦，但顏回卻能不改其樂。" });
            q.push({ q:"顏回的「一簞食，一瓢飲」後來衍生成成語「簞食瓢飲」，用來比喻什麼？", opts:["飲食極為豐盛", "讀書非常刻苦", "生活極度貧困簡陋", "交友極為謹慎"], ans:2, exp:"「簞」是盛飯的竹器，「瓢」是舀水的葫蘆。簞食瓢飲即形容生活所需極少，物質極端匱乏。" });
            q.push({ q:"陶淵明在〈五柳先生傳〉中描述自己的居所：「環堵蕭然，不蔽風日」，「環堵」是指？", opts:["周圍的牆壁", "門口的守衛", "屋外的樹林", "阻塞的道路"], ans:0, exp:"「堵」是指牆壁，「環堵」即房屋四周的牆壁。形容屋內空蕩蕩，甚至連風日都遮蔽不了。" });
            q.push({ q:"「短褐穿結，簞瓢屢空，晏如也」中，「短褐」指的是什麼？", opts:["短小的褲子", "粗布短衣", "破舊的鞋子", "破爛的帽子"], ans:1, exp:"「褐」音ㄏㄜˊ，是指貧民所穿的粗毛編織的衣服。短褐即指粗糙破舊的短衣。" });
            q.push({ q:"陶淵明面臨「簞瓢屢空」的困境，其態度是「晏如也」。「晏如」的意思是？", opts:["非常悲傷的樣子", "極度憤怒的樣子", "安然自得的樣子", "匆忙逃跑的樣子"], ans:2, exp:"「晏」有平靜、安然之意。「晏如」即形容陶淵明在貧困中依然心境平靜、安然自在的樣子。" });
            q.push({ q:"下列哪一位人物「未」在講義中被列為「處陋室而自得其樂者」的代表？", opts:["孔子", "顏回", "陶潛", "李白"], ans:3, exp:"講義中列舉的安貧樂道代表人物為：孔子(論語·述而)、顏回(論語·雍也)與陶潛(五柳先生傳)。" });
            q.push({ q:"孔子的「飯疏食飲水」中，「疏食」指的是？", opts:["稀疏的食物", "粗劣的食物", "蔬菜類食物", "美味的食物"], ans:1, exp:"「疏」通「粗」，疏食即指沒有經過精細加工的粗劣食物(如糙米飯)。" });
            q.push({ q:"〈五柳先生傳〉中的「穿結」是指衣服破爛，其中「結」字作何解釋？", opts:["打結", "結束", "打補丁、縫補", "糾纏"], ans:2, exp:"「穿」指衣服破洞，「結」指用線將破洞縫合打結(補丁)。穿結即形容衣衫襤褸、補釘纍纍。" });

            // --- 倒裝句 (59-68) ---
            q.push({ q:"〈陋室銘〉中的「何陋之有」，其正常的語句順序應為何？", opts:["有何陋", "陋有何", "何有陋", "有陋何"], ans:0, exp:"「何陋之有」為「有何陋」的倒裝。「有」是動詞(述語)，「何陋」是賓語。將賓語提前是為了強調。" });
            q.push({ q:"在「何陋之有」這句倒裝句中，「之」字的作用是什麼？", opts:["代詞，指代陋室", "動詞，前往", "助詞，無義，作為賓語提前的記號", "介詞，的"], ans:2, exp:"當賓語(何陋)被提前到動詞(有)之前時，文言文常在中間加上「之」或「是」作為結構助詞，本身沒有實際意義。" });
            q.push({ q:"周敦頤〈愛蓮說〉中的「蓮之愛」，還原為正常語序應為？", opts:["之愛蓮", "愛蓮之", "愛蓮", "愛之蓮"], ans:2, exp:"「蓮之愛」即「愛蓮」的倒裝，動詞為「愛」，賓語為「蓮」，「之」為賓語提前的記號。" });
            q.push({ q:"「唯你是問」這句倒裝句，還原為正常語序應為？", opts:["唯問你是", "唯問你", "唯是問你", "問你唯是"], ans:1, exp:"「唯你是問」意指「只(唯)追究問責(問)你」。動詞為問，賓語為你，「是」為賓語提前記號。" });
            q.push({ q:"「馬首是瞻」是古代兵法中常見的倒裝句，其正常語序為？", opts:["瞻馬首", "瞻是馬首", "馬首瞻", "是瞻馬首"], ans:0, exp:"「瞻」是看(動詞)，「馬首」是將帥的馬頭(賓語)。馬首是瞻即「瞻馬首」，意指作戰時看主將的馬頭決定進退。" });
            q.push({ q:"下列哪一個句子「不是」使用了「賓語提前」的倒裝句型？", opts:["菊之愛", "主義是從", "苔痕上階綠", "唯兄嫂是依"], ans:2, exp:"「苔痕上階綠」為主謂結構(綠色的苔痕蔓延上台階)，並未使用賓語提前的「之」或「是」記號。" });
            q.push({ q:"「唯兄嫂是依」這句倒裝句的意思是？", opts:["只能依賴兄嫂", "兄嫂只能依賴我", "兄嫂依從別人的意見", "唯獨兄嫂的衣服"], ans:0, exp:"還原語序為「唯依兄嫂」。動詞為依(依賴)，賓語為兄嫂。指孤苦無依，只能依靠兄嫂生活。" });
            q.push({ q:"文言文中，用來作為「賓語提前」標明記號的助詞，除了「之」以外，最常見的還有哪一個字？", opts:["以", "於", "者", "是"], ans:3, exp:"文言文表示賓語提前的兩大常見標誌助詞為「之」(如:何陋之有)與「是」(如:馬首是瞻)。" });
            q.push({ q:"「主義是從」這句倒裝句，其動詞(述語)與賓語分別是哪兩個字詞？", opts:["動詞：主，賓語：義", "動詞：從，賓語：主義", "動詞：是，賓語：從", "動詞：主義，賓語：從"], ans:1, exp:"還原為「從主義」(遵從主義)。「從」為動詞，「主義」為接受動詞作用的對象(賓語)。" });
            q.push({ q:"關於倒裝句的目的，下列敘述何者最為正確？", opts:["為了讓文章字數增加", "為了押韻方便", "為了強調被提前的賓語", "為了讓語意變得模糊難懂"], ans:2, exp:"將賓語從動詞後方移到動詞前方，最主要的目的就是在語氣上「強調」該賓語的重要性。" });

            // --- 成語：品德 (69-78) ---

            q.push({ q:"「光風霽月」除了形容雨過天晴的明淨風光外，常用來比喻什麼？", opts:["人的胸懷坦蕩，品格高潔", "國家的政治清明", "經濟繁榮發展", "夫妻感情融洽"], ans:0, exp:"「霽」音ㄐㄧˋ，雨過天晴。光風霽月常被用來讚美一個人如晴空般胸襟開闊坦蕩、人品高潔脫俗。" });
            q.push({ q:"「高尚的品德，堅貞的氣節」是指哪一個成語？", opts:["枕流漱石", "寒花晚節", "高風亮節", "砥礪風節"], ans:2, exp:"「高風」指高尚的風範，「亮節」指堅貞光明的氣節。合稱高風亮節，為讚美品德之最高用詞。" });
            q.push({ q:"「寒花晚節」比喻人老而操守愈堅，其中的「寒花」是指？", opts:["在寒冬而不凋的花", "長在雪地裡的草", "沒有香味的花", "春天提早開的花"], ans:0, exp:"菊花等在秋末冬初傲霜綻放的花稱為寒花。以此比喻人在晚年或處於逆境時，仍能堅守節操。" });
            q.push({ q:"「風雨交加，天色昏暗，猶如黑夜。比喻處於險惡環境中也不改變其操守。」是指？", opts:["風雨如晦", "光風霽月", "砥礪風節", "韜光養晦"], ans:0, exp:"「晦」音ㄏㄨㄟˋ，昏暗。風雨如晦語出《詩經》，原指天氣惡劣，後引申為君子在動盪險惡的亂世中依然堅守正道。" });
            q.push({ q:"「砥礪風節」的意思是？", opts:["被風雨侵蝕的石頭", "隱藏自己的才能", "磨鍊品格和節操", "放棄自己的原則"], ans:2, exp:"「砥礪」原指磨刀石，引申為磨鍊、勉勵；「風節」指風範與節操。即指不斷自我磨鍊以保持高尚品德。" });
            q.push({ q:"「韜光養晦」的比喻義為何？", opts:["休養生息以求長壽", "隱藏才能，不使外露", "顯露才華以求重用", "在黑暗中尋找光明"], ans:1, exp:"「韜」指隱藏，「光」指鋒芒才華；「養」指修養，「晦」指晦暗。意指將自己的才華隱藏起來，低調不張揚。" });
            q.push({ q:"下列哪一個成語用來形容「高潔之士的隱居生活」？", opts:["高風亮節", "光風霽月", "枕流漱石", "一介不取"], ans:2, exp:"「枕流漱石」原為孫楚的口誤(本應說枕石漱流)，後錯就錯用以表達隱居山林、與自然為伴的隱士生活。" });
            q.push({ q:"「他雖然身處貪腐的官場中，卻能_，出淤泥而不染，令人敬佩。」空格最適合填入？", opts:["濫竽充數", "風雨如晦", "一介不取", "緊鑼密鼓"], ans:2, exp:"由「出淤泥而不染」、「貪腐官場」可知，要強調的是其不貪污的清廉操守，故選「一介不取」。" });
            q.push({ q:"「這幾年他決定辭去高薪工作回到鄉下_，不再過問商場上的恩恩怨怨。」空格最適合填入？", opts:["寒花晚節", "枕流漱石", "砥礪風節", "光風霽月"], ans:1, exp:"回到鄉下不再過問世事，符合隱居山林的意境，因此使用形容隱居生活的「枕流漱石」最為貼切。" });

            // --- 成語：樂器 (79-88) ---
            q.push({ q:"「濫竽充數」的「竽」是一種樂器，這個成語比喻什麼？", opts:["樂器演奏得非常好", "比喻沒有真才實學的人，混在行家中充數", "比喻數量非常多", "比喻聲音非常吵雜"], ans:1, exp:"戰國時南郭先生不會吹竽，卻混在齊宣王的吹竽樂隊中領薪水。後比喻沒本事的人佔著位子充數。" });
            q.push({ q:"「緊鑼密鼓」通常用來比喻什麼情況？", opts:["打仗時的激烈交鋒", "公開活動前緊張而密集地準備各項事宜", "樂團演奏時節奏太快而混亂", "兩方人馬大聲爭吵"], ans:1, exp:"戲曲開臺前鑼鼓敲得密集。現在多引申為為了某個即將到來的大事件，進行非常緊湊、密集的籌備工作。" });
            q.push({ q:"「對牛彈琴」比喻什麼？", opts:["做事非常有耐心", "動物也能聽懂音樂", "對不懂道理的人講道理，或講話不看對象", "浪費昂貴的樂器"], ans:2, exp:"對著聽不懂音樂的牛彈奏古琴，牛毫無反應。比喻說話時不看對象，對不懂的人講高深的道理，白費口舌。" });
            q.push({ q:"「琵琶別抱」原本指婦女改嫁，現在多用來形容什麼情況？", opts:["女子學會了新的樂器", "女子結識了新的男友", "夫妻感情破裂而離婚", "女子獨自去遠方旅行"], ans:1, exp:"出自白居易〈琵琶行〉的延伸意象，現今社會多用來婉轉地形容女方移情別戀，結交了新歡。" });
            q.push({ q:"「把琴當柴燒，烹煮鶴來吃。比喻極殺風景的事。」是指哪一個成語？", opts:["膠柱鼓瑟", "對牛彈琴", "焚琴煮鶴", "濫竽充數"], ans:2, exp:"琴是高雅樂器，鶴是仙風道骨之鳥，將其拿來燒火煮肉，是極度糟蹋美好事物、大煞風景的粗俗行為。" });

                    <div class="p-6 bg-amber-100 flex justify-between items-center border-b border-amber-200 shrink-0">
                        <span class="font-bold text-2xl text-amber-900"><i class="fas fa-list-ul mr-3"></i>學習目錄</span>
                        <button onclick="toggleLearnMenu(false)" class="text-amber-800 hover:text-red-600 transition-colors"><i class="fas fa-times text-3xl"></i></button>
                    </div>
                    <ul class="py-4 flex-1">
                        ${learnData.map(d => `
                            <li>
                                <button onclick="selectLearnTab('${d.id}')" id="ltab-${d.id}" class="w-full text-left px-8 py-5 text-xl font-bold hover:bg-amber-100 transition-colors ${learnSubTab === d.id ? 'bg-amber-100 text-amber-800 border-l-8 border-amber-600' : 'text-gray-600 border-l-8 border-transparent'}">
                                    ${d.title}
                                </button>
                            </li>
                        `).join('')}
                    </ul>
                </div>
                
                <!-- 右側主要內容 -->
                <div class="flex-1 p-6 md:p-10 overflow-y-auto" id="learn-content-area"></div>
            `;
            renderLearnContent();
        };

        window.selectLearnTab = (id) => {
            learnSubTab = id;
            const data = learnData.find(d => d.id === id);
            
            // 更新上方標題
            const titleEl = el('current-learn-title');
            if(titleEl && data) titleEl.innerText = data.title;
            
            // 更新選單樣式
            learnData.forEach(d => {
                const btn = el(`ltab-${d.id}`);
                if(btn) {
                    if(d.id === id) {
                        btn.classList.add('bg-amber-100', 'text-amber-800', 'border-l-8', 'border-amber-600');
                        btn.classList.remove('text-gray-600', 'border-transparent');
                    } else {
                        btn.classList.remove('bg-amber-100', 'text-amber-800', 'border-l-8', 'border-amber-600');
                        btn.classList.add('text-gray-600', 'border-transparent');
                    }
                }
            });
            renderLearnContent();
            
            // 選擇單元後自動收起選單
            toggleLearnMenu(false);
        };

        window.renderLearnContent = () => {
            const area = el('learn-content-area');
            if(!area) return;
            const data = learnData.find(d => d.id === learnSubTab);
            area.innerHTML = `
                <div class="max-w-5xl mx-auto">
                    <h2 class="text-3xl font-bold text-wood-dark mb-8 border-b-4 border-amber-200 pb-3">${data.title}</h2>
                    <div class="text-gray-800 leading-relaxed text-lg md:text-xl">${data.content}</div>
                </div>
            `;
            // 更新愛心狀態
            setTimeout(() => {
                document.querySelectorAll('.fav-btn').forEach(btn => {
                    const id = btn.getAttribute('data-id');
                    if(userData.favorites.includes(id)) {
                        btn.classList.remove('text-gray-300');
                        btn.classList.add('text-red-500');
                    }
                });
            }, 0);
        };

        // --- 測驗區 ---
        const renderQuizView = (container) => {
            if(!quizState.active) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-6 overflow-y-auto">
                        <div class="bg-white p-10 rounded-xl shadow-md text-center max-w-2xl border-t-8 border-orange-600 shrink-0">
                            <i class="fas fa-list-ol text-6xl text-orange-600 mb-6"></i>
                            <h2 class="text-3xl font-bold mb-6">綜合測驗 (瀑布流 100 題)</h2>
                            <p class="text-gray-600 mb-8 text-xl">挑戰100題高鑑別度測驗！採用瀑布流設計，可一次瀏覽與作答所有題目，答題後立即顯示深度解析，方便快速複習！</p>
                            <button onclick="startQuiz()" class="bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 px-12 text-2xl rounded-full shadow-lg transition transform hover:scale-105">開始測驗</button>
                        </div>
                    </div>
                `;
            } else {
                renderWaterfallQuiz(container);
            }
        };

        window.startQuiz = () => {
            // 隨機打亂100題
            const qList = [...generate100Questions()].sort(() => 0.5 - Math.random());
            quizState = { 
                active: true, 
                score: 0, 
                questions: qList, 
                userAnswers: new Array(qList.length).fill(null) 
            };

            // 顯示導覽列測驗統計
            const statsEl = el('nav-quiz-stats');
            if (statsEl) {
                statsEl.classList.remove('hidden');
                statsEl.classList.add('flex');
            }

            renderQuizView(el('main-content'));
        };

        const renderWaterfallQuiz = (container) => {
            const total = quizState.questions.length;
            
            let html = `<div class="w-full flex-1 p-4 md:p-10 overflow-y-auto pb-24 relative">
                <div class="max-w-5xl mx-auto space-y-8 mt-4">
            `;

            // 渲染所有題目的卡片容器
            for(let i = 0; i < total; i++) {
                html += `<div id="q-card-${i}" class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 shrink-0">`;
                html += getQuestionCardHtml(i);
                html += `</div>`;
            }

            // 底部完成按鈕
            html += `
                <div class="text-center pt-10 pb-8">
                    <button id="finish-quiz-btn" onclick="finishWaterfallQuiz()" class="bg-gray-400 text-white font-bold py-5 px-12 text-2xl rounded-full shadow-lg transition transform cursor-not-allowed" disabled>
                        請先完成所有題目
                    </button>
                </div>
            </div></div>`;

            container.innerHTML = html;
            updateQuizProgress(); // 初始化進度
        };

        const getQuestionCardHtml = (i) => {
            const q = quizState.questions[i];
            const userAns = quizState.userAnswers[i];
            const isAnswered = userAns !== null;
            
            let optionsHtml = '';
            q.opts.forEach((opt, optIdx) => {
                // 將字體加大為 text-2xl，並稍微加大 padding 讓點擊範圍更舒適
                let btnClass = "w-full text-left p-6 text-2xl rounded-lg border-2 transition-all flex items-center group ";
                // 將圓圈圖示也等比例加大 (w-12 h-12 text-2xl)，並加上 shrink-0 防止文字過長時擠壓變形
                let iconHtml = `<span class="w-12 h-12 shrink-0 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center mr-5 font-bold text-2xl transition-colors">${String.fromCharCode(65+optIdx)}</span>`;
                
                if (!isAnswered) {
                    btnClass += "border-gray-300 hover:border-orange-500 hover:bg-orange-50 group-hover:bg-orange-500 group-hover:text-white cursor-pointer";
                } else {
                    if (optIdx === q.ans) {
                        btnClass += "border-emerald-500 bg-emerald-100 text-emerald-800 font-bold shadow-sm";
                        iconHtml = `<span class="w-12 h-12 shrink-0 rounded-full bg-emerald-500 text-white flex items-center justify-center mr-5 font-bold text-2xl"><i class="fas fa-check"></i></span>`;
                    } else if (optIdx === userAns) {
                        btnClass += "border-red-500 bg-red-50 text-red-800 font-bold opacity-80";
                        iconHtml = `<span class="w-12 h-12 shrink-0 rounded-full bg-red-500 text-white flex items-center justify-center mr-5 font-bold text-2xl"><i class="fas fa-times"></i></span>`;
                    } else {
                        btnClass += "border-gray-100 bg-gray-50 opacity-40 cursor-not-allowed";
                    }
                }

                optionsHtml += `
                    <button ${isAnswered ? 'disabled' : `onclick="answerWaterfall(${i}, ${optIdx})"`} class="${btnClass}">
                        ${iconHtml}
                        <span class="leading-relaxed">${opt}</span>
                    </button>
                `;
            });

            let expHtml = '';
            if (isAnswered) {
                const isCorrect = userAns === q.ans;
                expHtml = `
                    <div class="mt-8 p-6 rounded-xl border-2 ${isCorrect ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'} animate-fade-in shadow-inner">
                        <div class="flex items-center mb-4">
                            <i class="fas ${isCorrect ? 'fa-check-circle text-emerald-500' : 'fa-times-circle text-red-500'} text-3xl mr-3"></i>
                            <span class="font-bold text-2xl">${isCorrect ? '太棒了，答對了！' : '哎呀，答錯了！'}</span>
                        </div>
                        <div class="bg-white bg-opacity-70 p-5 rounded-lg border ${isCorrect ? 'border-emerald-100' : 'border-red-100'}">
                            <p class="font-bold mb-2 text-xl"><i class="fas fa-lightbulb text-yellow-500 mr-2"></i>完整題目解析：</p>
                            <p class="mt-2 text-lg">正確答案為 <strong class="${isCorrect ? 'text-emerald-700' : 'text-red-700'} text-xl">(${String.fromCharCode(65+q.ans)}) ${q.opts[q.ans]}</strong>。</p>
                            <div class="mt-4 p-4 bg-orange-50 border border-orange-200 rounded-lg text-orange-900 shadow-sm">
                                <p class="font-bold text-lg mb-1"><i class="fas fa-book-reader mr-2 text-orange-700"></i>深度解析：</p>
                                <p class="text-lg leading-relaxed">${q.exp}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="bg-orange-50 px-6 py-4 border-b border-orange-100 flex justify-between items-center">
                    <span class="font-bold text-orange-800 text-xl">第 ${i + 1} 題</span>
                </div>
                <div class="p-6 md:p-8">
                    <h3 class="text-2xl md:text-3xl font-bold text-gray-800 mb-8 leading-relaxed">${q.q}</h3>
                    <div class="space-y-4">
                        ${optionsHtml}
                    </div>
                    ${expHtml}
                </div>
            `;
        };

        window.answerWaterfall = (qIndex, optIdx) => {
            if (quizState.userAnswers[qIndex] !== null) return; // 已經答過即不可更改
            
            quizState.userAnswers[qIndex] = optIdx;
            const q = quizState.questions[qIndex];
            const isCorrect = optIdx === q.ans;
            
            if (isCorrect) {
                quizState.score++;
                playCorrectSound();
            } else {
                playWrongSound();
                // 答錯自動加入錯題本
                const mistakeId = q.q; 
                const exists = userData.mistakes.find(m => m.id === mistakeId);
                if(!exists) {
                    userData.mistakes.push({
                        id: mistakeId,
                        q: q.q,
                        opts: q.opts,
                        ans: q.ans,
                        time: new Date().toISOString()
                    });
                    saveUserData();
                }
            }

            // 局部重繪該題的卡片，避免影響畫面滾動位置
            const card = el(`q-card-${qIndex}`);
            if(card) {
                card.innerHTML = getQuestionCardHtml(qIndex);
            }
            
            updateQuizProgress();
        };

        window.updateQuizProgress = () => {
            let answeredCount = 0;
            let correctCount = 0;
            let wrongCount = 0;

            // 計算目前答題狀況
            quizState.userAnswers.forEach((ans, idx) => {
                if (ans !== null) {
                    answeredCount++;
                    if (ans === quizState.questions[idx].ans) {
                        correctCount++;
                    } else {
                        wrongCount++;
                    }
                }
            });

            const total = quizState.questions.length;
            const progress = (answeredCount / total) * 100;
            
            const bar = el('quiz-progress-bar');
            const text = el('quiz-progress-text');
            const correctEl = el('quiz-correct-count');
            const wrongEl = el('quiz-wrong-count');
            const btn = el('finish-quiz-btn');
            
            // 更新 UI
            if(bar) bar.style.width = `${progress}%`;
            if(text) text.innerText = `${answeredCount} / ${total}`;
            if(correctEl) correctEl.innerText = correctCount;
            if(wrongEl) wrongEl.innerText = wrongCount;
            
            if(answeredCount === total && btn) {
                btn.classList.remove('bg-gray-400', 'cursor-not-allowed');
                btn.classList.add('bg-orange-600', 'hover:bg-orange-700', 'hover:scale-105', 'cursor-pointer');
                btn.removeAttribute('disabled');
                btn.innerText = "完成測驗，查看成績";
            }
        };

        window.finishWaterfallQuiz = async () => {
            quizState.active = false;
            
            // 隱藏導覽列測驗統計
            const statsEl = el('nav-quiz-stats');
            if (statsEl) {
                statsEl.classList.add('hidden');
                statsEl.classList.remove('flex');
            }

            const total = quizState.questions.length;
            const score = Math.round((quizState.score / total) * 100);
            
            // 存入 Firebase
            if(isFirebaseInitialized && currentUser) {
                const docRef = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME + '_quizzes'));
                try {
                    await setDoc(docRef, { score, date: new Date(), total });
                } catch(e) { console.error("Save Quiz Error", e); }
            }

            // 放慶祝特效
            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.5 },
                colors: ['#f59e0b', '#ea580c', '#ef4444', '#fbbf24']
            });

            const container = el('main-content');
            container.innerHTML = `
                <div class="w-full flex-1 flex items-center justify-center p-6 overflow-y-auto pb-24">
                    <div class="bg-white p-12 rounded-xl shadow-xl text-center max-w-2xl border-t-8 border-orange-600 shrink-0 animate-fade-in">
                        <i class="fas fa-trophy text-8xl text-yellow-500 mb-6"></i>
                        <h2 class="text-4xl font-bold mb-4">測驗完成！</h2>
                        <p class="text-7xl font-extrabold text-orange-600 mb-8">${score} <span class="text-3xl text-gray-500">分</span></p>
                        <p class="text-gray-600 mb-8 text-2xl">您答對了 <span class="text-orange-600 font-bold">${quizState.score}</span> 題，共 ${total} 題。</p>
                        <div class="space-y-4">
                            <button onclick="switchTab('mistakes')" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 px-6 text-xl rounded-lg shadow transition">查看錯題本</button>
                            <button onclick="startQuiz()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 px-6 text-xl rounded-lg shadow transition">重新測驗</button>
                        </div>
                    </div>
                </div>
            `;
        };

        // --- 錯題本 ---
        window.renderMistakes = (container) => {
            if(!container) container = el('main-content');
            
            if(userData.mistakes.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-6 text-gray-400 flex-col">
                        <i class="fas fa-check-circle text-8xl mb-6 text-amber-300"></i>
                        <p class="text-2xl font-bold">太棒了！目前沒有錯題紀錄。</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full flex-1 p-6 md:p-10 overflow-y-auto pb-24">
                    <div class="max-w-4xl mx-auto">
                        <div class="flex justify-between items-center border-b-4 border-red-200 pb-4 mb-8">
                            <h2 class="text-3xl font-bold text-red-800"><i class="fas fa-book-dead mr-3"></i>錯題本</h2>
                            <button onclick="clearMistakes()" class="text-lg text-red-500 hover:text-red-700 font-bold underline">清空錯題</button>
                        </div>
                        <div class="space-y-6">
                            ${userData.mistakes.map((m, i) => `
                                <div class="bg-white p-6 md:p-8 rounded-xl shadow-md border-l-8 border-red-400">
                                    <h3 class="font-bold text-gray-800 mb-5 text-xl md:text-2xl">${i+1}. ${m.q}</h3>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-lg">
                                        ${m.opts.map((opt, idx) => `
                                            <div class="p-3 rounded-lg ${idx === m.ans ? 'bg-emerald-100 text-emerald-800 font-bold border-2 border-emerald-300 shadow-sm' : 'bg-gray-50 text-gray-500 border border-gray-200'}">
                                                ${String.fromCharCode(65+idx)}. ${opt}
                                                ${idx === m.ans ? '<i class="fas fa-check ml-2"></i>(正確答案)' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                    <div class="mt-4 p-4 bg-orange-50 border border-orange-200 rounded-lg text-orange-900 shadow-sm text-lg">
                                        <p class="font-bold mb-1"><i class="fas fa-book-reader mr-2 text-orange-700"></i>深度解析：</p>
                                        <p class="leading-relaxed">${generate100Questions().find(q => q.q === m.q)?.exp || '請參考講義內容。'}</p>
                                    </div>
                                </div>
                            `).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.clearMistakes = () => {
            if(confirm('確定要清空所有錯題紀錄嗎？')) {
                userData.mistakes = [];
                saveUserData();
                renderMistakes();
            }
        };

        // --- 我的最愛 ---
        window.renderFavorites = (container) => {
            if(!container) container = el('main-content');
            
            if(userData.favorites.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-6 text-gray-400 flex-col">
                        <i class="fas fa-heart-broken text-8xl mb-6 text-pink-200"></i>
                        <p class="text-2xl font-bold">目前還沒有收藏任何項目。</p>
                        <p class="text-lg mt-3">到「學習區」點擊愛心圖示即可收藏！</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full flex-1 p-6 md:p-10 overflow-y-auto pb-24">
                    <div class="max-w-5xl mx-auto">
                        <h2 class="text-3xl font-bold text-pink-800 border-b-4 border-pink-200 pb-4 mb-8"><i class="fas fa-heart mr-3"></i>我的最愛</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                            ${userData.favorites.map(favId => `
                                <div class="bg-white p-6 rounded-xl shadow-md border-2 border-pink-100 flex justify-between items-center group relative overflow-hidden transition-shadow hover:shadow-lg">
                                    <div class="absolute inset-0 bg-pink-50 transform translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                                    <span class="font-bold text-gray-800 z-10 text-xl md:text-2xl">${favId}</span>
                                    <button onclick="toggleFavorite('${favId}')" class="text-pink-500 hover:text-red-600 z-10 text-3xl"><i class="fas fa-heart"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        // 啟動應用
        initApp();

    </script>
</body>
</html>
