        const playTone = (freq, type, duration) => {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) { console.log('Audio error:', e); }
        };

            const area = el('learn-content-area');
            if(!area) return;
            const data = learnData.find(d => d.id === learnSubTab);
            area.innerHTML = `
                <div class="max-w-5xl mx-auto">
                    <h2 class="text-3xl font-bold text-wood-dark mb-8 border-b-4 border-amber-200 pb-3">${data.title}</h2>
                    <div class="text-gray-800 leading-relaxed text-lg md:text-xl">${data.content}</div>
                </div>
            `;
            // 更新愛心狀態
            setTimeout(() => {
                document.querySelectorAll('.fav-btn').forEach(btn => {
                    const id = btn.getAttribute('data-id');
                    if(userData.favorites.includes(id)) {
                        btn.classList.remove('text-gray-300');
                        btn.classList.add('text-red-500');
                    }
                });
            }, 0);
        };

        // --- 測驗區 ---
        const renderQuizView = (container) => {
            if(!quizState.active) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-6 overflow-y-auto">
                        <div class="bg-white p-10 rounded-xl shadow-md text-center max-w-2xl border-t-8 border-orange-600 shrink-0">
                            <i class="fas fa-stream text-6xl text-orange-600 mb-6"></i>
                            <h2 class="text-3xl font-bold mb-6">瀑布流綜合測驗 (共100題)</h2>
                            <p class="text-gray-600 mb-8 text-xl leading-relaxed">挑戰100題高鑑別度測驗！題目涵蓋課文細節、字音字形辨析與成語精熟度。<br><br><span class="bg-orange-100 text-orange-800 font-bold px-2 py-1 rounded">全新瀑布流模式：</span>點擊選項後立即顯示解析，無須換頁，快速複習最有效率！</p>
                            <button onclick="startQuiz()" class="bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 px-12 text-2xl rounded-full shadow-lg transition transform hover:scale-105">開始測驗</button>
                        </div>
                    </div>
                `;
            } else {
                renderQuizWaterfall(container);
            }
        };

        window.startQuiz = () => {
            // 隨機打亂100題並為每一題建立獨立狀態
            const qList = [...generate100Questions()].sort(() => 0.5 - Math.random()).map(q => ({
                ...q,
                selectedAns: null,
                showExplanation: false,
                isCorrect: false
            }));
            quizState = { active: true, questions: qList };
            renderQuizView(el('main-content'));
        };

        // 更新即時統計資料的獨立函數
        window.updateQuizStats = () => {
            let correct = 0;
            let incorrect = 0;
            let answered = 0;
            const total = quizState.questions.length;

            quizState.questions.forEach(q => {
                if (q.showExplanation) {
                    answered++;
                    if (q.isCorrect) correct++;
                    else incorrect++;
                }
            });

            const progressPercent = (answered / total) * 100;

            const elCorrect = document.getElementById('stat-correct');
            const elIncorrect = document.getElementById('stat-incorrect');
            const elBar = document.getElementById('stat-progress-bar');
            const elText = document.getElementById('stat-progress-text');

            if (elCorrect) elCorrect.innerText = correct;
            if (elIncorrect) elIncorrect.innerText = incorrect;
            if (elBar) elBar.style.width = progressPercent + '%';
            if (elText) elText.innerText = `作答進度：${answered} / ${total} 題`;
        };

        const renderQuizWaterfall = (container) => {
            const total = quizState.questions.length;
            let html = `
                <div class="w-full flex-1 p-4 md:p-10 overflow-y-auto pb-24 scrollbar-hide bg-gray-50/50" id="quiz-scroll-container">
                    <div class="max-w-4xl mx-auto relative">
                        
                        <!-- 帶有進度條與統計的 Sticky Header -->
                        <div class="bg-white px-6 md:px-8 py-5 border-b-4 border-orange-400 rounded-xl shadow-lg sticky top-0 z-30 mb-8 transition-all">
                            <div class="flex flex-col md:flex-row justify-between md:items-center mb-4 gap-3">
                                <h2 class="font-bold text-orange-900 text-xl md:text-2xl">綜合測驗 <span class="text-base font-normal text-gray-500 ml-2">隨選即答</span></h2>
                                <div class="flex gap-4 md:gap-6 text-lg md:text-xl font-bold bg-gray-50 px-4 py-2 md:px-5 rounded-lg border border-gray-100 shadow-inner">
                                    <span class="text-emerald-600 flex items-center"><i class="fas fa-check-circle mr-2 md:text-2xl"></i>答對 <span id="stat-correct" class="ml-1 md:ml-2 md:text-2xl">0</span></span>
                                    <div class="w-px bg-gray-300 h-auto my-1"></div>
                                    <span class="text-red-500 flex items-center"><i class="fas fa-times-circle mr-2 md:text-2xl"></i>答錯 <span id="stat-incorrect" class="ml-1 md:ml-2 md:text-2xl">0</span></span>
                                </div>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-3 md:h-4 shadow-inner overflow-hidden">
                                <div id="stat-progress-bar" class="bg-gradient-to-r from-orange-400 to-orange-600 h-full rounded-full transition-all duration-500 relative" style="width: 0%"></div>
                            </div>
                            <div class="flex justify-between text-sm md:text-base mt-3 text-gray-600 font-bold">
                                <span id="stat-progress-text">作答進度：0 / ${total} 題</span>
                                <span class="text-orange-600 cursor-pointer hover:text-orange-800 transition" onclick="document.getElementById('quiz-scroll-container').scrollTo({top: document.getElementById('quiz-scroll-container').scrollHeight, behavior: 'smooth'})">跳至最底交卷 <i class="fas fa-arrow-down"></i></span>
                            </div>
                        </div>

                        <div id="questions-list" class="space-y-8">
            `;

            quizState.questions.forEach((_, qIdx) => {
                html += `
                            <div id="q-block-${qIdx}" class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 transition-all">
                                ${generateSingleQuestionHtml(qIdx)}
                            </div>
                `;
            });

            html += `
                        </div>
                        <button onclick="finishQuizWaterfall()" class="w-full mt-10 bg-orange-600 hover:bg-orange-700 text-white font-bold py-6 text-3xl rounded-xl shadow-xl transition transform hover:scale-[1.01] flex items-center justify-center">
                            <i class="fas fa-flag-checkered mr-4"></i> 完成測驗並結算成績
                        </button>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        };

        const generateSingleQuestionHtml = (qIdx) => {
            const q = quizState.questions[qIdx];
            let optionsHtml = '';
            
            q.opts.forEach((opt, i) => {
                let btnClass = "w-full text-left p-4 md:p-5 text-lg md:text-xl rounded-lg border-2 transition-all flex items-center group ";
                let iconHtml = `<span class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center mr-4 font-bold text-lg md:text-xl transition-colors shrink-0">${String.fromCharCode(65+i)}</span>`;
                
                if (!q.showExplanation) {
                    btnClass += "border-gray-300 hover:border-orange-500 hover:bg-orange-50 group-hover:bg-orange-500 group-hover:text-white cursor-pointer";
                } else {
                    if (i === q.ans) {
                        // 正確答案高亮
                        btnClass += "border-emerald-500 bg-emerald-100 text-emerald-800 font-bold scale-[1.01] shadow-md z-10 relative";
                        iconHtml = `<span class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-emerald-500 text-white flex items-center justify-center mr-4 font-bold text-lg md:text-xl shrink-0"><i class="fas fa-check"></i></span>`;
                    } else if (i === q.selectedAns) {
                        // 點錯的選項
                        btnClass += "border-red-500 bg-red-50 text-red-800 font-bold scale-[0.99]";
                        iconHtml = `<span class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-red-500 text-white flex items-center justify-center mr-4 font-bold text-lg md:text-xl shrink-0"><i class="fas fa-times"></i></span>`;
                    } else {
                        // 未選到的錯誤答案
                        btnClass += "border-gray-200 bg-gray-50 opacity-50 cursor-not-allowed";
                    }
                }

                optionsHtml += `
                    <button ${q.showExplanation ? 'disabled' : `onclick="answerWaterfallQuestion(${qIdx}, ${i})"`} class="${btnClass}">
                        ${iconHtml}
                        <span class="flex-1 leading-relaxed">${opt}</span>
                    </button>
                `;
            });

            let explanationHtml = '';
            if (q.showExplanation) {
                const isCorrect = q.selectedAns === q.ans;
                explanationHtml = `
                    <div class="mt-6 p-5 md:p-6 rounded-xl border-2 ${isCorrect ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'} animate-fade-in shadow-inner">
                        <div class="flex items-center mb-4">
                            <i class="fas ${isCorrect ? 'fa-check-circle text-emerald-500' : 'fa-times-circle text-red-500'} text-3xl mr-3"></i>
                            <span class="font-bold text-2xl">${isCorrect ? '太棒了，答對了！' : '哎呀，答錯了！'}</span>
                        </div>
                        <div class="bg-white bg-opacity-70 p-4 md:p-5 rounded-lg border ${isCorrect ? 'border-emerald-100' : 'border-red-100'}">
                            <p class="font-bold mb-2 text-xl"><i class="fas fa-lightbulb text-yellow-500 mr-2"></i>完整題目解析：</p>
                            <p class="mt-2 text-lg">正確答案為 <strong class="${isCorrect ? 'text-emerald-700' : 'text-red-700'} text-xl">(${String.fromCharCode(65+q.ans)}) ${q.opts[q.ans]}</strong>。</p>
                            <div class="mt-4 p-4 bg-orange-50 border border-orange-200 rounded-lg text-orange-900 shadow-sm">
                                <p class="font-bold text-lg mb-1"><i class="fas fa-book-reader mr-2 text-orange-700"></i>深度解析：</p>
                                <p class="text-lg leading-relaxed">${q.exp}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="bg-gray-50 px-6 py-4 border-b border-gray-100 flex justify-between items-center transition-colors ${q.showExplanation ? (q.selectedAns === q.ans ? 'bg-emerald-50' : 'bg-red-50') : ''}">
                    <span class="font-bold text-gray-700 text-lg">第 ${qIdx + 1} 題</span>
                    ${q.showExplanation 
                        ? (q.selectedAns === q.ans 
                            ? '<span class="text-emerald-600 font-bold text-lg"><i class="fas fa-check mr-1"></i>答對</span>' 
                            : '<span class="text-red-600 font-bold text-lg"><i class="fas fa-times mr-1"></i>答錯</span>') 
                        : '<span class="text-gray-400 font-medium"><i class="fas fa-pen mr-1"></i>尚未作答</span>'}
                </div>
                <div class="p-6 md:p-8">
                    <h3 class="text-xl md:text-2xl font-bold text-gray-800 mb-6 leading-relaxed">${q.q}</h3>
                    <div class="space-y-4">
                        ${optionsHtml}
                    </div>
                    ${explanationHtml}
                </div>
            `;
        };

        window.answerWaterfallQuestion = (qIdx, optIdx) => {
            const q = quizState.questions[qIdx];
            if(q.showExplanation) return; // 防呆：避免重複點擊

            const isCorrect = optIdx === q.ans;
            
            // 更新這題的狀態
            q.selectedAns = optIdx;
            q.showExplanation = true;
            q.isCorrect = isCorrect;
            
            // 音效與特效
            if (isCorrect) {
                playCorrectSound();
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 }, zIndex: 10000, colors: ['#10b981', '#34d399', '#f59e0b'] });
            } else {
                playWrongSound();
                
                // 答錯立即加入錯題本
                const mistakeId = q.q; 
                const exists = userData.mistakes.find(m => m.id === mistakeId);
                if(!exists) {
                    userData.mistakes.push({
                        id: mistakeId, q: q.q, opts: q.opts, ans: q.ans, time: new Date().toISOString()
                    });
                    saveUserData();
                }
            }

            // 只重新渲染該題的 DOM，避免破壞外層的捲動高度 (Scroll Position)
            const block = document.getElementById(`q-block-${qIdx}`);
            if (block) {
                block.innerHTML = generateSingleQuestionHtml(qIdx);
            }

            // 更新上方總進度與統計
            updateQuizStats();
        };

        window.finishQuizWaterfall = async () => {
            let correctCount = 0;
            let answeredCount = 0;
            
            quizState.questions.forEach(q => {
                if (q.showExplanation) {
                    answeredCount++;
                    if (q.isCorrect) correctCount++;
                }
            });

            // 若有未作答題目給予提示
            if (answeredCount < quizState.questions.length) {
                if(!confirm(`您還有 ${quizState.questions.length - answeredCount} 題尚未作答，確定要直接交卷結算嗎？`)) {
                    return;
                }
            }

            quizState.active = false;
            const total = quizState.questions.length;
            const scorePercent = Math.round((correctCount / total) * 100);
            
            // 存入 Firebase
            if(isFirebaseInitialized && currentUser) {
                const docRef = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME + '_quizzes'));
                try {
                    await setDoc(docRef, { score: scorePercent, date: new Date(), total, correct: correctCount });
                } catch(e) { console.error("Save Quiz Error", e); }
            }

            const container = el('main-content');
            container.innerHTML = `
                <div class="w-full flex-1 flex items-center justify-center p-6 overflow-y-auto pb-24">
                    <div class="bg-white p-12 rounded-xl shadow-xl text-center max-w-2xl border-t-8 border-orange-600 shrink-0">
                        <i class="fas fa-trophy text-8xl text-yellow-500 mb-6"></i>
                        <h2 class="text-4xl font-bold mb-4">測驗完成！</h2>
                        <p class="text-7xl font-extrabold text-orange-600 mb-8">${scorePercent} <span class="text-3xl text-gray-500">分</span></p>
                        <p class="text-gray-600 mb-8 text-2xl">您答對了 <span class="text-orange-600 font-bold">${correctCount}</span> 題，共作答 ${answeredCount} 題 (總題數 ${total} 題)。</p>
                        <div class="space-y-4">
                            <button onclick="switchTab('mistakes')" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 px-6 text-xl rounded-lg shadow transition">查看錯題本</button>
                            <button onclick="startQuiz()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 px-6 text-xl rounded-lg shadow transition">重新測驗</button>
                        </div>
                    </div>
                </div>
            `;
            
            // 結算時撒下大量碎紙花慶祝
            confetti({ particleCount: 250, spread: 120, origin: { y: 0.4 }, zIndex: 10000 });
        };

        // --- 錯題本 ---
        window.renderMistakes = (container) => {
            if(!container) container = el('main-content');
            
            if(userData.mistakes.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-6 text-gray-400 flex-col">
                        <i class="fas fa-check-circle text-8xl mb-6 text-amber-300"></i>
                        <p class="text-2xl font-bold">太棒了！目前沒有錯題紀錄。</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full flex-1 p-6 md:p-10 overflow-y-auto pb-24">
                    <div class="max-w-4xl mx-auto">
                        <div class="flex justify-between items-center border-b-4 border-red-200 pb-4 mb-8">
                            <h2 class="text-3xl font-bold text-red-800"><i class="fas fa-book-dead mr-3"></i>錯題本</h2>
                            <button onclick="clearMistakes()" class="text-lg text-red-500 hover:text-red-700 font-bold underline">清空錯題</button>
                        </div>
                        <div class="space-y-6">
                            ${userData.mistakes.map((m, i) => `
                                <div class="bg-white p-6 md:p-8 rounded-xl shadow-md border-l-8 border-red-400">
                                    <h3 class="font-bold text-gray-800 mb-5 text-xl md:text-2xl">${i+1}. ${m.q}</h3>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-lg">
                                        ${m.opts.map((opt, idx) => `
                                            <div class="p-3 rounded-lg ${idx === m.ans ? 'bg-emerald-100 text-emerald-800 font-bold border-2 border-emerald-300 shadow-sm' : 'bg-gray-50 text-gray-500 border border-gray-200'}">
                                                ${String.fromCharCode(65+idx)}. ${opt}
                                                ${idx === m.ans ? '<i class="fas fa-check ml-2"></i>(正確答案)' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.clearMistakes = () => {
            if(confirm('確定要清空所有錯題紀錄嗎？')) {
                userData.mistakes = [];
                saveUserData();
                renderMistakes();
            }
        };

        // --- 我的最愛 ---
        window.renderFavorites = (container) => {
            if(!container) container = el('main-content');
            
            if(userData.favorites.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-6 text-gray-400 flex-col">
                        <i class="fas fa-heart-broken text-8xl mb-6 text-pink-200"></i>
                        <p class="text-2xl font-bold">目前還沒有收藏任何項目。</p>
                        <p class="text-lg mt-3">到「學習區」點擊愛心圖示即可收藏！</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full flex-1 p-6 md:p-10 overflow-y-auto pb-24">
                    <div class="max-w-5xl mx-auto">
                        <h2 class="text-3xl font-bold text-pink-800 border-b-4 border-pink-200 pb-4 mb-8"><i class="fas fa-heart mr-3"></i>我的最愛</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                            ${userData.favorites.map(favId => `
                                <div class="bg-white p-6 rounded-xl shadow-md border-2 border-pink-100 flex justify-between items-center group relative overflow-hidden transition-shadow hover:shadow-lg">
                                    <div class="absolute inset-0 bg-pink-50 transform translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                                    <span class="font-bold text-gray-800 z-10 text-xl md:text-2xl">${favId}</span>
                                    <button onclick="toggleFavorite('${favId}')" class="text-pink-500 hover:text-red-600 z-10 text-3xl"><i class="fas fa-heart"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        // 啟動應用
        initApp();

    </script>
</body>
</html>
