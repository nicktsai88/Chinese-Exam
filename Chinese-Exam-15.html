                gainNode.connect(audioCtx.destination);

            q.push({ q:"「描寫油桐花像雪片飛落的盛況」是哪一段的段落大意？", opts:["第五段", "第六段", "第八段", "第九段"], ans:2, exps:["錯誤。第五段是金銀花與童年。","錯誤。第六段是山黃梔嗆鼻。","正確。段落大意指出「第八段：描寫油桐花像雪片飛落的盛況」。","錯誤。第九段是走過花徑的驚豔與珍惜之情。"] });

            q.push({ q:"根據作法分析，作者抒寫森林之美的最終目的是什麼？", opts:["展現自己的攝影技術", "推廣當地的觀光旅遊", "希望到訪的人能珍惜、關懷森林", "炫耀自己找到祕徑"], ans:2, exps:["錯誤。雖提到揹起攝影裝備，但這不是寫作目的。","錯誤。並非為了推廣觀光。","正確。作法分析指出「希望每一個到訪的人都能和他一樣珍惜、關懷森林」。","錯誤。作者態度謙虛（野人獻曝），並非炫耀。"] });
            q.push({ q:"關於第一段的段落大意，下列敘述何者正確？", opts:["臺灣的森林優美，但很少人去關懷", "以野人獻曝的心情分享", "沿著熟悉小徑進入森林", "油桐花編織成白地毯"], ans:0, exps:["正確。段落大意指出「第一段：臺灣的森林優美，但很少人去關懷」。","錯誤。這是第二段。","錯誤。這是第三段。","錯誤。這是第八、九段的內容。"] });

            q.push({ q:"「只是因為我們很少去接近，也沒空去留意，更無心去關懷...」這段話道出了作者的什麼用意？", opts:["寫作動機，希望喚醒大家對保育工作的重視", "抱怨現代人工作太忙碌", "暗示自己比別人更有閒情逸致", "為臺灣森林的消失感到絕望"], ans:0, exps:["正確。句意解說指出這句話「道出寫作動機，希望喚醒大家對保育工作的重視」。","錯誤。重點在於喚醒關懷，而非單純抱怨。","錯誤。作者以「野人獻曝」自居，並無優越感。","錯誤。作者是希望喚醒重視，並未絕望。"] });

            q.push({ q:"作者覺得「必須用力吸氣，才能把這飽含許多野花香味的空氣吸入肺中」，意指為何？", opts:["山上空氣稀薄，呼吸困難", "花香濃郁，必須深呼吸才過癮", "作者本身有氣喘", "想把香味儲存在體內帶回家"], ans:1, exps:["錯誤。非空氣稀薄。","正確。句意解說指出「意指花香濃郁，必須深呼吸才過癮」。","錯誤。與健康狀況無關。","錯誤。非帶回家之意。"] });
            q.push({ q:"「每次聞到金銀花特殊的香味...都會想起那苦中帶甘的童年」這種寫作方式被稱為什麼筆法？", opts:["倒敘筆法", "回憶筆法", "象徵筆法", "意識流筆法"], ans:1, exps:["錯誤。主要為回憶而非結構上的倒敘。","正確。句意解說稱此為「回憶筆法，令人倍覺溫馨」。","錯誤。非象徵筆法。","錯誤。非意識流。"] });
            q.push({ q:"關於「山黃梔」，作者說「幸好在這片森林裡也不過兩株...山風總是把香味散播得很廣很遠，也變得濃淡適宜」，這說明了什麼美學概念？", opts:["數大便是美", "殘缺的美", "距離產生的美", "對稱的美"], ans:2, exps:["錯誤。「數大便是美」是用來形容油桐花。","錯誤。無殘缺之意。","正確。句意解說指出這說明了「距離產生的美」。因為靠近會嗆鼻，遠一點才濃淡適宜。","錯誤。非對稱美。"] });
            q.push({ q:"作者將飛落的油桐花形容為「好像仙女散花一般」，並鋪成白色長地毯。這主要是描寫油桐花的什麼美感？", opts:["靜態的孤寂之美", "動態描寫數大之美", "色彩的鮮豔之美", "香氣的深沉之美"], ans:1, exps:["錯誤。是飛落的動態，非靜態孤寂。","正確。句意解說指出這是「描繪油桐花飄落的生動意象 動態描寫數大之美」。","錯誤。主要強調落花的數量與動態，顏色僅為白色。","錯誤。此句主要描寫視覺與動態，而非香氣。"] });
            q.push({ q:"作者認為油桐花鋪成的紅地毯「比歡迎國王或總統的紅地毯還要美麗、莊嚴、高貴，因為它只使用一次」，這說明了什麼？", opts:["說明大自然極度浪費資源", "說明因喜歡親近大自然而受到特別的尊寵", "說明作者幻想自己成為國王", "說明人類的紅地毯太過廉價"], ans:1, exps:["錯誤。這是自然現象，非浪費。","正確。句意解說指出這「說明因喜歡親近大自然而受到特別的尊寵」。","錯誤。作者並未幻想成為國王，而是覺得受到的待遇比國王還高貴。","錯誤。重點在於強調自然的美麗莊嚴，而非貶低人類地毯。"] });
            q.push({ q:"句意解說中提到，「因為它只使用一次」這句話的深層含義為何？", opts:["油桐花每年只開一次花", "白地毯一旦經過人群踩踏，後來的人就無法再欣賞到同樣的美景", "大自然的美景看過一次就會膩", "這條祕徑走過一次就會消失"], ans:1, exps:["錯誤。非指開花頻率。","正確。句意解說指出「一旦經過人群踩踏，後來的人就無法再欣賞到同樣的美景」。","錯誤。美景不會看膩。","錯誤。祕徑不會消失，是落花鋪成的地毯會被破壞。"] });

            q.push({ q:"「新的落花立刻修補了我踩過的地方。」在句意解說中，這句話象徵著什麼？", opts:["大自然無窮的生命力", "落花數量的氾濫", "作者的腳印太小", "風勢過於強烈"], ans:0, exps:["正確。句意解說指出這「象徵大自然無窮的生命力」。","錯誤。非指氾濫。","錯誤。與腳印大小無關。","錯誤。與風勢無關。"] });

            q.push({ q:"「也只有像我這樣深入、珍惜大自然的人，才會受到邀請，才能找到這條美麗的祕徑。」這句話暗示了什麼道理？", opts:["只有專家才有資格進入森林", "大自然偏心特定的人類", "只要真心對待自然，自然也會用更多的美景來回報人們", "要帶昂貴的攝影裝備才能找到美景"], ans:2, exps:["錯誤。任何人都可以。","錯誤。大自然並不偏心，取決於人的態度。","正確。句意解說提到「暗示人們只要真心對待自然，自然也會用更多的美景來回報人們，藉此帶出生態保育的重要」。","錯誤。與裝備無關。"] });

            q.push({ q:"「在這片林子裡，我品嘗著『福爾摩沙』低海拔森林的美好與曼妙，全身浸滿了幸福。」這句話在文章結構上的作用為何？", opts:["埋下伏筆", "呼應題目", "承先啟後", "破題法"], ans:1, exps:["錯誤。出現在結尾，非伏筆。","正確。句意解說指出這句話「呼應題目，並暗示我們要珍惜大自然，才能享受森林之美」。","錯誤。非承先啟後。","錯誤。非破題。"] });

        // --- 學習區 ---

                        btn.classList.add('bg-green-100', 'text-green-800', 'border-l-8', 'border-green-600');
                        btn.classList.remove('text-gray-600', 'border-transparent');
                    } else {
                        btn.classList.remove('bg-green-100', 'text-green-800', 'border-l-8', 'border-green-600');
                        btn.classList.add('text-gray-600', 'border-transparent');
                    }
                }
            });
            renderLearnContent();
            toggleLearnMenu(false);
        };

        window.renderLearnContent = () => {
            const area = el('learn-content-area');
            if(!area) return;
            const data = learnData.find(d => d.id === learnSubTab);
            area.innerHTML = `
                <div class="max-w-5xl mx-auto">
                    <div class="text-gray-800 leading-relaxed text-lg md:text-xl">${data.content}</div>
                </div>
            `;
            setTimeout(() => {
                document.querySelectorAll('.fav-btn').forEach(btn => {
                    const id = btn.getAttribute('data-id');
                    if(userData.favorites.includes(id)) {
                        btn.classList.remove('text-gray-300');
                        btn.classList.add('text-red-500');
                    }
                });
            }, 0);
        };

        // --- 測驗區 ---
        const renderQuizView = (container) => {
            if(!quizState.active) {
                container.innerHTML = `
                    <div class="w-full flex items-center justify-center p-6 mt-10">
                        <div class="bg-white p-10 rounded-xl shadow-md text-center max-w-2xl border-t-8 border-orange-600">
                            <i class="fas fa-pencil-alt text-6xl text-orange-600 mb-6"></i>
                            <h2 class="text-3xl font-bold mb-6">綜合測驗 (共120題) - 瀑布流模式</h2>
                            <p class="text-gray-600 mb-8 text-xl">全新編製120題高鑑別度測驗！題目採用瀑布流呈現，答題後立即顯示解析，讓您快速作答與複習。選項經過特別設計，請務必仔細作答！</p>
                            <button onclick="startQuiz()" class="bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 px-12 text-2xl rounded-full shadow-lg transition transform hover:scale-105">開始測驗</button>
                        </div>
                    </div>
                `;
            } else {
                let html = `
                    <div class="w-full flex flex-col items-center p-6 md:p-10 overflow-y-auto relative" id="quiz-scroll-container">
                        <div class="w-full max-w-4xl">
                            <div class="flex justify-between items-center border-b-4 border-orange-200 pb-4 mb-8">
                                <h2 class="text-2xl md:text-3xl font-bold text-orange-800"><i class="fas fa-pencil-alt mr-3"></i>測驗進行中</h2>
                                <button onclick="clearQuizHistory()" class="text-base md:text-lg text-gray-500 hover:text-red-600 font-bold underline transition-colors"><i class="fas fa-trash-alt mr-1"></i>清除作答紀錄</button>

                                ${quizState.questions.map((_, idx) => renderQuestionCard(idx)).join('')}
                            </div>

                                ${renderFinishArea()}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML = html;
            }
        };

        window.startQuiz = () => {
            const qList = [...generate120Questions()].sort(() => 0.5 - Math.random());
            quizState = { active: true, score: 0, questions: qList, userAnswers: new Array(qList.length).fill(null) };
            saveQuizState();
            renderQuizView(el('main-content'));
            updateNavQuizStats();
            setTimeout(() => {
                const scrollContainer = el('quiz-scroll-container');
                if(scrollContainer) scrollContainer.scrollTop = 0;
            }, 50);
        };

        window.updateNavQuizStats = () => {
            const statsEl = el('nav-quiz-stats');
            if (!statsEl) return;

            if (currentTab === 'quiz' && quizState.active) {
                statsEl.classList.remove('hidden');
                statsEl.classList.add('flex');
                
                const total = quizState.questions.length;
                const answeredCount = quizState.userAnswers.filter(a => a !== null).length;
                const progress = (answeredCount / total) * 100;
                
                let correctCount = 0;
                let wrongCount = 0;
                quizState.userAnswers.forEach((ans, idx) => {
                    if (ans !== null) {
                        if (ans === quizState.questions[idx].ans) correctCount++;
                        else wrongCount++;
                    }
                });

                statsEl.innerHTML = `
                    <div class="md:hidden flex items-center gap-2 text-sm font-bold bg-white px-2 py-1 rounded-lg border shadow-sm">
                        <span class="text-green-600"><i class="fas fa-check"></i> ${correctCount}</span>
                        <span class="text-red-500"><i class="fas fa-times"></i> ${wrongCount}</span>
                    </div>
                    <div class="hidden md:flex items-center gap-3 bg-white px-3 py-1 rounded-full border shadow-sm ml-2">
                        <span class="text-sm font-bold text-gray-600 whitespace-nowrap">進度 ${answeredCount}/${total}</span>
                        <div class="w-24 lg:w-32 bg-gray-200 rounded-full h-2 overflow-hidden shrink-0">
                            <div class="bg-orange-500 h-2 rounded-full transition-all duration-300" style="width: ${progress}%"></div>
                        </div>
                        <div class="flex items-center gap-3 text-sm font-bold ml-1 border-l pl-3 border-gray-200 shrink-0">

        const renderQuestionCard = (qIdx) => {

            const userAns = quizState.userAnswers[qIdx];
            const isAnswered = userAns !== null;
            const isCorrect = userAns === q.ans;

            let optionsHtml = '';
            q.opts.forEach((opt, i) => {
                let btnClass = "w-full text-left p-4 md:p-5 text-lg md:text-xl rounded-xl border-2 transition-all flex items-center group relative overflow-hidden ";
                let iconHtml = `<span class="w-10 h-10 shrink-0 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center mr-4 font-bold text-xl transition-colors z-10">${String.fromCharCode(65+i)}</span>`;
                
                if (!isAnswered) {
                    btnClass += "border-gray-200 hover:border-orange-500 hover:bg-orange-50 cursor-pointer bg-white";
                } else {
                    btnClass += "cursor-default ";
                    if (i === q.ans) {
                        btnClass += "border-green-500 bg-green-50 text-green-900 font-bold shadow-md scale-[1.02] z-10";
                        iconHtml = `<span class="w-10 h-10 shrink-0 rounded-full bg-green-500 text-white flex items-center justify-center mr-4 font-bold text-xl z-10"><i class="fas fa-check"></i></span>`;
                    } else if (i === userAns) {
                        btnClass += "border-red-400 bg-red-50 text-red-800 font-bold scale-[0.98]";
                        iconHtml = `<span class="w-10 h-10 shrink-0 rounded-full bg-red-500 text-white flex items-center justify-center mr-4 font-bold text-xl z-10"><i class="fas fa-times"></i></span>`;
                    } else {
                        btnClass += "border-gray-100 bg-gray-50 text-gray-400 opacity-60";
                    }
                }

                optionsHtml += `
                    <button ${isAnswered ? 'disabled' : `onclick="answerQuestion(${qIdx}, ${i})"`} class="${btnClass}">
                        ${!isAnswered ? '<div class="absolute inset-0 bg-orange-500 transform -translate-x-full group-hover:translate-x-0 transition-transform duration-300 ease-in-out opacity-10"></div>' : ''}

            return `

                        <span class="font-bold ${isAnswered ? (isCorrect ? 'text-green-800' : 'text-red-800') : 'text-orange-800'} text-xl">第 ${qIdx + 1} 題</span>
                        ${isAnswered ? (isCorrect ? '<span class="text-green-600 font-bold text-xl animate-fade-in"><i class="fas fa-check-circle mr-2"></i>答對</span>' : '<span class="text-red-600 font-bold text-xl animate-fade-in"><i class="fas fa-times-circle mr-2"></i>答錯</span>') : ''}
                    </div>
                    <div class="p-6 md:p-8">
                        <h3 class="text-2xl md:text-3xl font-bold text-gray-800 mb-8 leading-relaxed">${q.q}</h3>
                        <div class="space-y-4">
                            ${optionsHtml}
                        </div>
                        
                        ${isAnswered ? `
                            <div class="mt-8 p-6 rounded-xl border-2 ${isCorrect ? 'bg-green-50 border-green-200 text-green-800' : 'bg-red-50 border-red-200 text-red-900'} animate-fade-in shadow-sm">
                                <div class="flex items-center mb-4">
                                    <i class="fas ${isCorrect ? 'fa-lightbulb text-yellow-500' : 'fa-exclamation-triangle text-red-500'} text-2xl mr-3"></i>
                                    <p class="font-bold text-2xl">完整題目解析</p>
                                </div>
                                <div class="bg-white bg-opacity-70 p-4 md:p-6 rounded-lg">
                                    <p class="text-lg mb-5 border-b pb-3 border-gray-200">正確答案為 <strong class="${isCorrect ? 'text-green-700' : 'text-red-700'} text-2xl">(${String.fromCharCode(65+q.ans)}) ${q.opts[q.ans]}</strong>。</p>
                                    ${q.exps ? `
                                    <div class="space-y-4 text-lg text-gray-700">
                                        ${q.opts.map((_, i) => `
                                            <div class="flex items-start">
                                                <span class="font-bold mr-3 w-8 shrink-0 ${i === q.ans ? 'text-green-600' : 'text-gray-500'}">(${String.fromCharCode(65+i)})</span>
                                                <span class="leading-relaxed ${i === q.ans ? 'font-medium text-green-900' : ''}">${q.exps[i]}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                    ` : '<p class="text-gray-600">本題無特別解析提供。</p>'}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        };

        const renderFinishArea = () => {
            const total = quizState.questions.length;
            const answeredCount = quizState.userAnswers.filter(a => a !== null).length;
            
            if (answeredCount === total) {
                return `
                    <div class="py-10 px-6 text-center animate-fade-in bg-gradient-to-br from-orange-50 to-amber-100 rounded-2xl border-2 border-orange-200 shadow-lg">

                        </button>

            } else {
                return `
                    <div class="py-10 px-6 text-center bg-gray-50 rounded-2xl border border-gray-200 shadow-inner">
                        <h3 class="text-2xl font-bold text-gray-700 mb-3">測驗尚未完成</h3>
                        <p class="text-xl text-gray-500 mb-6">請作答完所有題目後再進行交卷。<br>尚有 <span class="text-red-500 font-extrabold text-2xl">${total - answeredCount}</span> 題未作答。</p>
                        <button onclick="if(confirm('確定要提前交卷嗎？未作答的題目將不予計分。')) finishQuiz()" class="text-gray-500 hover:text-gray-700 font-bold py-2 px-6 text-lg transition underline">
                            強制提前交卷
                        </button>
                    </div>
                `;
            }
        };

        window.answerQuestion = (qIdx, optIdx) => {
            if (quizState.userAnswers[qIdx] !== null) return;

            const q = quizState.questions[qIdx];
            quizState.userAnswers[qIdx] = optIdx;
            const isCorrect = optIdx === q.ans;

            if (isCorrect) {
                quizState.score++;
                playCorrectSound();
                if (quizState.userAnswers.filter(a => a !== null).length === quizState.questions.length) {
                    confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#f59e0b', '#ea580c', '#ef4444', '#10b981'] });
                }
            } else {
                playWrongSound();
                const mistakeId = q.q;
                const exists = userData.mistakes.find(m => m.id === mistakeId);
                if(!exists) {
                    userData.mistakes.push({
                        id: mistakeId, q: q.q, opts: q.opts, ans: q.ans, time: new Date().toISOString()
                    });
                    saveUserData();
                }
            }

            saveQuizState();
            const cardContainer = el(`q-card-${qIdx}`);
            if(cardContainer) cardContainer.outerHTML = renderQuestionCard(qIdx);
            
            updateNavQuizStats();
            const finishArea = el('quiz-finish-area');
            if(finishArea) finishArea.innerHTML = renderFinishArea();
        };

        window.finishQuiz = async () => {
            quizState.active = false;
            saveQuizState(); 
            updateNavQuizStats(); 
            const total = quizState.questions.length;
            const score = Math.round((quizState.score / total) * 100);
            
            if(isFirebaseInitialized && currentUser) {
                const docRef = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME + '_quizzes'));
                try { await setDoc(docRef, { score, date: new Date(), total }); } catch(e) { console.error(e); }
            }

            const container = el('main-content');
            container.innerHTML = `
                <div class="w-full flex items-center justify-center p-6 overflow-y-auto mt-10">
                    <div class="bg-white p-12 rounded-xl shadow-2xl text-center max-w-2xl border-t-8 border-orange-600 animate-fade-in">
                        <i class="fas fa-trophy text-8xl text-yellow-500 mb-6"></i>
                        <h2 class="text-4xl font-bold mb-4 text-gray-800">測驗完成！</h2>
                        <p class="text-8xl font-extrabold text-orange-600 mb-8 drop-shadow-md">${score} <span class="text-4xl text-gray-500">分</span></p>
                        <div class="bg-orange-50 p-6 rounded-xl mb-8">
                            <p class="text-gray-700 text-2xl font-bold">您答對了 <span class="text-green-600 text-3xl mx-2">${quizState.score}</span> 題</p>
                            <p class="text-gray-500 text-lg mt-2">共 ${total} 題，答錯或未答 ${total - quizState.score} 題</p>
                        </div>
                        <div class="space-y-4">
                            <button onclick="switchTab('mistakes')" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 px-6 text-xl rounded-xl shadow-lg transition transform hover:scale-[1.02]"><i class="fas fa-book-dead mr-2"></i>立刻複習錯題</button>
                            <button onclick="startQuiz()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-4 px-6 text-xl rounded-xl shadow transition"><i class="fas fa-redo mr-2"></i>重新挑戰 ${total} 題</button>
                        </div>
                    </div>
                </div>
            `;
            confetti({ particleCount: 300, spread: 120, origin: { y: 0.5 } });
        };

        window.clearQuizHistory = () => {
            if(confirm('警告：確定要清除目前的作答紀錄嗎？\n這將會重置所有已作答的題目！')) {
                if(confirm('【雙重確認】\n清除後將無法復原，請再次確認是否要「清除作答紀錄」？')) {
                    quizState = { active: false, score: 0, questions: [], userAnswers: [] };
                    saveQuizState();
                    updateNavQuizStats();
                    renderQuizView(el('main-content'));
                }
            }
        };

        // --- 錯題本 ---
        window.renderMistakes = (container) => {
            if(!container) container = el('main-content');
            if(userData.mistakes.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex items-center justify-center p-6 text-gray-400 flex-col mt-20">
                        <i class="fas fa-check-circle text-8xl mb-6 text-green-300"></i>
                        <p class="text-2xl font-bold">太棒了！目前沒有錯題紀錄。</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full p-6 md:p-10 overflow-y-auto">
                    <div class="max-w-4xl mx-auto">
                        <div class="flex justify-between items-center border-b-4 border-red-200 pb-4 mb-8">
                            <h2 class="text-3xl font-bold text-red-800"><i class="fas fa-book-dead mr-3"></i>錯題本</h2>
                            <button onclick="clearMistakes()" class="text-lg text-red-500 hover:text-red-700 font-bold underline">清空錯題</button>
                        </div>
                        <div class="space-y-6">
                            ${userData.mistakes.map((m, i) => `
                                <div class="bg-white p-6 md:p-8 rounded-xl shadow-md border-l-8 border-red-400">
                                    <h3 class="font-bold text-gray-800 mb-5 text-xl md:text-2xl">${i+1}. ${m.q}</h3>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-lg">
                                        ${m.opts.map((opt, idx) => `
                                            <div class="p-3 rounded-lg ${idx === m.ans ? 'bg-green-100 text-green-800 font-bold border-2 border-green-300 shadow-sm' : 'bg-gray-50 text-gray-500 border border-gray-200'}">
                                                ${String.fromCharCode(65+idx)}. ${opt}
                                                ${idx === m.ans ? '<i class="fas fa-check ml-2"></i>(正確答案)' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.clearMistakes = () => {
            if(confirm('警告：確定要清空所有錯題紀錄嗎？')) {
                if(confirm('【雙重確認】\n清空後將無法復原，請再次確認是否要「清空錯題本」？')) {
                    userData.mistakes = [];
                    saveUserData();
                    renderMistakes();
                }
            }
        };

        // --- 我的最愛 ---
        window.renderFavorites = (container) => {
            if(!container) container = el('main-content');
            if(userData.favorites.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex items-center justify-center p-6 text-gray-400 flex-col mt-20">
                        <i class="fas fa-heart-broken text-8xl mb-6 text-pink-200"></i>
                        <p class="text-2xl font-bold">目前還沒有收藏任何項目。</p>
                        <p class="text-lg mt-3">到「學習區」點擊愛心圖示即可收藏！</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full p-6 md:p-10 overflow-y-auto">
                    <div class="max-w-5xl mx-auto">
                        <h2 class="text-3xl font-bold text-pink-800 border-b-4 border-pink-200 pb-4 mb-8"><i class="fas fa-heart mr-3"></i>我的最愛</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                            ${userData.favorites.map(favId => `
                                <div class="bg-white p-6 rounded-xl shadow-md border-2 border-pink-100 flex justify-between items-center group relative overflow-hidden transition-shadow hover:shadow-lg">
                                    <div class="absolute inset-0 bg-pink-50 transform translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                                    <span class="font-bold text-gray-800 z-10 text-xl md:text-2xl">${favId}</span>
                                    <button onclick="toggleFavorite('${favId}')" class="text-pink-500 hover:text-red-600 z-10 text-3xl"><i class="fas fa-heart"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        // 啟動
        initApp();
    </script>
</body>
</html>
