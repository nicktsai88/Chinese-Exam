            q.push({ q:"「我們很少去接近，也沒空去留意，更無心去關懷。」這句話使用了哪一種修辭技巧？", opts:["層遞", "排比", "譬喻", "擬人"], ans:0, exps:["正確。程度由「接近」、「留意」加深至「關懷」，為層遞修辭。","錯誤。雖句型相似，但語意有明顯的層次遞進，講義中歸類為層遞。","錯誤。","錯誤。"] });

            q.push({ q:"「從稍遠處欣賞，好像是掛在小樹上的金星、銀星，令人著迷。」這句話使用了哪些修辭？", opts:["兼視覺摹寫與擬人", "兼視覺摹寫與譬喻", "兼嗅覺摹寫與譬喻", "兼觸覺摹寫與層遞"], ans:1, exps:["錯誤。","正確。看到金星銀星（視覺），「好像是...」（譬喻）。","錯誤。","錯誤。"] });

            q.push({ q:"下列文句與修辭的配對，何者「錯誤」？", opts:["我們很少去接近，也沒空去留意，更無心去關懷：層遞", "空氣中滿含著濃淡適宜、令人愉悅的花香：視覺摹寫", "新的落花立刻修補了我踩過的地方：擬人", "好像是掛在小樹上的金星、銀星：譬喻"], ans:1, exps:["正確。","錯誤。「花香」為嗅覺摹寫，非視覺摹寫。","正確。","正確。"] });
            q.push({ q:"關於本課修辭的運用，下列敘述何者正確？", opts:["作者完全沒有使用觸覺摹寫", "描寫油桐花飄落時，沒有視覺摹寫", "「濃香變得有些黏稠」使用了嗅覺摹寫兼轉化", "「在姑婆芋的葉上，在野薑花的葉上」屬於層遞"], ans:2, exps:["錯誤。「微涼山風」即為觸覺摹寫。","錯誤。有兼視覺摹寫。","正確。香味（嗅覺）化為黏稠（轉化）。","錯誤。屬於排比。"] });

            return `
                <div class="bg-white rounded-3xl shadow-lg border ${isAnswered ? (isCorrect ? 'border-emerald-300 shadow-emerald-100/50' : 'border-rose-300 shadow-rose-100/50') : 'border-orange-200 hover:border-orange-400 hover:shadow-xl'} overflow-hidden transition-all duration-300" id="q-card-${qIdx}">
                    <div class="${isAnswered ? (isCorrect ? 'bg-gradient-to-r from-emerald-50 to-green-50 border-emerald-200' : 'bg-gradient-to-r from-rose-50 to-red-50 border-rose-200') : 'bg-gradient-to-r from-orange-100 to-amber-50 border-orange-200'} px-6 md:px-8 py-5 border-b-2 flex justify-between items-center transition-colors">
                        <span class="font-extrabold tracking-wide ${isAnswered ? (isCorrect ? 'text-emerald-800' : 'text-rose-800') : 'text-orange-900'} text-xl bg-white/60 px-4 py-1 rounded-full shadow-sm">🎯 第 ${qIdx + 1} 題</span>
                        ${isAnswered ? (isCorrect ? '<span class="text-emerald-600 font-extrabold text-xl animate-fade-in bg-white/80 px-4 py-1 rounded-full shadow-sm flex items-center"><span class="mr-2">🎉</span>答對</span>' : '<span class="text-rose-600 font-extrabold text-xl animate-fade-in bg-white/80 px-4 py-1 rounded-full shadow-sm flex items-center"><span class="mr-2">💔</span>答錯</span>') : ''}
                    </div>
                    <div class="p-6 md:p-8">
                        <h3 class="text-2xl md:text-3xl font-extrabold text-gray-800 mb-8 leading-loose tracking-wide">🔍 ${q.q}</h3>
                        <div class="space-y-4">
                            ${optionsHtml}
                        </div>
                        
                        ${isAnswered ? `
                            <div class="mt-10 p-6 md:p-8 rounded-2xl border-2 ${isCorrect ? 'bg-gradient-to-br from-emerald-50 to-green-50 border-emerald-200' : 'bg-gradient-to-br from-rose-50 to-red-50 border-rose-200'} animate-fade-in shadow-inner">
                                <div class="flex items-center mb-5 border-b-2 ${isCorrect ? 'border-emerald-200/50' : 'border-rose-200/50'} pb-4">
                                    <span class="text-3xl mr-3">${isCorrect ? '💡' : '🚨'}</span>
                                    <p class="font-extrabold text-2xl ${isCorrect ? 'text-emerald-900' : 'text-rose-900'}">完整題目解析</p>
                                </div>
                                <div class="bg-white p-5 md:p-6 rounded-xl shadow-sm border ${isCorrect ? 'border-emerald-100' : 'border-rose-100'}">
                                    <p class="text-xl mb-6 border-b pb-4 border-gray-100 font-bold text-gray-700 flex items-center">
                                        <span class="mr-2">🎯</span> 正確答案為：<strong class="${isCorrect ? 'text-emerald-600 bg-emerald-50' : 'text-rose-600 bg-rose-50'} px-3 py-1 rounded-lg text-2xl ml-2 shadow-sm border ${isCorrect ? 'border-emerald-200' : 'border-rose-200'}">(${String.fromCharCode(65+q.ans)}) ${q.opts[q.ans]}</strong>
                                    </p>
                                    ${q.exps ? `
                                    <div class="space-y-5 text-lg text-gray-700">
                                        ${q.opts.map((_, i) => `
                                            <div class="flex items-start bg-gray-50/50 p-4 rounded-xl border border-gray-100 hover:bg-white transition-colors">
                                                <span class="font-extrabold text-xl mr-4 w-10 h-10 shrink-0 flex items-center justify-center rounded-lg ${i === q.ans ? 'bg-emerald-100 text-emerald-700 border border-emerald-200 shadow-sm' : 'bg-gray-200 text-gray-600'}">${String.fromCharCode(65+i)}</span>
                                                <span class="leading-relaxed mt-1 ${i === q.ans ? 'font-bold text-emerald-900' : ''}">${q.exps[i]}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                    ` : '<p class="text-gray-600">本題無特別解析提供。</p>'}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        };

        const renderFinishArea = () => {
            const total = quizState.questions.length;
            const answeredCount = quizState.userAnswers.filter(a => a !== null).length;
            
            if (answeredCount === total) {
                return `
                    <div class="py-12 px-6 text-center animate-fade-in bg-gradient-to-br from-amber-100 via-orange-100 to-rose-100 rounded-3xl border-4 border-white shadow-2xl relative overflow-hidden">
                        <div class="absolute -top-10 -left-10 w-32 h-32 bg-white/40 rounded-full blur-2xl"></div>
                        <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-rose-200/40 rounded-full blur-2xl"></div>
                        <div class="text-8xl mb-6 animate-bounce">🏆</div>
                        <h3 class="text-4xl font-extrabold text-orange-900 mb-8 drop-shadow-sm">太棒了！您已完成所有 ${total} 題</h3>
                        <button onclick="finishQuiz()" class="relative z-10 bg-gradient-to-r from-orange-600 to-rose-600 hover:from-orange-700 hover:to-rose-700 text-white font-extrabold py-5 px-14 text-3xl rounded-full shadow-[0_10px_20px_rgba(244,63,94,0.3)] transition transform hover:scale-110 hover:-translate-y-2 border-2 border-white/20">
                            ✨ 正式交卷並查看成績
                        </button>
                    </div>
                `;
            } else {
                return `
                    <div class="py-12 px-6 text-center bg-gray-50/80 backdrop-blur-sm rounded-3xl border-2 border-gray-200 border-dashed shadow-inner">
                        <div class="text-6xl mb-4 opacity-50">⏳</div>
                        <h3 class="text-3xl font-extrabold text-gray-700 mb-4">測驗尚未完成</h3>
                        <p class="text-2xl text-gray-500 mb-8 leading-relaxed">請作答完所有題目後再進行交卷。<br>目前尚有 <span class="text-rose-500 font-black text-4xl mx-2 bg-rose-50 px-3 py-1 rounded-xl shadow-sm border border-rose-100">${total - answeredCount}</span> 題未作答。</p>
                        <button onclick="if(confirm('🚨 確定要提前交卷嗎？未作答的題目將不予計分。')) finishQuiz()" class="text-gray-400 hover:text-rose-600 font-bold py-2 px-6 text-xl transition-all underline decoration-2 underline-offset-4 hover:bg-rose-50 rounded-lg">
                            ⚠️ 強制提前交卷
                        </button>
                    </div>
                `;
            }
        };

        window.answerQuestion = (qIdx, optIdx) => {
            if (quizState.userAnswers[qIdx] !== null) return;

            const q = quizState.questions[qIdx];
            quizState.userAnswers[qIdx] = optIdx;
            const isCorrect = optIdx === q.ans;

            if (isCorrect) {
                quizState.score++;
                playCorrectSound();
                if (quizState.userAnswers.filter(a => a !== null).length === quizState.questions.length) {
                    confetti({ particleCount: 300, spread: 150, origin: { y: 0.6 }, colors: ['#f59e0b', '#ea580c', '#ef4444', '#10b981', '#ec4899'] });
                }
            } else {
                playWrongSound();
                const mistakeId = q.q;
                const exists = userData.mistakes.find(m => m.id === mistakeId);
                if(!exists) {
                    userData.mistakes.push({
                        id: mistakeId, q: q.q, opts: q.opts, ans: q.ans, time: new Date().toISOString()
                    });
                    saveUserData();
                }
            }

            saveQuizState();
            const cardContainer = el(`q-card-${qIdx}`);
            if(cardContainer) cardContainer.outerHTML = renderQuestionCard(qIdx);
            
            updateNavQuizStats();
            const finishArea = el('quiz-finish-area');
            if(finishArea) finishArea.innerHTML = renderFinishArea();
        };

        window.finishQuiz = async () => {
            quizState.active = false;
            saveQuizState(); 
            updateNavQuizStats(); 
            const total = quizState.questions.length;
            const score = Math.round((quizState.score / total) * 100);
            
            if(isFirebaseInitialized && currentUser) {
                const docRef = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME + '_quizzes'));
                try { await setDoc(docRef, { score, date: new Date(), total }); } catch(e) { console.error(e); }
            }

            const container = el('main-content');
            container.innerHTML = `
                <div class="w-full h-full flex items-center justify-center p-6 overflow-y-auto bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9IiNlYTgxNjAiIGZpbGwtb3BhY2l0eT0iMC4wNSIvPjwvc3ZnPg==')]">
                    <div class="bg-white/90 backdrop-blur-md p-10 md:p-14 rounded-3xl shadow-2xl text-center max-w-2xl border-t-[12px] border-orange-500 animate-fade-in relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-orange-50 to-transparent"></div>
                        <div class="relative z-10">
                            <div class="text-8xl mb-8 animate-bounce" style="animation-duration: 2s;">🎉</div>
                            <h2 class="text-4xl font-extrabold mb-4 text-orange-900">測驗結算完成！</h2>
                            <p class="text-9xl font-black text-transparent bg-clip-text bg-gradient-to-b from-orange-500 to-rose-600 mb-8 drop-shadow-sm">${score} <span class="text-4xl text-gray-400 font-bold bg-clip-text bg-none">分</span></p>
                            
                            <div class="bg-gradient-to-r from-orange-50 to-amber-50 p-8 rounded-2xl mb-10 border border-orange-100 shadow-inner">
                                <p class="text-gray-800 text-3xl font-extrabold mb-4 flex items-center justify-center"><span class="mr-3">🌟</span>您答對了 <span class="text-emerald-600 text-5xl mx-3 font-black drop-shadow-sm">${quizState.score}</span> 題</p>
                                <p class="text-gray-500 text-xl font-medium bg-white/60 inline-block px-4 py-1 rounded-full border border-gray-200">共 ${total} 題，答錯或未答 ${total - quizState.score} 題</p>
                            </div>
                            
                            <div class="space-y-5">
                                <button onclick="switchTab('mistakes')" class="w-full bg-gradient-to-r from-rose-500 to-red-600 hover:from-rose-600 hover:to-red-700 text-white font-bold py-5 px-6 text-2xl rounded-2xl shadow-[0_8px_15px_rgba(225,29,72,0.3)] transition transform hover:scale-[1.02] border-2 border-white/20 flex items-center justify-center">
                                    <span class="text-3xl mr-3">📓</span>立刻複習錯題
                                </button>
                                <button onclick="startQuiz()" class="w-full bg-white hover:bg-orange-50 text-orange-800 font-bold py-5 px-6 text-2xl rounded-2xl shadow-md transition border-2 border-orange-200 hover:border-orange-400 flex items-center justify-center">
                                    <span class="text-3xl mr-3">🔄</span>重新挑戰 ${total} 題
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Double confetti for finishing
            confetti({ particleCount: 300, spread: 100, origin: { y: 0.5, x: 0.2 }, colors: ['#f59e0b', '#ea580c', '#ef4444'] });
            setTimeout(() => {
                confetti({ particleCount: 300, spread: 100, origin: { y: 0.5, x: 0.8 }, colors: ['#10b981', '#3b82f6', '#ec4899'] });
            }, 500);
        };

        window.clearQuizHistory = () => {
            if(confirm('🚨 警告：確定要清除目前的作答紀錄嗎？\n這將會重置所有已作答的題目！')) {
                if(confirm('⚠️ 【雙重確認】\n清除後將無法復原，請再次確認是否要「清除作答紀錄」？')) {
                    quizState = { active: false, score: 0, questions: [], userAnswers: [] };
                    saveQuizState();
                    updateNavQuizStats();
                    renderQuizView(el('main-content'));
                }
            }
        };

        // --- 錯題本 ---
        window.renderMistakes = (container) => {
            if(!container) container = el('main-content');
            if(userData.mistakes.length === 0) {
                container.innerHTML = `
                    <div class="w-full h-full flex items-center justify-center p-6 text-gray-500 flex-col bg-gray-50/50">
                        <div class="text-9xl mb-8 animate-bounce drop-shadow-md">🎉</div>
                        <p class="text-3xl font-extrabold text-emerald-600 mb-4 bg-emerald-50 px-6 py-2 rounded-full border border-emerald-200">太棒了！目前沒有錯題紀錄。</p>
                        <p class="text-xl">請繼續保持優秀的學習狀態！🌟</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full p-4 md:p-8 overflow-y-auto bg-rose-50/30">
                    <div class="max-w-4xl mx-auto">
                        <div class="flex justify-between items-center bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-rose-200 mb-8 sticky top-0 z-20 backdrop-blur-md bg-white/90">
                            <h2 class="text-3xl md:text-4xl font-extrabold text-rose-800 flex items-center tracking-wide"><span class="bg-rose-100 p-2 rounded-xl mr-4 text-rose-600">📓</span>錯題本精華</h2>
                            <button onclick="clearMistakes()" class="text-lg bg-white hover:bg-red-50 text-red-500 hover:text-red-700 font-bold px-4 py-2 rounded-xl transition-colors border border-red-200 hover:border-red-400 shadow-sm flex items-center">
                                <i class="fas fa-trash-alt mr-2"></i>清空錯題
                            </button>
                        </div>
                        <div class="space-y-8">
                            ${userData.mistakes.map((m, i) => `
                                <div class="bg-white p-6 md:p-8 rounded-3xl shadow-md border-t-8 border-rose-400 hover:shadow-lg transition-shadow">
                                    <h3 class="font-bold text-gray-800 mb-6 text-2xl md:text-3xl leading-relaxed flex items-start">
                                        <span class="bg-rose-100 text-rose-800 px-3 py-1 rounded-lg text-xl mr-3 shrink-0 mt-1">Q${i+1}</span>
                                        <span>${m.q}</span>
                                    </h3>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 text-lg">
                                        ${m.opts.map((opt, idx) => `
                                            <div class="p-4 rounded-xl flex items-center ${idx === m.ans ? 'bg-emerald-50 text-emerald-900 font-bold border-2 border-emerald-400 shadow-sm scale-[1.02] transform' : 'bg-gray-50 text-gray-500 border border-gray-200'} transition-transform">
                                                <span class="w-10 h-10 shrink-0 flex items-center justify-center rounded-lg mr-3 font-extrabold ${idx === m.ans ? 'bg-emerald-500 text-white shadow-sm' : 'bg-gray-200 text-gray-400'}">${String.fromCharCode(65+idx)}</span>
                                                <span class="leading-relaxed">${opt}</span>
                                                ${idx === m.ans ? '<span class="ml-auto text-2xl animate-pulse">✅</span>' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.clearMistakes = () => {
            if(confirm('🚨 警告：確定要清空所有錯題紀錄嗎？')) {
                if(confirm('⚠️ 【雙重確認】\n清空後將無法復原，請再次確認是否要「清空錯題本」？')) {
                    userData.mistakes = [];
                    saveUserData();
                    renderMistakes();
                }
            }
        };

        // --- 我的最愛 ---
        window.renderFavorites = (container) => {
            if(!container) container = el('main-content');
            if(userData.favorites.length === 0) {
                container.innerHTML = `
                    <div class="w-full h-full flex items-center justify-center p-6 text-gray-500 flex-col bg-gray-50/50">
                        <div class="text-9xl mb-8 opacity-60 drop-shadow-sm">🤍</div>
                        <p class="text-3xl font-extrabold text-pink-700 mb-4 bg-pink-50 px-6 py-2 rounded-full border border-pink-200">目前還沒有收藏任何項目。</p>
                        <p class="text-xl">快到「📚 學習區」點擊 <span class="text-rose-500 mx-1"><i class="fas fa-heart"></i></span> 圖示加入收藏吧！</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full p-4 md:p-8 overflow-y-auto bg-pink-50/30">
                    <div class="max-w-5xl mx-auto">
                        <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-pink-200 mb-8 sticky top-0 z-20 backdrop-blur-md bg-white/90">
                            <h2 class="text-3xl md:text-4xl font-extrabold text-pink-800 flex items-center tracking-wide"><span class="bg-pink-100 p-2 rounded-xl mr-4 text-pink-500">❤️</span>我的最愛收藏庫</h2>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                            ${userData.favorites.map(favId => `
                                <div class="bg-white p-6 rounded-2xl shadow-sm border-2 border-pink-100 flex justify-between items-center group relative overflow-hidden transition-all duration-300 hover:shadow-xl hover:-translate-y-1 hover:border-pink-300">
                                    <div class="absolute inset-0 bg-gradient-to-br from-pink-50 to-rose-50 transform translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
                                    <span class="font-bold text-gray-800 z-10 text-xl md:text-2xl flex items-center"><span class="mr-3 text-pink-400 opacity-50 group-hover:opacity-100 transition-opacity">📌</span>${favId}</span>
                                    <button onclick="toggleFavorite('${favId}')" class="text-rose-500 hover:text-red-600 z-10 text-4xl transition-transform hover:scale-125 drop-shadow-sm" title="移除收藏"><i class="fas fa-heart"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        // 啟動
        initApp();
    </script>
</body>
</html>
