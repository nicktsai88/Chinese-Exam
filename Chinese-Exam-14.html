                gainNode.connect(audioCtx.destination);

            q.push({q:"「韋編」借代為什麼？",opts:["衣服","樂器","書籍","武器"],ans:2,exp:"古代竹簡用熟牛皮繩(韋)編連，故借代為「書籍」(如韋編三絕)。"});

            q.push({q:"「祝融」或「回祿」借代為什麼事件？",opts:["水災","地震","火災","颱風"],ans:2,exp:"祝融、回祿皆為傳說中的火神，借代為「火災」。"});
            q.push({q:"「巾幗」與「鬚眉」分別借代為什麼？",opts:["老人與小孩","女子與男子","文人與武將","君與臣"],ans:1,exp:"巾幗是古代婦女的頭巾(代指女子)；鬚眉是男子的鬍鬚與眉毛(代指男子)。"});
            q.push({q:"「干戈」、「烽火」、「狼煙」皆借代為什麼？",opts:["和平","戰爭","打獵","祭祀"],ans:1,exp:"干戈為武器，烽火、狼煙為古代報警的煙火，皆借代為「戰爭」。"});
            q.push({q:"「杜康」或「杯中物」借代為什麼？",opts:["茶","酒","果汁","毒藥"],ans:1,exp:"相傳杜康發明釀酒，故借代為「酒」。酒裝在杯中，故也稱「杯中物」。"});
            q.push({q:"劉禹錫的〈烏衣巷〉中，「舊時王謝堂前燕，飛入尋常百姓家」傳達了什麼感慨？",opts:["燕子喜歡熱鬧","春天生機盎然","世家大族的沒落與世事滄桑","百姓生活富裕"],ans:2,exp:"賞析指出，藉由燕子築巢地點的改變，暗指昔日豪門(王謝)已沒落為尋常百姓，感慨世事滄桑。"});
            q.push({q:"在〈晝居池上亭獨吟〉中，劉禹錫「閑想鶴儀形」是為了表現什麼情操？",opts:["渴望自由飛翔","身閒志不閒的高尚情操","喜歡飼養禽鳥","感嘆自己年老體衰"],ans:1,exp:"賞析提到，看到蜜蜂與想到仙鶴的君子形象，是為了表現自己即使遭貶，依然「身閒志不閒」的高尚情操。"});
            q.push({q:"〈晝居池上亭獨吟〉最後兩句「浩然機已息，几杖復何銘」，其「機」字作何解釋？",opts:["機器","機會","追逐名利的心態(機心)","危機"],ans:2,exp:"注釋指出，「機」指追逐名利的心態。心胸坦蕩後，名利之心已息。"});
            q.push({q:"劉向的〈槃水銘〉中，「小欹則傾，傾不可收」主要是在告誡我們什麼道理？",opts:["要多喝水","做人要小心謹慎，不可有絲毫偏差","不要使用淺盤子","傾聽別人的意見"],ans:1,exp:"語譯指出，盤水稍有傾斜就會溢出無法收回，藉此告誡為人處事必須「小心謹慎(兢兢)」。"});
            q.push({q:"崔瑗〈座右銘〉：「無道人之短，無說己之長」是在談論哪一方面的修養？",opts:["節制飲食","交友之道(不論人非，不誇己長)","努力讀書","隱居避世"],ans:1,exp:"意指不要議論別人的缺點，也不要誇耀自己的優點，屬於律己與待人的修養。"});
            q.push({q:"〈座右銘〉中，「施人慎勿念，受施慎勿忘」的態度為何？",opts:["斤斤計較","施恩不望報，受恩要圖報","不要隨便接受禮物","互相利用"],ans:1,exp:"給別人恩惠千萬別掛在心上；接受別人恩惠千萬不可忘記。"});
            q.push({q:"〈座右銘〉：「在涅貴不緇，曖曖內含光」中，「在涅貴不緇」的意思等同於下列哪一句成語？",opts:["同流合汙","出淤泥而不染","近墨者黑","光風霽月"],ans:1,exp:"「涅」是黑泥，「緇」是被染黑。處在汙濁中卻不被汙染，與「出淤泥而不染」同義。"});
            q.push({q:"〈座右銘〉：「柔弱生之徒，老氏誡剛強」是受到哪一家思想的影響？",opts:["儒家","法家","道家(老子)","墨家"],ans:2,exp:"「老氏」指老子，代表道家思想。老子主張柔弱勝剛強。"});
            q.push({q:"〈座右銘〉：「行行鄙夫志，悠悠故難量」中，「行行」的意思是？",opts:["走路很快","剛強的樣子","見識淺薄","閒靜的樣子"],ans:1,exp:"注釋指出，「行行」音ㄏㄤˋ ㄏㄤˋ，指剛強的樣子。見識淺薄的人才喜歡表現出剛強好鬥的模樣。"});
            q.push({q:"綜觀《陋室銘》、《槃水銘》與《座右銘》，「銘」這種文體最核心的精神是什麼？",opts:["描寫美麗的風景","抒發男女之間的情感","警惕自己或讚頌他人","紀錄國家的重大歷史"],ans:2,exp:"「銘」為古代文體名，刻在器物或石碑上，主要功能就是「警惕自己或讚頌他人」。"});

            return q;
        };

                    drawer.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');

        const loadRecentUsers = async () => {
            if (!isFirebaseInitialized || !currentUser) return;
            try {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'recent_users', COLLECTION_NAME);
                const snap = await getDoc(ref);
                if(snap.exists() && snap.data().users) {
                    recentUsers = snap.data().users;
                }
            } catch(e) { console.error("Load Recent Users Error", e); }
            if (currentTab === 'login') renderLogin();
        };

        const saveRecentUser = async (name) => {
            if (!isFirebaseInitialized || !currentUser) return;
            try {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'recent_users', COLLECTION_NAME);
                await setDoc(ref, {
                    users: arrayUnion(name)
                }, { merge: true });
                
                if (!recentUsers.includes(name)) {
                    recentUsers.push(name);
                }
            } catch(e) { console.error("Save Recent User Error", e); }
        };

        const initApp = async () => {
            renderApp();
            if (isFirebaseInitialized) {
                await initAuth(); 
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        await loadUserData();
                        await loadRecentUsers();
                        if (username) {
                            renderMain();
                        } else {
                            renderLogin();
                        }
                    } else {
                        renderLogin();
                    }
                });
            } else {
                if (username) renderMain(); else renderLogin();
            }
        };

        window.handleLogin = async (name) => {
            if(!name.trim()) {
                const inputEl = document.getElementById('usernameInput');
                inputEl.classList.add('border-red-500', 'bg-red-50');
                inputEl.placeholder = "名稱不能為空！";
                setTimeout(() => {
                    inputEl.classList.remove('border-red-500', 'bg-red-50');
                    inputEl.placeholder = "請輸入您的姓名/座號";
                }, 2000);
                return;
            }
            username = name;
            
            await loadUserData();
            
            if (isFirebaseInitialized && currentUser) {
                const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid);
                await setDoc(userRef, { username, lastLogin: new Date() }, { merge: true });
                
                const loginRef = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME + '_logs'));
                await setDoc(loginRef, { type: 'login', time: new Date() });

                await saveRecentUser(name);
            }
            renderMain();
        };

        const loadUserData = async () => {
            let localData = null;
            if (username) {
                const stored = localStorage.getItem('loushiming_data_' + username);
                if (stored) {
                    try { localData = JSON.parse(stored); } catch(e) {}
                }
                
                const storedQuiz = localStorage.getItem('loushiming_quiz_' + username);
                if (storedQuiz) {
                    try { 
                        const qs = JSON.parse(storedQuiz); 
                        if (qs && qs.active) quizState = qs;
                    } catch(e) {}
                }
            }

            if (!isFirebaseInitialized || !currentUser) {
                if (localData) {
                    userData = localData;
                    if(!userData.favorites) userData.favorites = [];
                    if(!userData.mistakes) userData.mistakes = [];
                }
                return;
            }

            const ref = doc(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME, 'profile');
            try {
                const snap = await getDoc(ref);
                if (snap.exists()) {
                    userData = snap.data();
                    if(!userData.favorites) userData.favorites = [];
                    if(!userData.mistakes) userData.mistakes = [];
                    
                    if (localData) {
                        localData.favorites.forEach(f => { if(!userData.favorites.includes(f)) userData.favorites.push(f); });
                        localData.mistakes.forEach(m => { if(!userData.mistakes.find(um => um.id === m.id)) userData.mistakes.push(m); });
                    }
                } else {
                    if (localData) userData = localData;
                    await setDoc(ref, userData);
                }
            } catch(e) { 
                console.error("Load Data Error", e); 
                if (localData) userData = localData;
            }
        };

        const saveUserData = async () => {
            if (username) {
                localStorage.setItem('loushiming_data_' + username, JSON.stringify(userData));
            }

            if (!isFirebaseInitialized || !currentUser) return;
            const ref = doc(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME, 'profile');
            try {
                await updateDoc(ref, userData);
            } catch(e) { console.error("Save Data Error", e); }
        };

        window.toggleFavorite = async (itemId) => {
            const idx = userData.favorites.indexOf(itemId);
            if (idx > -1) {
                userData.favorites.splice(idx, 1);
            } else {
                userData.favorites.push(itemId);
            }
            saveUserData();
            if(currentTab === 'learn') renderLearnContent();
            if(currentTab === 'favorites') renderFavorites();
        };

                    <div class="absolute top-1/2 left-1/2 w-[30rem] h-[30rem] bg-amber-200/40 rounded-full mix-blend-multiply filter blur-[60px] -translate-y-1/2 -translate-x-1/2"></div>

                        <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-800 to-rose-700 mb-3 tracking-widest leading-tight serif-text">陋室銘</h1>

            renderLogin();

                    if(t === tab) {
                        btn.classList.add('bg-white/25', 'shadow-inner');
                        btn.classList.remove('hover:bg-white/20');
                    } else {
                        btn.classList.remove('bg-white/25', 'shadow-inner');
                        btn.classList.add('hover:bg-white/20');

                }
            });

            if(tab === 'quiz') renderQuizView(content);

            if(tab === 'favorites') renderFavorites(content);

                if (tab === 'quiz' && quizState.active) {

                    statsEl.classList.remove('flex');

        // --- 學習區 ---

        window.selectLearnTab = (id) => {

        window.renderLearnContent = () => {

                            </div>

                                <p class="font-bold text-xl mb-2 flex items-center"><i class="fas fa-book-reader mr-2 text-amber-600"></i>深度解析：</p>
                                <p class="text-xl leading-relaxed">${q.exp}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="bg-gradient-to-r from-orange-50 to-amber-50 px-8 py-5 border-b border-orange-100 flex justify-between items-center shadow-sm">

                    ${expHtml}

        window.answerWaterfall = (qIndex, optIdx) => {
            if (quizState.userAnswers[qIndex] !== null) return; 
            
            quizState.userAnswers[qIndex] = optIdx;
            const q = quizState.questions[qIndex];
            const isCorrect = optIdx === q.ans;

                quizState.score++;
                playCorrectSound();
            } else {
                playWrongSound();
                const mistakeId = q.q; 
                const exists = userData.mistakes.find(m => m.id === mistakeId);
                if(!exists) {
                    userData.mistakes.push({
                        id: mistakeId,
                        q: q.q,
                        opts: q.opts,
                        ans: q.ans,
                        time: new Date().toISOString()
                    });
                    saveUserData();
                }
            }

            const card = el(`q-card-${qIndex}`);
            if(card) {
                card.innerHTML = getQuestionCardHtml(qIndex);
            }

            saveQuizState();
        };

        window.clearQuizHistory = () => {
            if (confirm("警告：確定要清除目前的測驗作答紀錄嗎？\n此動作將無法復原！")) {
                if (confirm("【雙重確認】\n真的要清除所有作答進度並重新開始嗎？")) {

                    answeredCount++;
                    if (ans === quizState.questions[idx].ans) {
                        correctCount++;
                    } else {
                        wrongCount++;
                    }
                }
            });

            const progress = (answeredCount / total) * 100;

            const wrongEl = el('quiz-wrong-count');

            if(text) text.innerText = `${answeredCount} / ${total}`;
            if(correctEl) correctEl.innerText = correctCount;
            if(wrongEl) wrongEl.innerText = wrongCount;
            
            if(answeredCount === total && btn) {

            }

            confetti({
                particleCount: 300,
                spread: 120,

            const container = el('main-content');

                        <p class="text-3xl font-black text-emerald-800 serif-text tracking-wider">完美無瑕！</p>

                    </div>`;
                return;

            container.innerHTML = `
                <div class="w-full flex-1 p-6 md:p-10 overflow-y-auto pb-24 relative animate-fade-in">

                    <div class="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-rose-100/50 to-transparent pointer-events-none"></div>

                    <div class="max-w-5xl mx-auto relative z-10">
                        <div class="flex flex-col sm:flex-row justify-between items-center bg-white/80 backdrop-blur p-6 rounded-2xl shadow-sm border border-rose-100 mb-10 sticky top-0 z-20">
                            <h2 class="text-4xl font-black text-rose-800 serif-text tracking-widest"><i class="fas fa-book-dead mr-4 text-rose-500"></i>錯題檢討本</h2>

                                    <h3 class="font-bold text-gray-900 mb-8 text-2xl md:text-3xl leading-loose mt-4"><span class="text-rose-500 mr-2 font-black">Q${i+1}.</span> ${m.q}</h3>
                                    
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 text-xl">
                                        ${m.opts.map((opt, idx) => `
                                            <div class="p-5 rounded-2xl transition-colors ${idx === m.ans ? 'bg-emerald-50 text-emerald-900 font-bold border-2 border-emerald-400 shadow-sm transform scale-[1.02]' : 'bg-gray-50 text-gray-600 border border-gray-200'}">
                                                <span class="${idx === m.ans ? 'text-emerald-600' : 'text-gray-400'} font-bold mr-2">${String.fromCharCode(65+idx)}.</span> ${opt}
                                                ${idx === m.ans ? '<i class="fas fa-check-circle ml-3 text-emerald-500 text-2xl float-right"></i>' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                    
                                    <div class="mt-8 p-6 bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-2xl text-orange-950 shadow-sm text-xl relative overflow-hidden">
                                        <i class="fas fa-lightbulb absolute -right-4 -top-4 text-7xl text-amber-200 opacity-50"></i>
                                        <p class="font-bold mb-3 text-2xl border-b border-amber-200 pb-2"><i class="fas fa-chalkboard-teacher mr-3 text-amber-600"></i>老師名師解析：</p>
                                        <p class="leading-relaxed mt-4 relative z-10">${generate120Questions().find(q => q.q === m.q)?.exp || '請參考講義內容進行深度複習。'}</p>
                                    </div>
                                </div>
                            `).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.clearMistakes = () => {
            if(confirm('警告：確定要清空所有錯題紀錄嗎？\n此動作將無法復原！')) {
                if(confirm('【雙重確認】\n真的要刪除好不容易累積的錯題本嗎？')) {
                    userData.mistakes = [];
                    saveUserData();
                    renderMistakes();
                }
            }
        };

        // --- 我的最愛 ---
        window.renderFavorites = (container) => {
            if(!container) container = el('main-content');
            
            if(userData.favorites.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-6 flex-col animate-fade-in">
                        <div class="w-40 h-40 bg-pink-100 rounded-full flex items-center justify-center mb-8 shadow-inner border-[8px] border-white">
                            <i class="fas fa-heart-broken text-8xl text-pink-300 transform -rotate-12"></i>
                        </div>
                        <p class="text-3xl font-black text-pink-800 serif-text tracking-wider">典藏庫空空如也</p>
                        <p class="text-xl text-pink-600 mt-4 font-medium bg-white/50 px-8 py-4 rounded-full backdrop-blur-sm border border-pink-100">趕快前往「學習區」，點擊 <i class="fas fa-heart text-rose-500 mx-2 animate-pulse"></i> 圖示收藏重點精華！</p>
                        <button onclick="switchTab('learn')" class="mt-8 bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-transform hover:-translate-y-1">前往學習區</button>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full flex-1 p-6 md:p-10 overflow-y-auto pb-24 relative animate-fade-in">
                    <!-- 背景裝飾 -->
                    <div class="absolute top-0 right-0 w-full h-64 bg-gradient-to-b from-pink-100/50 to-transparent pointer-events-none"></div>

                    <div class="max-w-5xl mx-auto relative z-10">
                        <div class="bg-white/80 backdrop-blur p-6 rounded-2xl shadow-sm border border-pink-100 mb-10 sticky top-0 z-20">
                            <h2 class="text-4xl font-black text-rose-800 serif-text tracking-widest"><i class="fas fa-heart mr-4 text-rose-500"></i>專屬精華典藏庫</h2>
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                            ${userData.favorites.map(favId => `
                                <div class="bg-white/95 backdrop-blur-sm p-8 rounded-3xl shadow-lg border border-pink-100 flex flex-col justify-between group relative overflow-hidden transition-all duration-300 hover:shadow-2xl hover:-translate-y-2">
                                    <div class="absolute inset-0 bg-gradient-to-br from-pink-50 to-rose-50 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
                                    <div class="absolute -right-6 -bottom-6 text-9xl text-pink-100 opacity-30 transform group-hover:scale-110 group-hover:rotate-12 transition-all duration-500 pointer-events-none"><i class="fas fa-quote-right"></i></div>
                                    
                                    <span class="font-bold text-gray-800 z-10 text-2xl md:text-3xl leading-relaxed mb-6">${favId}</span>
                                    
                                    <div class="flex justify-end z-10 mt-4 pt-4 border-t border-pink-100/50">
                                        <button onclick="toggleFavorite('${favId}')" class="text-rose-500 hover:text-red-600 bg-rose-50 hover:bg-rose-100 w-12 h-12 rounded-full flex items-center justify-center text-2xl transition-colors shadow-sm" title="移除收藏"><i class="fas fa-heart"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        initApp();

    </script>
</body>
</html>
