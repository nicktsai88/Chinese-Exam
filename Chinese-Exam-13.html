        // ==========================================

            if (!isFirebaseInitialized || !currentUser) return;
            try {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'recent_users', COLLECTION_NAME);

                    if (user) {
                        currentUser = user;
                        await loadUserData();
                        await loadRecentUsers();
                        if (username) {
                            renderMain();
                        } else {
                            renderLogin();

                    } else {
                        renderLogin();
                    }

            if(!name.trim()) {
                const inputEl = document.getElementById('usernameInput');
                inputEl.classList.add('border-red-500', 'bg-red-50');
                inputEl.placeholder = "名稱不能為空！";
                setTimeout(() => {
                    inputEl.classList.remove('border-red-500', 'bg-red-50');

                return;

            await loadUserData();
            
            if (isFirebaseInitialized && currentUser) {
                const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid);
                await setDoc(userRef, { username, lastLogin: new Date() }, { merge: true });
                
                const loginRef = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME + '_logs'));
                await setDoc(loginRef, { type: 'login', time: new Date() });

                await saveRecentUser(name);
            }

        const loadUserData = async () => {
            if (isFirebaseInitialized && currentUser) {
                const ref = doc(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME, 'profile');
                try {
                    const snap = await getDoc(ref);
                    if (snap.exists()) {
                        const d = snap.data();
                        if(d.favorites) userData.favorites = d.favorites;
                        if(d.mistakes) userData.mistakes = d.mistakes;
                    }
                } catch(e) { console.error("Load Data Error", e); }
            } else {
                try {
                    const localData = localStorage.getItem(`cambridge_${username}_data_exam_L4`);
                    if (localData) {
                        const d = JSON.parse(localData);
                        if(d.favorites) userData.favorites = d.favorites;
                        if(d.mistakes) userData.mistakes = d.mistakes;
                    }
                } catch(e) {}
            }
            
            try {
                const localQuiz = localStorage.getItem(`cambridge_${username}_quiz_exam_L4`);
                if (localQuiz) {
                    const q = JSON.parse(localQuiz);
                    if (q && q.active) {
                        quizState = q;

        const saveUserData = async () => {
            try {
                if (username) {
                    localStorage.setItem(`cambridge_${username}_data_exam_L4`, JSON.stringify(userData));
                }
            } catch(e) {}

            if (!isFirebaseInitialized || !currentUser) return;
            const ref = doc(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME, 'profile');
            try {
                await setDoc(ref, userData, { merge: true }); 
            } catch(e) { console.error("Save Data Error", e); }
        };

        const saveQuizState = () => {
            try {

            const idx = userData.favorites.indexOf(itemId);

            renderLogin();

            ['learn', 'quiz', 'mistakes', 'favorites'].forEach(t => {

                    if(t === tab) {

                        btn.classList.remove('text-white/70', 'hover:bg-white/10');
                    } else {
                        btn.classList.remove('bg-white/20', 'text-white', 'shadow-sm');
                        btn.classList.add('text-white/70', 'hover:bg-white/10');

                    navStats.classList.add('flex');

            if(tab === 'favorites') renderFavorites(content);

            `;

                });
            }, 0);
        };

        // --- 測驗區 ---
        const renderQuizView = (container) => {

        const renderQuizWaterfall = (container) => {

                const mistakeId = q.q;

                        id: mistakeId, q: q.q, opts: q.opts, ans: q.ans, time: new Date().toISOString()

            const block = document.getElementById(`q-block-${qIdx}`);

        window.finishQuizWaterfall = async () => {

                            ${userData.favorites.map(favId => `
                                <div class="bg-white p-6 md:p-8 rounded-3xl shadow-md border border-rose-100 flex flex-col justify-between group relative overflow-hidden transition-all duration-300 hover:shadow-xl hover:-translate-y-2 w-full h-full min-h-[160px]">
                                    <div class="absolute -right-10 -bottom-10 w-32 h-32 bg-gradient-to-tl from-rose-100 to-orange-50 rounded-full opacity-50 group-hover:scale-150 transition-transform duration-500 ease-out"></div>
                                    <span class="font-bold text-orange-950 z-10 text-xl md:text-2xl break-words flex-1 leading-relaxed mb-4">${favId}</span>
                                    <div class="flex justify-end mt-auto z-10">
                                        <button onclick="toggleFavorite('${favId}')" class="bg-rose-50 hover:bg-rose-500 text-rose-500 hover:text-white w-12 h-12 rounded-full flex items-center justify-center text-xl transition-colors shadow-sm"><i class="fas fa-heart"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        // 啟動應用
        initApp();

    </script>
</body>
</html>
