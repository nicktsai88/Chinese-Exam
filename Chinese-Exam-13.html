                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        };

                            <p class="text-gray-700 leading-relaxed">徐志摩引陸游〈醉中到白崖而歸〉詩，文字略異。原詩作：「醉眼朦朧萬事空，今年痛飲讓西東。傳呼快馬迎新月，卻上輕輿御晚風。行路八千常是客，丈夫五十未稱翁。亂山缺處如橫線，遙指孤城翠靄中。」（按：讓，山間的溪流通到江裡去的，蜀人多稱為「讓」）此詩作於陸游任職夔州通判時，故徐志摩說：「這是做地方官的風流。」</p>

                                <p class="text-gray-800 italic mb-2">僵臥孤村不自哀，尚思為國戍輪臺。<br>夜闌臥聽風吹雨，鐵馬冰河入夢來。</p>
                                <p class="text-gray-600 text-sm"><span class="font-bold">語譯：</span>我直挺挺躺在孤寂荒涼的鄉村裡，不為自己的處境而感到悲哀，心中還想著替國家防衛邊疆。夜將盡了，我在床上聽著風雨聲，迷迷糊糊地夢見，自己騎著披著鐵甲的戰馬，跨過冰封的河流出征北方疆場。</p>
                            </div>

                            <div class="poem-box">
                                <div class="poem-title">② 示兒</div>
                                <p class="text-gray-800 italic mb-2">死去原知萬事空，但悲不見九州同。<br>王師北定中原日，家祭毋忘告乃翁。</p>
                                <p class="text-gray-600 text-sm"><span class="font-bold">語譯：</span>我原本就知道人一死去便萬事皆空，但令我放心不下、感到悲傷的，就是沒看見國家統一。等到軍隊北伐平定中原的那一天，祭祀祖先的時候，千萬不要忘記把這好消息告訴你的父親（即詩人本身）。</p>
                            </div>

                            <div class="poem-box">
                                <div class="poem-title">③ 遊山西村</div>
                                <p class="text-gray-800 italic mb-2">莫笑農家臘酒渾，豐年留客足雞豚。<br>山重水複疑無路，柳暗花明又一村。<br>簫鼓追隨春社近，衣冠簡樸古風存。<br>從今若許閒乘月，拄杖無時夜扣門。</p>
                                <p class="text-gray-600 text-sm"><span class="font-bold">語譯：</span>不要取笑農家為賀新春而釀造的臘酒太過渾濁，他們在豐收年歲會用豐盛佳餚來招待客人。且看此地層層疊疊的山巒密布、迂迴曲折的流水環繞，本以為無路可走，沒想到穿過茂密幽暗的柳樹叢林，卻見繁花盛放的美景，又出現一座村莊。村裡吹簫擊鼓、熱鬧歡慶，可知祭祀土神，以祈農事豐收的春社之日快到了，當地居民穿著樸實無華，保存著簡樸古風。今後若容許我趁著月色當空的夜晚到此閒遊，我將拄著拐杖再度叩門拜訪山村農家。</p>
                                <p class="text-gray-700 text-sm mt-2 font-bold">全詩對江南春天柳暗花明的美景，還有熱鬧的節日氣氛及村民殷勤待客的熱情，都有深入的描寫。第三、四句以景寓理，更是千古傳誦的佳句。綜合而論，愛國與愛民的思想貫穿了陸游的文學作品，由其作品也可想見他的人格。</p>

                    if (i === q.ans) { btnClass += "border-emerald-500 bg-emerald-100 text-emerald-800 font-bold scale-[1.01] shadow-md z-10 relative"; iconHtml = `<span class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-emerald-500 text-white flex items-center justify-center mr-4 md:mr-6 font-bold text-xl md:text-2xl shrink-0"><i class="fas fa-check"></i></span>`; }
                    else if (i === q.selectedAns) { btnClass += "border-red-500 bg-red-50 text-red-800 font-bold scale-[0.99]"; iconHtml = `<span class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-red-500 text-white flex items-center justify-center mr-4 md:mr-6 font-bold text-xl md:text-2xl shrink-0"><i class="fas fa-times"></i></span>`; }
                    else { btnClass += "border-gray-200 bg-gray-50 opacity-50 cursor-not-allowed"; }
                }
                optionsHtml += `<button ${q.showExplanation ? 'disabled' : `onclick="answerWaterfallQuestion(${qIdx}, ${i})"`} class="${btnClass}">${iconHtml}<span class="flex-1 leading-relaxed">${opt}</span></button>`;
            });

            let expHtml = '';
            if (q.showExplanation) {
                const isCorrect = q.selectedAns === q.ans;
                expHtml = `
                    <div class="mt-8 p-6 md:p-8 rounded-xl border-2 ${isCorrect ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'} animate-fade-in shadow-inner">
                        <div class="flex items-center mb-6">
                            <i class="fas ${isCorrect ? 'fa-check-circle text-emerald-500' : 'fa-times-circle text-red-500'} text-4xl mr-4"></i>
                            <span class="font-bold text-3xl">${isCorrect ? '太棒了，答對了！' : '哎呀，答錯了！'}</span>
                        </div>
                        <div class="bg-white bg-opacity-70 p-5 md:p-8 rounded-lg border ${isCorrect ? 'border-emerald-100' : 'border-red-100'}">
                            <p class="font-bold mb-3 text-2xl"><i class="fas fa-lightbulb text-yellow-500 mr-2"></i>完整題目解析：</p>
                            <p class="mt-3 text-xl">正確答案為 <strong class="${isCorrect ? 'text-emerald-700' : 'text-red-700'} text-2xl">(${String.fromCharCode(65+q.ans)}) ${q.opts[q.ans]}</strong>。</p>
                            <div class="mt-5 p-5 md:p-6 bg-orange-50 border border-orange-200 rounded-lg text-orange-900 shadow-sm"><p class="font-bold text-xl mb-2"><i class="fas fa-book-reader mr-2 text-orange-700"></i>深度解析：</p><p class="text-xl leading-relaxed">${q.exp}</p></div>
                        </div>
                    </div>`;
            }

            return `
                <div class="bg-gray-50 px-6 md:px-8 py-5 border-b border-gray-100 flex justify-between items-center transition-colors ${q.showExplanation ? (q.selectedAns === q.ans ? 'bg-emerald-50' : 'bg-red-50') : ''}">
                    <span class="font-bold text-gray-700 text-xl">第 ${qIdx + 1} 題</span>
                    ${q.showExplanation ? (q.selectedAns === q.ans ? '<span class="text-emerald-600 font-bold text-xl"><i class="fas fa-check mr-1"></i>答對</span>' : '<span class="text-red-600 font-bold text-xl"><i class="fas fa-times mr-1"></i>答錯</span>') : '<span class="text-gray-400 font-medium text-lg"><i class="fas fa-pen mr-1"></i>尚未作答</span>'}
                </div>
                <div class="p-6 md:p-10"><h3 class="text-2xl md:text-3xl font-bold text-gray-800 mb-8 leading-relaxed">${q.q}</h3><div class="space-y-5">${optionsHtml}</div>${expHtml}</div>`;
        };

        window.answerWaterfallQuestion = (qIdx, optIdx) => {
            const q = quizState.questions[qIdx]; if(q.showExplanation) return;
            const isCorrect = optIdx === q.ans;
            q.selectedAns = optIdx; q.showExplanation = true; q.isCorrect = isCorrect;
            
            if (isCorrect) { playCorrectSound(); confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 }, zIndex: 10000, colors: ['#10b981', '#34d399', '#f59e0b'] }); }
            else {
                playWrongSound();
                const mistakeId = q.q; const exists = userData.mistakes.find(m => m.id === mistakeId);
                if(!exists) { userData.mistakes.push({ id: mistakeId, q: q.q, opts: q.opts, ans: q.ans, time: new Date().toISOString() }); saveUserData(); }
            }
            const block = document.getElementById(`q-block-${qIdx}`); if (block) block.innerHTML = generateSingleQuestionHtml(qIdx);
            updateQuizStats();
        };

        window.finishQuizWaterfall = async () => {
            let correctCount = 0, answeredCount = 0;
            quizState.questions.forEach(q => { if (q.showExplanation) { answeredCount++; if (q.isCorrect) correctCount++; } });
            if (answeredCount < quizState.questions.length) { if(!confirm(`您還有 ${quizState.questions.length - answeredCount} 題尚未作答，確定要直接交卷結算嗎？`)) return; }

            quizState.active = false; const total = quizState.questions.length; const scorePercent = Math.round((correctCount / total) * 100);
            const navStats = el('nav-quiz-stats'); if (navStats) { navStats.classList.add('hidden'); navStats.classList.remove('flex'); }

            if(isFirebaseInitialized && currentUser) {
                const docRef = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME + '_quizzes'));
                try { await setDoc(docRef, { score: scorePercent, date: new Date(), total, correct: correctCount }); } catch(e) {}
            }

            el('main-content').innerHTML = `
                <div class="w-full flex-1 flex items-center justify-center p-4 md:p-6 overflow-y-auto pb-24">
                    <div class="bg-white p-12 rounded-xl shadow-xl text-center max-w-4xl w-full border-t-8 border-orange-600 shrink-0">
                        <i class="fas fa-trophy text-8xl text-yellow-500 mb-6"></i>
                        <h2 class="text-4xl md:text-5xl font-bold mb-6">測驗完成！</h2>
                        <p class="text-7xl md:text-8xl font-extrabold text-orange-600 mb-10">${scorePercent} <span class="text-3xl md:text-4xl text-gray-500">分</span></p>
                        <p class="text-gray-600 mb-10 text-2xl md:text-3xl">您答對了 <span class="text-orange-600 font-bold">${correctCount}</span> 題，共作答 ${answeredCount} 題 <br><span class="text-xl md:text-2xl mt-3 inline-block">(總題數 ${total} 題)</span></p>
                        <div class="space-y-5">
                            <button onclick="switchTab('mistakes')" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-5 px-6 text-2xl rounded-lg shadow transition">查看錯題本</button>
                            <button onclick="startQuiz()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-5 px-6 text-2xl rounded-lg shadow transition">重新測驗</button>
                        </div>
                    </div>
                </div>`;
            confetti({ particleCount: 250, spread: 120, origin: { y: 0.4 }, zIndex: 10000 });
        };

        window.renderMistakes = (container) => {
            if(!container) container = el('main-content');
            if(userData.mistakes.length === 0) {
                container.innerHTML = `<div class="w-full flex-1 flex items-center justify-center p-4 md:p-6 text-gray-400 flex-col"><i class="fas fa-check-circle text-8xl md:text-9xl mb-6 text-amber-300"></i><p class="text-2xl md:text-3xl font-bold">太棒了！目前沒有錯題紀錄。</p></div>`;
                return;
            }
            container.innerHTML = `
                <div class="w-full flex-1 p-3 md:p-6 lg:p-8 overflow-y-auto pb-24"><div class="max-w-6xl mx-auto w-full">
                    <div class="flex justify-between items-center border-b-4 border-red-200 pb-4 mb-8"><h2 class="text-3xl md:text-4xl font-bold text-red-800"><i class="fas fa-book-dead mr-3"></i>錯題本</h2><button onclick="clearMistakes()" class="text-xl text-red-500 hover:text-red-700 font-bold underline shrink-0">清空錯題</button></div>
                    <div class="space-y-8">${userData.mistakes.map((m, i) => `
                        <div class="bg-white p-6 md:p-10 rounded-xl shadow-md border-l-8 border-red-400 w-full overflow-hidden">
                            <h3 class="font-bold text-gray-800 mb-6 text-2xl md:text-3xl">${i+1}. ${m.q}</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 text-xl">
                                ${m.opts.map((opt, idx) => `<div class="p-4 md:p-5 rounded-lg ${idx === m.ans ? 'bg-emerald-100 text-emerald-800 font-bold border-2 border-emerald-300 shadow-sm' : 'bg-gray-50 text-gray-600 border border-gray-200'}">${String.fromCharCode(65+idx)}. ${opt}${idx === m.ans ? '<i class="fas fa-check ml-2"></i>(正確答案)' : ''}</div>`).join('')}
                            </div>
                        </div>`).reverse().join('')}
                    </div>
                </div></div>`;
        };

        window.clearMistakes = () => { if(confirm('確定要清空所有錯題紀錄嗎？')) { userData.mistakes = []; saveUserData(); renderMistakes(); } };

        window.renderFavorites = (container) => {
            if(!container) container = el('main-content');
            if(userData.favorites.length === 0) {
                container.innerHTML = `<div class="w-full flex-1 flex items-center justify-center p-4 md:p-6 text-gray-400 flex-col"><i class="fas fa-heart-broken text-8xl md:text-9xl mb-6 text-pink-200"></i><p class="text-2xl md:text-3xl font-bold">目前還沒有收藏任何項目。</p><p class="text-xl mt-4">到「學習區」點擊愛心圖示即可收藏！</p></div>`;
                return;
            }
            container.innerHTML = `
                <div class="w-full flex-1 p-3 md:p-6 lg:p-8 overflow-y-auto pb-24"><div class="max-w-6xl mx-auto w-full">
                    <h2 class="text-3xl md:text-4xl font-bold text-pink-800 border-b-4 border-pink-200 pb-4 mb-8"><i class="fas fa-heart mr-3"></i>我的最愛</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
                        ${userData.favorites.map(favId => `
                            <div class="bg-white p-6 md:p-8 rounded-xl shadow-md border-2 border-pink-100 flex justify-between items-center group relative overflow-hidden transition-shadow hover:shadow-lg w-full">
                                <div class="absolute inset-0 bg-pink-50 transform translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                                <span class="font-bold text-gray-800 z-10 text-2xl md:text-3xl">${favId}</span>
                                <button onclick="toggleFavorite('${favId}')" class="text-pink-500 hover:text-red-600 z-10 text-4xl"><i class="fas fa-heart"></i></button>
                            </div>`).join('')}
                    </div>
                </div></div>`;
        };

        initApp();
    </script>
</body>
</html>
