        window.logout = () => {
            username = '';
            userData = { favorites: [], mistakes: [] };
            quizState = { active: false, currentQ: 0, score: 0, answers: [], questions: [], showExplanation: false, selectedAns: null };
            renderLogin();
        };

        window.switchTab = (tab) => {
            currentTab = tab;
            ['learn', 'quiz', 'mistakes', 'print'].forEach(t => {
                const btn = el(`nav-${t}`);
                if(btn) {
                    if(t === tab) {
                        btn.classList.add('bg-white/20', 'text-white', 'shadow-sm');
                        btn.classList.remove('text-white/70', 'hover:bg-white/10');
                    } else {
                        btn.classList.remove('bg-white/20', 'text-white', 'shadow-sm');
                        btn.classList.add('text-white/70', 'hover:bg-white/10');
                    }
                    if(t==='print') {
                         btn.classList.remove('bg-white/20', 'text-white', 'shadow-sm', 'text-white/70', 'hover:bg-white/10');
                         if(tab==='print') btn.classList.add('bg-white', 'text-orange-800', 'shadow-md');
                         else btn.classList.add('bg-orange-700/50', 'text-white', 'border', 'border-orange-400', 'hover:bg-orange-600');
                    }
                }
            });

            const navStats = el('nav-quiz-stats');
            if (navStats) {
                if (tab === 'quiz' && quizState.active) {
                    navStats.classList.remove('hidden');
                    navStats.classList.add('flex');
                    updateQuizStats();
                } else {
                    navStats.classList.add('hidden');
                    navStats.classList.remove('flex');
                }

            if(tab === 'learn') renderLearnView(content);
            if(tab === 'quiz') renderQuizView(content);
            if(tab === 'mistakes') renderMistakes(content);
            if(tab === 'print') renderPrintView(content);
        };

        const renderLearnView = (container) => {
            container.innerHTML = `
                <div class="flex-1 p-4 md:p-6 lg:p-10 overflow-y-auto overflow-x-hidden w-full relative z-10" id="learn-content-area"></div>
            `;
            renderLearnContent();
        };

        window.renderLearnContent = () => {
            const area = el('learn-content-area');
            if(!area) return;
            area.innerHTML = `
                <div class="max-w-5xl mx-auto w-full animate-fade-in pb-12">
                    ${learnData[0].content}

            `;

        const renderQuizView = (container) => {
            if(!quizState.active) {

            quizState.questions.forEach(q => {
                if (q.showExplanation) {

                    if (q.isCorrect) correct++; else incorrect++;

            const elCorrect = document.getElementById('nav-stat-correct');
            const elIncorrect = document.getElementById('nav-stat-incorrect');
            const elBar = document.getElementById('nav-stat-progress-bar');
            if (elCorrect) elCorrect.innerText = correct;
            if (elIncorrect) elIncorrect.innerText = incorrect;
            if (elBar) elBar.style.width = progressPercent + '%';

        const renderQuizWaterfall = (container) => {

            let html = `

                    </div>
                </div>

        const generateSingleQuestionHtml = (qIdx) => {
            const q = quizState.questions[qIdx];
            let optionsHtml = '';
            
            q.opts.forEach((opt, i) => {
                let btnClass = "w-full text-left p-4 md:p-5 text-lg md:text-xl rounded-2xl border-2 transition-all duration-200 flex items-center group relative overflow-hidden ";
                let iconHtml = `<span class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center mr-4 font-extrabold text-lg md:text-xl transition-colors shrink-0 shadow-inner group-hover:bg-orange-100 group-hover:text-orange-700">${String.fromCharCode(65+i)}</span>`;
                
                if (!q.showExplanation) {
                    btnClass += "border-orange-100 hover:border-orange-400 hover:bg-orange-50/50 bg-white cursor-pointer hover:shadow-md";
                } else {
                    if (i === q.ans) {
                        btnClass += "border-emerald-400 bg-emerald-50 text-emerald-900 font-bold shadow-md z-10 ring-2 ring-emerald-400/20";
                        iconHtml = `<span class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-emerald-500 text-white flex items-center justify-center mr-4 font-bold text-xl md:text-2xl shrink-0 shadow-sm">✅</span>`;
                    } else if (i === q.selectedAns) {
                        btnClass += "border-rose-400 bg-rose-50 text-rose-900 font-bold";
                        iconHtml = `<span class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-rose-500 text-white flex items-center justify-center mr-4 font-bold text-xl md:text-2xl shrink-0 shadow-sm">❌</span>`;
                    } else {
                        btnClass += "border-slate-100 bg-slate-50 opacity-50 cursor-not-allowed";
                    }
                }

                optionsHtml += `
                    <button ${q.showExplanation ? 'disabled' : `onclick="answerWaterfallQuestion(${qIdx}, ${i})"`} class="${btnClass}">
                        ${iconHtml}
                        <span class="flex-1 leading-relaxed break-words z-10 text-slate-800 group-hover:text-orange-950 font-bold">${opt}</span>
                    </button>
                `;
            });

            let explanationHtml = '';
            if (q.showExplanation) {
                const isCorrect = q.selectedAns === q.ans;
                explanationHtml = `
                    <div class="mt-8 p-5 md:p-8 rounded-2xl border ${isCorrect ? 'bg-emerald-50/50 border-emerald-200' : 'bg-rose-50/50 border-rose-200'} animate-fade-in w-full">
                        <div class="flex items-center mb-5 border-b ${isCorrect ? 'border-emerald-200/50' : 'border-rose-200/50'} pb-4">
                            <div class="w-12 h-12 rounded-full ${isCorrect ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'} flex items-center justify-center mr-4 shrink-0 text-3xl">
                                ${isCorrect ? '🎉' : '😲'}
                            </div>
                            <span class="font-extrabold text-2xl md:text-3xl ${isCorrect ? 'text-emerald-800' : 'text-rose-800'}">${isCorrect ? '太棒了，答對了！' : '哎呀，答錯了！'}</span>
                        </div>
                        <div class="w-full">
                            <p class="font-bold mb-3 text-lg md:text-xl text-slate-700 flex items-center"><span class="mr-2">🔍</span>正確解答</p>
                            <p class="mt-2 text-lg md:text-xl break-words text-slate-700 bg-white p-4 rounded-xl border border-orange-100 shadow-sm">正確答案為 <strong class="${isCorrect ? 'text-emerald-600' : 'text-rose-600'} text-xl md:text-2xl ml-2 font-black">(${String.fromCharCode(65+q.ans)}) ${q.opts[q.ans]}</strong></p>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="px-5 md:px-8 py-4 border-b border-orange-100 flex justify-between items-center transition-colors ${q.showExplanation ? (q.selectedAns === q.ans ? 'bg-gradient-to-r from-emerald-50 to-white' : 'bg-gradient-to-r from-rose-50 to-white') : 'bg-orange-50/30'}">
                    <span class="font-extrabold text-orange-400 text-lg md:text-xl bg-white px-3 py-1 rounded-lg border border-orange-100 shadow-sm">🤔 Q ${qIdx + 1}</span>
                    ${q.showExplanation 
                        ? (q.selectedAns === q.ans 
                            ? '<span class="text-emerald-600 font-bold text-lg md:text-xl flex items-center bg-emerald-100 px-3 py-1 rounded-full"><span class="mr-1.5">✅</span>答對</span>' 
                            : '<span class="text-rose-600 font-bold text-lg md:text-xl flex items-center bg-rose-100 px-3 py-1 rounded-full"><span class="mr-1.5">❌</span>答錯</span>') 
                        : '<span class="text-orange-400 font-bold text-sm md:text-base flex items-center bg-orange-100/50 px-3 py-1 rounded-full"><span class="mr-1.5">✍️</span>作答區</span>'}
                </div>
                <div class="p-5 md:p-8 w-full overflow-hidden">

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full">
                        ${optionsHtml}
                    </div>
                    ${explanationHtml}
                </div>
            `;
        };

        window.answerWaterfallQuestion = (qIdx, optIdx) => {
            const q = quizState.questions[qIdx];
            if(q.showExplanation) return; 

            const isCorrect = optIdx === q.ans;
            
            q.selectedAns = optIdx;
            q.showExplanation = true;
            q.isCorrect = isCorrect;
            
            if (isCorrect) {
                playCorrectSound();
                confetti({ particleCount: 60, spread: 70, origin: { y: 0.7 }, zIndex: 10000, colors: ['#f59e0b', '#fbbf24', '#fcd34d', '#ef4444', '#f97316'] });
            } else {
                playWrongSound();
                const mistakeId = q.q; 
                const exists = userData.mistakes.find(m => m.id === mistakeId);
                if(!exists) {
                    userData.mistakes.push({
                        id: mistakeId, q: q.q, opts: q.opts, ans: q.ans, time: new Date().toISOString()
                    });
                    saveUserData();
                }
            }
            saveQuizState();
            const block = document.getElementById(`q-block-${qIdx}`);
            if (block) {
                block.innerHTML = generateSingleQuestionHtml(qIdx);
            }
            updateQuizStats();
        };

        window.finishQuizWaterfall = async () => {
            let correctCount = 0;
            let answeredCount = 0;
            quizState.questions.forEach(q => {
                if (q.showExplanation) {
                    answeredCount++;
                    if (q.isCorrect) correctCount++;
                }
            });

            if (answeredCount < quizState.questions.length) {
                if(!confirm(`您還有 ${quizState.questions.length - answeredCount} 題尚未作答，確定要直接交卷結算嗎？`)) {
                    return;
                }
            }

            quizState.active = false;
            saveQuizState();
            
            const total = quizState.questions.length;
            const scorePercent = Math.round((correctCount / total) * 100);
            
            const navStats = el('nav-quiz-stats');
            if (navStats) {
                navStats.classList.add('hidden');
                navStats.classList.remove('flex');

            if(isFirebaseInitialized && currentUser) {

                try {
                    await setDoc(docRef, { score: scorePercent, date: new Date(), total, correct: correctCount });

                            🏆
                        </div>
                        
                        <h2 class="text-3xl md:text-4xl font-extrabold mb-4 text-orange-950">🎉 測驗完成！ 🎊</h2>
                        <div class="my-8 relative inline-block">

                            <span class="text-2xl md:text-3xl text-orange-600 font-bold absolute bottom-2 -right-10">分</span>
                        </div>
                        <div class="bg-orange-50/80 rounded-2xl p-6 mb-8 border border-orange-100 shadow-inner inline-block">
                            <p class="text-orange-900 text-xl md:text-2xl font-medium">答對 🎯 <span class="text-rose-600 font-black text-2xl mx-1">${correctCount}</span> 題 / 共作答 📝 ${answeredCount} 題</p>
                            <p class="text-sm md:text-base mt-2 text-orange-700/60 font-bold tracking-widest">(總題數 ${total} 題)</p>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-4 w-full">
                            <button onclick="switchTab('mistakes')" class="flex-1 bg-white border-2 border-orange-200 hover:border-orange-300 hover:bg-orange-50 text-orange-700 font-extrabold py-4 px-6 text-xl rounded-2xl shadow-sm hover:shadow-md transition-all">
                                🩹 查看錯題
                            </button>
                            <button onclick="startQuiz()" class="flex-1 bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-600 hover:to-red-700 text-white font-extrabold py-4 px-6 text-xl rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 border-b-4 border-red-800">
                                🔄 重新挑戰
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            confetti({ particleCount: 300, spread: 100, origin: { y: 0.3 }, zIndex: 10000, colors: ['#f59e0b', '#fbbf24', '#fcd34d', '#ef4444', '#f97316'] });
        };

        window.clearQuizHistory = () => {
            if(confirm('警告：確定要清除目前的作答紀錄嗎？\n(此動作將會遺失目前所有測驗進度)')) {
                if(confirm('【第二次確認】真的要清除作答紀錄並放棄目前測驗嗎？\n按下「確定」將會清空並返回測驗首頁。')) {
                    quizState = { active: false, currentQ: 0, score: 0, answers: [], questions: [], showExplanation: false, selectedAns: null };
                    saveQuizState();
                    const navStats = el('nav-quiz-stats');
                    if (navStats) {
                        navStats.classList.add('hidden');
                        navStats.classList.remove('flex');
                    }
                    renderQuizView(el('main-content'));
                }
            }
        };

        window.renderMistakes = (container) => {
            if(!container) container = el('main-content');
            if(userData.mistakes.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-4 md:p-6 text-orange-400 flex-col text-center relative z-10 animate-fade-in">
                        <div class="w-32 h-32 bg-emerald-50 rounded-full flex items-center justify-center mb-6 shadow-inner border-2 border-emerald-200 text-6xl">🥳</div>
                        <h2 class="text-3xl md:text-4xl font-extrabold text-orange-950 mb-2">太棒了！✨</h2>
                        <p class="text-xl md:text-2xl font-medium text-orange-800/60">目前沒有任何錯題紀錄 🎉</p>
                    </div>`;
                return;

            container.innerHTML = `
                <div class="w-full flex-1 p-3 md:p-6 lg:p-10 overflow-y-auto overflow-x-hidden pb-24 relative z-10">

                        <div class="flex justify-between items-end border-b-4 border-rose-200 pb-4 mb-10">
                            <div>
                                <h2 class="text-3xl md:text-4xl font-extrabold text-rose-800 flex items-center"><span class="bg-rose-100 text-rose-600 w-12 h-12 flex items-center justify-center rounded-xl mr-4">🩹</span>錯題本 📚</h2>
                                <p class="text-rose-900/50 mt-2 ml-16 font-medium">收錄您在測驗中答錯的題目，溫故知新 🔄💡</p>
                            </div>

                        </div>
                        <div class="space-y-8 md:space-y-10 w-full">
                            ${userData.mistakes.map((m, i) => `
                                <div class="bg-white p-6 md:p-10 rounded-3xl shadow-lg border border-orange-100 w-full overflow-hidden relative group">

                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-5 text-lg md:text-xl w-full">
                                        ${m.opts.map((opt, idx) => `
                                            <div class="p-4 md:p-5 rounded-2xl break-words transition-all ${idx === m.ans ? 'bg-emerald-50 text-emerald-900 font-bold border-2 border-emerald-400 shadow-md ring-2 ring-emerald-400/20' : 'bg-orange-50 text-slate-600 border border-orange-100'}">
                                                <span class="inline-block w-8 font-bold ${idx === m.ans ? 'text-emerald-600' : 'text-orange-400'}">${String.fromCharCode(65+idx)}.</span> ${opt}
                                                ${idx === m.ans ? '<span class="float-right text-emerald-500">✅</span>' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.clearMistakes = () => {
            if(confirm('警告：確定要清空所有錯題紀錄嗎？\n(此動作無法復原)')) {
                if(confirm('【第二次確認】真的要徹底清空錯題本嗎？\n按下「確定」將會刪除所有錯題資料。')) {
                    userData.mistakes = [];
                    saveUserData();
                    renderMistakes();
                }
            }
        };

        // ==========================================
        // 列印考卷功能
        // ==========================================
        window.renderPrintView = (container) => {
            container.innerHTML = `
                <div class="w-full flex-1 p-4 md:p-8 overflow-y-auto relative z-10 flex flex-col items-center">
                    <div class="bg-white p-8 rounded-3xl shadow-xl border border-orange-100 max-w-2xl w-full text-center">
                        <h2 class="text-3xl font-extrabold text-orange-950 mb-6 flex justify-center items-center">
                            <span class="bg-orange-100 text-orange-600 p-3 rounded-xl mr-4">🖨️</span>列印測驗卷
                        </h2>
                        <p class="text-lg text-slate-600 mb-8">選擇您要列印的卷別，系統將自動產生適合 A4 直式列印的排版。</p>
                        
                        <div class="flex flex-col sm:flex-row gap-4 justify-center">
                            <button onclick="executePrint(false)" class="bg-white border-2 border-orange-400 text-orange-700 hover:bg-orange-50 font-bold py-4 px-8 rounded-xl shadow-sm transition-all flex items-center justify-center text-xl group">
                                <span class="mr-2 group-hover:scale-110 transition-transform">📄</span> 學生空白卷
                            </button>
                            <button onclick="executePrint(true)" class="bg-gradient-to-r from-orange-500 to-red-600 text-white hover:from-orange-600 hover:to-red-700 font-bold py-4 px-8 rounded-xl shadow-md transition-all flex items-center justify-center text-xl group transform hover:-translate-y-1">
                                <span class="mr-2 group-hover:scale-110 transition-transform">🖍️</span> 教師解答卷
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.executePrint = (showAnswer) => {
            const printArea = document.getElementById('print-area');
            const mainContent = document.getElementById('main-content');
            
            let itemsHtml = '';
            wordData.forEach(w => {
                const ansText = showAnswer ? `<span class="print-ans-text">${w.a}</span>` : '';
                itemsHtml += `
                    <div class="print-item">
                        <span class="q-text">${w.no}. ${w.q}</span>
                        <div class="print-ans-box">${ansText}</div>
                    </div>
                `;
            });

            printArea.innerHTML = `
                <div class="print-title">道明中學 國二下 第2次段考範圍 國字注音測驗</div>
                <div class="print-header">
                    <span>班級：___________ 座號：_______ 姓名：_________________ 得分：___________</span>
                </div>
                <div class="print-grid">
                    ${itemsHtml}
                </div>
            `;

            // 移除隱藏，並隱藏主畫面以利列印引擎抓取完整高度
            printArea.classList.remove('hidden');
            if(mainContent) mainContent.classList.add('hidden');

            // 確保 DOM 更新後再觸發列印
            setTimeout(() => {
                window.print();
                // 列印對話框關閉後，恢復原本的畫面狀態
                printArea.classList.add('hidden');
                if(mainContent) mainContent.classList.remove('hidden');
            }, 300);
        };

        initApp();

    </script>
</body>
</html>
