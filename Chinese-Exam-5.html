        const playTone = (freq, type, duration) => {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) { }
        };

            q.push({ q:"在外地求學的郭襄，想寫明信片給她的姐姐郭芙。信封中欄的寫法應為？", opts:["郭芙 吾姐 啟", "郭芙 小姐 收", "郭芙 小姐 臺啟", "郭芙 吾姐 敬收"], ans:1 });
            q.push({ q:"王老師 惠鑒：暑假向您借閱的水滸傳已看完... (便條)，這段便條的提稱語犯了什麼錯誤？", opts:["老師不能用惠鑒，應用道鑒", "應該用膝下", "便條不能有提稱語", "惠鑒只能用於晚輩"], ans:0 });
            q.push({ q:"信件開頭的「應酬語」，主要功能是什麼？", opts:["交代最核心的機密事項", "述說正事前的客套話，表思念或感謝", "請對方幫忙買東西", "威脅對方回信"], ans:1 });
            
            q.push({ q:"「愚兄，您支持哪一位候選人？」這句話的稱呼有何錯誤？", opts:["愚兄是用來稱呼對方的", "愚兄是自謙詞，不能用來稱呼對方（應改為仁兄）", "候選人不能用支持", "沒有錯誤"], ans:1 });
            q.push({ q:"下列信封左欄(寄信人)的寫法，何者完全正確？", opts:["張三 敬啟", "張三 敬上", "張三 叩稟", "張三 緘"], ans:3 });
            q.push({ q:"如果收信人是平輩，寄信人(左欄)可以寫「王大明 緘」，若是寫給長輩呢？", opts:["王大明 謹緘", "王大明 敬啟", "王大明 叩上", "王大明 安啟"], ans:0 });
            q.push({ q:"現代書信中，如果已經用了「親愛的媽媽」，是否還一定要加上「膝下」等提稱語？", opts:["一定要，否則大不敬", "可以省略", "只能用尊前取代", "提稱語必須寫兩次"], ans:1 });
            q.push({ q:"關於便條的敘述，何者正確？", opts:["可以寫很多頁", "適合談論商業機密", "不須使用封套", "必須使用文言文撰寫"], ans:2 });

            return q;
        };

        // ==========================================
        //  應用程式狀態與邏輯
        // ==========================================
        let currentTab = 'login';
        let learnSubTab = 'sec1';
        let quizState = { active: false, currentQ: 0, score: 0, answers: [], questions: [], showExplanation: false, selectedAns: null };
        let isLearnMenuOpen = false;

        const el = id => document.getElementById(id);

        window.toggleLearnMenu = (show) => {
            isLearnMenuOpen = typeof show === 'boolean' ? show : !isLearnMenuOpen;
            const drawer = el('learn-drawer');
            const overlay = el('learn-overlay');
            if(drawer && overlay) {
                if(isLearnMenuOpen) {
                    drawer.classList.remove('-translate-x-full');
                    overlay.classList.remove('hidden');
                } else {
                    drawer.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
            }
        };

        const loadRecentUsers = async () => {
            if (!isFirebaseInitialized || !currentUser) return;
            try {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'recent_users', 'global_list');
                const snap = await getDoc(ref);
                if(snap.exists() && snap.data().users) {
                    recentUsers = snap.data().users;
                }
            } catch(e) { }
            if (currentTab === 'login') renderLogin();
        };

        const saveRecentUser = async (name) => {
            if (!isFirebaseInitialized || !currentUser) return;
            try {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'recent_users', 'global_list');
                await setDoc(ref, {
                    users: arrayUnion(name)
                }, { merge: true });
                
                if (!recentUsers.includes(name)) {
                    recentUsers.push(name);
                }
            } catch(e) { }
        };

        const initApp = async () => {
            renderApp();
            if (isFirebaseInitialized) {
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        await loadUserData();
                        await loadRecentUsers();
                        if (username) {
                            renderMain();
                        } else {
                            renderLogin();
                        }
                    } else {
                        try {
                            await signInAnonymously(auth);
                        } catch (e) { 
                            connectionStatus = 'error';
                            renderLogin();
                        }
                    }
                });
            } else {
                if (username) renderMain(); else renderLogin();
            }
        };

        window.handleLogin = async (name) => {
            if(!name.trim()) return alert("請輸入名稱");
            username = name;
            
            if (isFirebaseInitialized && currentUser) {
                const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid);
                await setDoc(userRef, { username, lastLogin: new Date() }, { merge: true });
                
                const loginRef = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME + '_logs'));
                await setDoc(loginRef, { type: 'login', time: new Date() });

                await saveRecentUser(name);
            }
            renderMain();
        };

        const loadUserData = async () => {
            if (!isFirebaseInitialized || !currentUser) return;
            const ref = doc(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME, 'profile');
            try {
                const snap = await getDoc(ref);
                if (snap.exists()) {
                    userData = snap.data();
                    if(!userData.favorites) userData.favorites = [];
                    if(!userData.mistakes) userData.mistakes = [];
                } else {
                    await setDoc(ref, userData);
                }
            } catch(e) { }
        };

        const saveUserData = async () => {
            if (!isFirebaseInitialized || !currentUser) return;
            const ref = doc(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME, 'profile');
            try {
                await updateDoc(ref, userData);
            } catch(e) { }
        };

        window.toggleFavorite = async (itemId) => {
            const idx = userData.favorites.indexOf(itemId);
            if (idx > -1) {
                userData.favorites.splice(idx, 1);
            } else {
                userData.favorites.push(itemId);
            }
            saveUserData();
            if(currentTab === 'learn') renderLearnContent();
            if(currentTab === 'favorites') renderFavorites();
        };

        // ==========================================
        //  UI 渲染邏輯
        // ==========================================
        const renderApp = () => {
            el('app').innerHTML = `
                <div id="view-container" class="w-full h-full flex flex-col"></div>
            `;
        };

        window.renderLogin = () => {
            currentTab = 'login';
            el('view-container').innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center bg-wood bg-opacity-30 relative overflow-hidden p-6">
                    <div class="absolute top-6 right-6 z-20">
                        <div class="flex flex-col items-end gap-3 w-full md:w-auto">
                            <div class="flex items-center bg-gray-50 px-4 py-2 rounded-full border border-gray-200 shadow-inner text-base font-bold text-gray-700">
                                <span class="status-dot ${connectionStatus === 'loading' ? 'status-loading' : connectionStatus === 'success' ? 'status-success' : 'status-error'}"></span>
                                ${connectionStatus === 'loading' ? '雲端讀取中...' : connectionStatus === 'success' ? '雲端已同步' : '雲端連線失敗'}
                            </div>
                        </div>
                    </div>
                    <div class="absolute -top-20 -left-20 w-80 h-80 bg-amber-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
                    <div class="absolute -bottom-20 -right-20 w-80 h-80 bg-yellow-300 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
                    <div class="bg-white p-10 rounded-xl shadow-2xl z-10 w-[30rem] max-w-full text-center border-t-8 border-amber-600">
                        <h1 class="text-3xl md:text-4xl font-bold text-wood-dark mb-4 tracking-widest">應用文</h1>
                        <p class="text-amber-700 mb-8 text-2xl font-bold">書信、便條 互動系統</p>
                        <div class="space-y-6">
                            <input type="text" id="usernameInput" placeholder="請輸入您的姓名/座號" class="w-full px-5 py-4 text-lg rounded-lg border-2 border-gray-300 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 text-center">
                            <button onclick="handleLogin(document.getElementById('usernameInput').value)" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-4 px-6 text-xl rounded-lg shadow-md transition duration-200">
                                開始學習
                            </button>
                        </div>
                        <div class="mt-10 border-t-2 border-gray-100 pt-6">
                            <p class="text-base text-gray-400 mb-3 font-medium">雲端最近登入</p>
                            <div class="flex flex-wrap justify-center gap-3">
                                ${recentUsers.length > 0 
                                    ? recentUsers.slice(-5).map(u => `<button onclick="handleLogin('${u}')" class="text-base font-bold bg-amber-50 border border-amber-200 text-amber-800 hover:bg-amber-100 px-4 py-2 rounded shadow-sm transition">${u}</button>`).join('')
                                    : `<span class="text-sm text-gray-400">尚無紀錄或尚未連線</span>`
                                }
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderMain = () => {
            el('view-container').innerHTML = `
                <nav class="bg-wood text-wood-dark shadow-md z-20">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="flex justify-between h-20">
                            <div class="flex items-center gap-4">
                                <span class="font-bold text-2xl tracking-widest hidden sm:block"><i class="fas fa-envelope-open-text mr-3 text-amber-700"></i>應用文學習</span>
                            </div>
                            <div class="flex items-center space-x-2 sm:space-x-4">
                                <button onclick="switchTab('learn')" id="nav-learn" class="px-4 py-3 rounded-md text-base md:text-lg font-bold hover:bg-amber-700 hover:text-white transition">學習區</button>
                                <button onclick="switchTab('quiz')" id="nav-quiz" class="px-4 py-3 rounded-md text-base md:text-lg font-bold hover:bg-amber-700 hover:text-white transition">測驗(50題)</button>
                                <button onclick="switchTab('mistakes')" id="nav-mistakes" class="px-4 py-3 rounded-md text-base md:text-lg font-bold hover:bg-amber-700 hover:text-white transition">錯題本</button>
                                <button onclick="switchTab('favorites')" id="nav-favorites" class="px-4 py-3 rounded-md text-base md:text-lg font-bold hover:bg-amber-700 hover:text-white transition">最愛</button>
                                <div class="ml-4 flex items-center pl-4 border-l-2 border-amber-400">
                                    <span class="text-lg font-bold mr-3"><i class="fas fa-user-circle mr-2"></i>${username}</span>
                                    <button onclick="logout()" class="text-lg text-red-600 hover:text-red-800" title="登出"><i class="fas fa-sign-out-alt"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </nav>
                <div id="main-content" class="flex-1 overflow-hidden bg-paper flex flex-col"></div>
            `;
            switchTab('learn');
        };

        window.logout = () => {
            username = '';
            userData = { favorites: [], mistakes: [] };
            renderLogin();
        };

        window.switchTab = (tab) => {
            currentTab = tab;
            ['learn', 'quiz', 'mistakes', 'favorites'].forEach(t => {
                const btn = el(`nav-${t}`);
                if(btn) {
                    if(t === tab) {
                        btn.classList.add('bg-amber-700', 'text-white');
                        btn.classList.remove('hover:bg-amber-700', 'hover:text-white');
                    } else {
                        btn.classList.remove('bg-amber-700', 'text-white');
                        btn.classList.add('hover:bg-amber-700', 'hover:text-white');
                    }
                }
            });

            const content = el('main-content');
            if(tab === 'learn') renderLearnView(content);
            if(tab === 'quiz') renderQuizView(content);
            if(tab === 'mistakes') renderMistakes(content);
            if(tab === 'favorites') renderFavorites(content);
        };

        // --- 學習區 ---
        const renderLearnView = (container) => {
            const currentData = learnData.find(d => d.id === learnSubTab);
            container.innerHTML = `
                <div class="w-full bg-amber-50 border-b border-amber-200 p-4 flex items-center shadow-sm z-10 shrink-0">
                    <button onclick="toggleLearnMenu(true)" class="text-amber-800 hover:text-amber-600 focus:outline-none flex items-center px-4 py-2 bg-white rounded border border-amber-300 shadow-sm mr-4 transition-colors">
                        <i class="fas fa-bars text-2xl mr-3"></i>
                        <span class="font-bold text-xl">單元選單</span>
                    </button>
                    <span class="font-bold text-2xl text-wood-dark" id="current-learn-title">${currentData ? currentData.title : ''}</span>
                    <button onclick="toggleFavorite('${currentData ? currentData.title : ''}')" class="ml-auto text-gray-300 hover:text-red-500 fav-btn text-3xl transition-transform hover:scale-110" data-id="${currentData ? currentData.title : ''}"><i class="fas fa-heart"></i></button>
                </div>
                <div id="learn-overlay" onclick="toggleLearnMenu(false)" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden transition-opacity"></div>
                <div id="learn-drawer" class="fixed inset-y-0 left-0 w-[22rem] bg-gray-50 border-r border-gray-200 z-40 transform -translate-x-full transition-transform duration-300 ease-in-out overflow-y-auto shadow-2xl flex flex-col">
                    <div class="p-6 bg-amber-100 flex justify-between items-center border-b border-amber-200 shrink-0">
                        <span class="font-bold text-2xl text-amber-900"><i class="fas fa-list-ul mr-3"></i>學習目錄</span>
                        <button onclick="toggleLearnMenu(false)" class="text-amber-800 hover:text-red-600 transition-colors"><i class="fas fa-times text-3xl"></i></button>
                    </div>
                    <ul class="py-4 flex-1">
                        ${learnData.map(d => `
                            <li>
                                <button onclick="selectLearnTab('${d.id}')" id="ltab-${d.id}" class="w-full text-left px-8 py-5 text-xl font-bold hover:bg-amber-100 transition-colors ${learnSubTab === d.id ? 'bg-amber-100 text-amber-800 border-l-8 border-amber-600' : 'text-gray-600 border-l-8 border-transparent'}">
                                    ${d.title}
                                </button>
                            </li>
                        `).join('')}
                    </ul>
                </div>
                <div class="flex-1 p-6 md:p-10 overflow-y-auto" id="learn-content-area"></div>
            `;
            renderLearnContent();
        };

        window.selectLearnTab = (id) => {
            learnSubTab = id;
            const data = learnData.find(d => d.id === id);
            const titleEl = el('current-learn-title');
            if(titleEl && data) titleEl.innerText = data.title;
            
            // 更新愛心按鈕的 data-id
            const favBtn = document.querySelector('#current-learn-title').nextElementSibling;
            if(favBtn && data) {
                favBtn.setAttribute('data-id', data.title);
            }

            learnData.forEach(d => {
                const btn = el(`ltab-${d.id}`);
                if(btn) {
                    if(d.id === id) {
                        btn.classList.add('bg-amber-100', 'text-amber-800', 'border-l-8', 'border-amber-600');
                        btn.classList.remove('text-gray-600', 'border-transparent');
                    } else {
                        btn.classList.remove('bg-amber-100', 'text-amber-800', 'border-l-8', 'border-amber-600');
                        btn.classList.add('text-gray-600', 'border-transparent');
                    }
                }
            });
            renderLearnContent();
            toggleLearnMenu(false);
        };

        window.renderLearnContent = () => {
            const area = el('learn-content-area');
            if(!area) return;
            const data = learnData.find(d => d.id === learnSubTab);
            area.innerHTML = `
                <div class="max-w-5xl mx-auto">
                    ${data.content}
                </div>
            `;
            setTimeout(() => {
                document.querySelectorAll('.fav-btn').forEach(btn => {
                    const id = btn.getAttribute('data-id');
                    if(userData.favorites.includes(id)) {
                        btn.classList.remove('text-gray-300');
                        btn.classList.add('text-red-500');
                    }
                });
            }, 0);
        };

        // --- 測驗區 ---
        const renderQuizView = (container) => {
            if(!quizState.active) {
                container.innerHTML = `
                    <div class="w-full flex items-center justify-center p-6 mt-10">
                        <div class="bg-white p-10 rounded-xl shadow-md text-center max-w-2xl border-t-8 border-emerald-600">
                            <i class="fas fa-pencil-alt text-6xl text-emerald-600 mb-6"></i>
                            <h2 class="text-3xl font-bold mb-6">綜合測驗 (共 50 題)</h2>
                            <p class="text-gray-600 mb-8 text-xl">題目涵蓋書信結構、信封格式、提稱語及敬謙詞對照等重點。挑戰自己是否完全吸收了！</p>
                            <button onclick="startQuiz()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 px-12 text-2xl rounded-full shadow-lg transition transform hover:scale-105">開始測驗</button>
                        </div>
                    </div>
                `;
            } else {
                renderQuizQuestion(container);
            }
        };

        window.startQuiz = () => {
            const qList = [...generate50Questions()].sort(() => 0.5 - Math.random());
            quizState = { active: true, currentQ: 0, score: 0, answers: [], questions: qList, showExplanation: false, selectedAns: null };
            renderQuizView(el('main-content'));
        };

        const renderQuizQuestion = (container) => {
            const qIdx = quizState.currentQ;
            if(qIdx >= quizState.questions.length) {
                finishQuiz(container);
                return;
            }
            
            const q = quizState.questions[qIdx];
            const progress = ((qIdx) / quizState.questions.length) * 100;

            let optionsHtml = '';
            q.opts.forEach((opt, i) => {
                let btnClass = "w-full text-left p-5 text-xl rounded-lg border-2 transition-all flex items-center group ";
                let iconHtml = `<span class="w-10 h-10 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center mr-5 font-bold text-xl transition-colors shrink-0">${String.fromCharCode(65+i)}</span>`;
                
                if (!quizState.showExplanation) {
                    btnClass += "border-gray-300 hover:border-emerald-500 hover:bg-emerald-50 group-hover:bg-emerald-500 group-hover:text-white";
                } else {
                    if (i === q.ans) {
                        btnClass += "border-emerald-500 bg-emerald-100 text-emerald-800 font-bold scale-100 shadow-md";
                        iconHtml = `<span class="w-10 h-10 rounded-full bg-emerald-500 text-white flex items-center justify-center mr-5 font-bold text-xl shrink-0"><i class="fas fa-check"></i></span>`;
                    } else if (i === quizState.selectedAns) {
                        btnClass += "border-red-500 bg-red-50 text-red-800 font-bold scale-[0.98]";
                        iconHtml = `<span class="w-10 h-10 rounded-full bg-red-500 text-white flex items-center justify-center mr-5 font-bold text-xl shrink-0"><i class="fas fa-times"></i></span>`;
                    } else {
                        btnClass += "border-gray-200 bg-gray-50 opacity-50";
                    }
                }

                optionsHtml += `
                    <button ${quizState.showExplanation ? 'disabled' : `onclick="answerQuestion(${i})"`} class="${btnClass}">
                        ${iconHtml}
                        <span>${opt}</span>
                    </button>
                `;
            });

            container.innerHTML = `
                <div class="w-full flex flex-col items-center p-6 md:p-10 overflow-y-auto">
                    <div class="w-full max-w-4xl bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">
                        <div class="bg-emerald-50 px-8 py-5 border-b border-emerald-100 flex justify-between items-center">
                            <span class="font-bold text-emerald-800 text-xl">第 ${qIdx + 1} / ${quizState.questions.length} 題</span>
                            <div class="w-1/2 bg-gray-200 rounded-full h-3">
                                <div class="bg-emerald-500 h-3 rounded-full transition-all duration-300" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        <div class="p-8 md:p-12">
                            <h3 class="text-2xl md:text-3xl font-bold text-gray-800 mb-8 leading-relaxed">${q.q}</h3>
                            <div class="space-y-4">
                                ${optionsHtml}
                            </div>
                            
                            ${quizState.showExplanation ? `
                                <div class="mt-8 p-6 rounded-xl border-2 ${quizState.selectedAns === q.ans ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'} animate-fade-in shadow-inner">
                                    <div class="flex items-center mb-4">
                                        <i class="fas ${quizState.selectedAns === q.ans ? 'fa-check-circle text-emerald-500' : 'fa-times-circle text-red-500'} text-3xl mr-3"></i>
                                        <span class="font-bold text-2xl">${quizState.selectedAns === q.ans ? '太棒了，答對了！' : '哎呀，答錯了！'}</span>
                                    </div>
                                    <div class="bg-white bg-opacity-70 p-5 rounded-lg border ${quizState.selectedAns === q.ans ? 'border-emerald-100' : 'border-red-100'}">
                                        <p class="font-bold mb-2 text-xl"><i class="fas fa-lightbulb text-yellow-500 mr-2"></i>完整題目解析：</p>
                                        <p class="mt-2 text-lg">正確答案為 <strong class="${quizState.selectedAns === q.ans ? 'text-emerald-700' : 'text-red-700'} text-xl">(${String.fromCharCode(65+q.ans)}) ${q.opts[q.ans]}</strong>。</p>
                                        <p class="mt-3 text-base text-gray-600">此題源自您所學習的《應用文-書信便條》重點講義內容，建議可至「學習區」多加複習來加深印象喔！</p>
                                    </div>
                                    <button onclick="nextQuestion()" class="mt-6 w-full ${quizState.selectedAns === q.ans ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-red-600 hover:bg-red-700'} text-white font-bold py-4 text-xl rounded-lg shadow-md transition transform hover:scale-[1.02]">我瞭解了，前往下一題 <i class="fas fa-arrow-right ml-2"></i></button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        };

        window.answerQuestion = (optIdx) => {
            const q = quizState.questions[quizState.currentQ];
            const isCorrect = optIdx === q.ans;
            
            quizState.selectedAns = optIdx;
            quizState.showExplanation = true;
            
            if (isCorrect) {
                playCorrectSound();
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#34d399', '#fbbf24', '#f87171', '#3b82f6']
                });
            } else {
                playWrongSound();
            }

            renderQuizView(el('main-content'));
        };

        window.nextQuestion = () => {
            const q = quizState.questions[quizState.currentQ];
            const isCorrect = quizState.selectedAns === q.ans;

            quizState.answers.push({
                q: q.q,
                opts: q.opts,
                userAns: quizState.selectedAns,
                correctAns: q.ans,
                isCorrect: isCorrect
            });

            if(isCorrect) quizState.score++;
            
            if(!isCorrect) {
                const mistakeId = q.q;
                const exists = userData.mistakes.find(m => m.id === mistakeId);
                if(!exists) {
                    userData.mistakes.push({
                        id: mistakeId,
                        q: q.q,
                        opts: q.opts,
                        ans: q.ans,
                        time: new Date().toISOString()
                    });
                    saveUserData();
                }
            }

            quizState.currentQ++;
            quizState.showExplanation = false;
            quizState.selectedAns = null;
            renderQuizView(el('main-content'));
        };

        const finishQuiz = async (container) => {
            quizState.active = false;
            const total = quizState.questions.length;
            const score = Math.round((quizState.score / total) * 100);
            
            if(isFirebaseInitialized && currentUser) {
                const docRef = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME + '_quizzes'));
                try {
                    await setDoc(docRef, { score, date: new Date(), total });
                } catch(e) { }
            }

            container.innerHTML = `
                <div class="w-full flex items-center justify-center p-6 overflow-y-auto mt-10">
                    <div class="bg-white p-12 rounded-xl shadow-xl text-center max-w-2xl border-t-8 border-blue-600">
                        <i class="fas fa-trophy text-8xl text-yellow-500 mb-6"></i>
                        <h2 class="text-4xl font-bold mb-4">測驗完成！</h2>
                        <p class="text-7xl font-extrabold text-blue-600 mb-8">${score} <span class="text-3xl text-gray-500">分</span></p>
                        <p class="text-gray-600 mb-8 text-2xl">您答對了 <span class="text-blue-600 font-bold">${quizState.score}</span> 題，共 ${total} 題。</p>
                        <div class="space-y-4">
                            <button onclick="switchTab('mistakes')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 text-xl rounded-lg shadow transition">查看錯題本</button>
                            <button onclick="startQuiz()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 px-6 text-xl rounded-lg shadow transition">重新測驗</button>
                        </div>
                    </div>
                </div>
            `;
        };

        // --- 錯題本 ---
        window.renderMistakes = (container) => {
            if(!container) container = el('main-content');
            
            if(userData.mistakes.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex items-center justify-center p-6 text-gray-400 flex-col mt-20">
                        <i class="fas fa-check-circle text-8xl mb-6 text-emerald-200"></i>
                        <p class="text-2xl font-bold">太棒了！目前沒有錯題紀錄。</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full p-6 md:p-10 overflow-y-auto">
                    <div class="max-w-4xl mx-auto">
                        <div class="flex justify-between items-center border-b-4 border-red-200 pb-4 mb-8">
                            <h2 class="text-3xl font-bold text-red-800"><i class="fas fa-book-dead mr-3"></i>錯題本</h2>
                            <button onclick="clearMistakes()" class="text-lg text-red-500 hover:text-red-700 font-bold underline">清空錯題</button>
                        </div>
                        <div class="space-y-6">
                            ${userData.mistakes.map((m, i) => `
                                <div class="bg-white p-6 md:p-8 rounded-xl shadow-md border-l-8 border-red-400">
                                    <h3 class="font-bold text-gray-800 mb-5 text-xl md:text-2xl">${i+1}. ${m.q}</h3>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-lg">
                                        ${m.opts.map((opt, idx) => `
                                            <div class="p-3 rounded-lg ${idx === m.ans ? 'bg-emerald-100 text-emerald-800 font-bold border-2 border-emerald-300 shadow-sm' : 'bg-gray-50 text-gray-500 border border-gray-200'}">
                                                ${String.fromCharCode(65+idx)}. ${opt}
                                                ${idx === m.ans ? '<i class="fas fa-check ml-2"></i>(正確答案)' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.clearMistakes = () => {
            if(confirm('確定要清空所有錯題紀錄嗎？')) {
                userData.mistakes = [];
                saveUserData();
                renderMistakes();
            }
        };

        // --- 我的最愛 ---
        window.renderFavorites = (container) => {
            if(!container) container = el('main-content');
            
            if(userData.favorites.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex items-center justify-center p-6 text-gray-400 flex-col mt-20">
                        <i class="fas fa-heart-broken text-8xl mb-6 text-pink-200"></i>
                        <p class="text-2xl font-bold">目前還沒有收藏任何項目。</p>
                        <p class="text-lg mt-3">到「學習區」點擊標題旁的愛心圖示即可收藏單元！</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full p-6 md:p-10 overflow-y-auto">
                    <div class="max-w-5xl mx-auto">
                        <h2 class="text-3xl font-bold text-pink-800 border-b-4 border-pink-200 pb-4 mb-8"><i class="fas fa-heart mr-3"></i>我的最愛 (單元收藏)</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            ${userData.favorites.map(favId => `
                                <div class="bg-white p-6 rounded-xl shadow-md border-2 border-pink-100 flex justify-between items-center group relative overflow-hidden transition-shadow hover:shadow-lg">
                                    <div class="absolute inset-0 bg-pink-50 transform translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                                    <span class="font-bold text-gray-800 z-10 text-xl md:text-2xl">${favId}</span>
                                    <button onclick="toggleFavorite('${favId}')" class="text-pink-500 hover:text-red-600 z-10 text-3xl"><i class="fas fa-heart"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        initApp();

    </script>
</body>
</html>
