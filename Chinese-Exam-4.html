                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) { console.log('Audio error:', e); }
        };

                    <h2 class="text-2xl font-bold text-wood-dark mb-6 border-b-2 border-amber-200 pb-2">${data.title}</h2>
                    <div class="text-gray-800 leading-relaxed">${data.content}</div>
                </div>
            `;
            // 更新愛心狀態
            setTimeout(() => {
                document.querySelectorAll('.fav-btn').forEach(btn => {
                    const id = btn.getAttribute('data-id');
                    if(userData.favorites.includes(id)) {
                        btn.classList.remove('text-gray-300');
                        btn.classList.add('text-red-500');
                    }
                });
            }, 0);
        };

        // --- 測驗區 ---
        const renderQuizView = (container) => {
            if(!quizState.active) {
                container.innerHTML = `
                    <div class="w-full flex items-center justify-center p-6">
                        <div class="bg-white p-8 rounded-xl shadow-md text-center max-w-md border-t-4 border-emerald-600">
                            <i class="fas fa-pencil-alt text-4xl text-emerald-600 mb-4"></i>
                            <h2 class="text-2xl font-bold mb-4">綜合測驗 (共100題)</h2>
                            <p class="text-gray-600 mb-6 text-sm">題目涵蓋課文結構、字音字形、成語、南北朝民歌比較等所有重點。挑戰自己是否完全吸收了！</p>
                            <button onclick="startQuiz()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-8 rounded-full shadow transition">開始測驗</button>
                        </div>
                    </div>
                `;
            } else {
                renderQuizQuestion(container);
            }
        };

        window.startQuiz = () => {
            // 隨機打亂100題
            const qList = [...generate100Questions()].sort(() => 0.5 - Math.random());
            quizState = { active: true, currentQ: 0, score: 0, answers: [], questions: qList, showExplanation: false, selectedAns: null };
            renderQuizView(el('main-content'));
        };

        const renderQuizQuestion = (container) => {
            const qIdx = quizState.currentQ;
            if(qIdx >= quizState.questions.length) {
                finishQuiz(container);
                return;
            }
            
            const q = quizState.questions[qIdx];
            const progress = ((qIdx) / quizState.questions.length) * 100;

            // 產生選項按鈕 HTML
            let optionsHtml = '';
            q.opts.forEach((opt, i) => {
                let btnClass = "w-full text-left p-4 rounded-lg border transition-all flex items-center group ";
                let iconHtml = `<span class="w-8 h-8 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center mr-4 font-bold transition-colors">${String.fromCharCode(65+i)}</span>`;
                
                if (!quizState.showExplanation) {
                    btnClass += "border-gray-300 hover:border-emerald-500 hover:bg-emerald-50 group-hover:bg-emerald-500 group-hover:text-white";
                } else {
                    if (i === q.ans) {
                        // 正確答案高亮綠色
                        btnClass += "border-emerald-500 bg-emerald-100 text-emerald-800 font-bold scale-100 shadow";
                        iconHtml = `<span class="w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center mr-4 font-bold"><i class="fas fa-check"></i></span>`;
                    } else if (i === quizState.selectedAns) {
                        // 點錯的選項顯示紅色
                        btnClass += "border-red-500 bg-red-50 text-red-800 font-bold scale-[0.98]";
                        iconHtml = `<span class="w-8 h-8 rounded-full bg-red-500 text-white flex items-center justify-center mr-4 font-bold"><i class="fas fa-times"></i></span>`;
                    } else {
                        // 未選到的錯誤答案變淡
                        btnClass += "border-gray-200 bg-gray-50 opacity-50";
                    }
                }

                optionsHtml += `
                    <button ${quizState.showExplanation ? 'disabled' : `onclick="answerQuestion(${i})"`} class="${btnClass}">
                        ${iconHtml}
                        <span>${opt}</span>
                    </button>
                `;
            });

            container.innerHTML = `
                <div class="w-full flex flex-col items-center p-6 overflow-y-auto">
                    <div class="w-full max-w-2xl bg-white rounded-xl shadow-md overflow-hidden">
                        <div class="bg-emerald-50 px-6 py-4 border-b border-emerald-100 flex justify-between items-center">
                            <span class="font-bold text-emerald-800">第 ${qIdx + 1} / 100 題</span>
                            <div class="w-1/2 bg-gray-200 rounded-full h-2">
                                <div class="bg-emerald-500 h-2 rounded-full transition-all duration-300" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        <div class="p-6 md:p-8">
                            <h3 class="text-xl font-bold text-gray-800 mb-6 leading-relaxed">${q.q}</h3>
                            <div class="space-y-3">
                                ${optionsHtml}
                            </div>
                            
                            ${quizState.showExplanation ? `
                                <div class="mt-6 p-5 rounded-lg border ${quizState.selectedAns === q.ans ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'} animate-fade-in shadow-inner">
                                    <div class="flex items-center mb-3">
                                        <i class="fas ${quizState.selectedAns === q.ans ? 'fa-check-circle text-emerald-500' : 'fa-times-circle text-red-500'} text-2xl mr-2"></i>
                                        <span class="font-bold text-xl">${quizState.selectedAns === q.ans ? '太棒了，答對了！' : '哎呀，答錯了！'}</span>
                                    </div>
                                    <div class="bg-white bg-opacity-60 p-3 rounded border ${quizState.selectedAns === q.ans ? 'border-emerald-100' : 'border-red-100'}">
                                        <p class="font-bold mb-1"><i class="fas fa-lightbulb text-yellow-500 mr-2"></i>完整題目解析：</p>
                                        <p class="mt-1">正確答案為 <strong class="${quizState.selectedAns === q.ans ? 'text-emerald-700' : 'text-red-700'}">(${String.fromCharCode(65+q.ans)}) ${q.opts[q.ans]}</strong>。</p>
                                        <p class="mt-2 text-sm opacity-90">此題源自您所學習的《木蘭詩》重點講義內容，建議可至「學習區」多加複習課文結構與字詞辨析來加深印象喔！</p>
                                    </div>
                                    <button onclick="nextQuestion()" class="mt-4 w-full ${quizState.selectedAns === q.ans ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-red-600 hover:bg-red-700'} text-white font-bold py-3 rounded-lg shadow-md transition transform hover:scale-[1.02]">我瞭解了，前往下一題 <i class="fas fa-arrow-right ml-1"></i></button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        };

        window.answerQuestion = (optIdx) => {
            const q = quizState.questions[quizState.currentQ];
            const isCorrect = optIdx === q.ans;
            
            // 設定顯示狀態
            quizState.selectedAns = optIdx;
            quizState.showExplanation = true;
            
            // 音效與特效
            if (isCorrect) {
                playCorrectSound();
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#34d399', '#fbbf24', '#f87171', '#3b82f6']
                });
            } else {
                playWrongSound();
            }

            renderQuizView(el('main-content'));
        };

        window.nextQuestion = () => {
            const q = quizState.questions[quizState.currentQ];
            const isCorrect = quizState.selectedAns === q.ans;

            quizState.answers.push({
                q: q.q,
                opts: q.opts,
                userAns: quizState.selectedAns,
                correctAns: q.ans,
                isCorrect: isCorrect
            });

            if(isCorrect) quizState.score++;
            
            // 如果答錯，加入錯題本
            if(!isCorrect) {
                const mistakeId = q.q; // 簡單用題目當ID
                const exists = userData.mistakes.find(m => m.id === mistakeId);
                if(!exists) {
                    userData.mistakes.push({
                        id: mistakeId,
                        q: q.q,
                        opts: q.opts,
                        ans: q.ans,
                        time: new Date().toISOString()
                    });
                    saveUserData();
                }
            }

            // 進入下一題並重置狀態
            quizState.currentQ++;
            quizState.showExplanation = false;
            quizState.selectedAns = null;
            renderQuizView(el('main-content'));
        };

        const finishQuiz = async (container) => {
            quizState.active = false;
            const total = quizState.questions.length;
            const score = Math.round((quizState.score / total) * 100);
            
            // 存入 Firebase
            if(isFirebaseInitialized && currentUser) {
                const docRef = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME + '_quizzes'));
                try {
                    await setDoc(docRef, { score, date: new Date(), total });
                } catch(e) { console.error("Save Quiz Error", e); }
            }

            container.innerHTML = `
                <div class="w-full flex items-center justify-center p-6 overflow-y-auto">
                    <div class="bg-white p-8 rounded-xl shadow-md text-center max-w-md border-t-4 border-blue-600">
                        <i class="fas fa-trophy text-6xl text-yellow-500 mb-4"></i>
                        <h2 class="text-3xl font-bold mb-2">測驗完成！</h2>
                        <p class="text-5xl font-extrabold text-blue-600 mb-6">${score} <span class="text-xl text-gray-500">分</span></p>
                        <p class="text-gray-600 mb-6">您答對了 ${quizState.score} 題，共 ${total} 題。</p>
                        <div class="space-y-3">
                            <button onclick="switchTab('mistakes')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition">查看錯題本</button>
                            <button onclick="startQuiz()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded transition">重新測驗</button>
                        </div>
                    </div>
                </div>
            `;
        };

        // --- 錯題本 ---
        window.renderMistakes = (container) => {
            if(!container) container = el('main-content');
            
            if(userData.mistakes.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex items-center justify-center p-6 text-gray-400 flex-col">
                        <i class="fas fa-check-circle text-6xl mb-4 text-emerald-200"></i>
                        <p class="text-lg">太棒了！目前沒有錯題紀錄。</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full p-6 overflow-y-auto">
                    <div class="max-w-3xl mx-auto">
                        <div class="flex justify-between items-center border-b-2 border-red-200 pb-2 mb-6">
                            <h2 class="text-2xl font-bold text-red-800"><i class="fas fa-book-dead mr-2"></i>錯題本</h2>
                            <button onclick="clearMistakes()" class="text-sm text-red-500 hover:text-red-700 underline">清空錯題</button>
                        </div>
                        <div class="space-y-4">
                            ${userData.mistakes.map((m, i) => `
                                <div class="bg-white p-5 rounded-lg shadow-sm border-l-4 border-red-400">
                                    <h3 class="font-bold text-gray-800 mb-3">${i+1}. ${m.q}</h3>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm">
                                        ${m.opts.map((opt, idx) => `
                                            <div class="p-2 rounded ${idx === m.ans ? 'bg-emerald-100 text-emerald-800 font-bold border border-emerald-300' : 'bg-gray-50 text-gray-500'}">
                                                ${String.fromCharCode(65+idx)}. ${opt}
                                                ${idx === m.ans ? '<i class="fas fa-check ml-2"></i>(正確答案)' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.clearMistakes = () => {
            if(confirm('確定要清空所有錯題紀錄嗎？')) {
                userData.mistakes = [];
                saveUserData();
                renderMistakes();
            }
        };

        // --- 我的最愛 ---
        window.renderFavorites = (container) => {
            if(!container) container = el('main-content');
            
            if(userData.favorites.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex items-center justify-center p-6 text-gray-400 flex-col">
                        <i class="fas fa-heart-broken text-6xl mb-4 text-pink-200"></i>
                        <p class="text-lg">目前還沒有收藏任何項目。</p>
                        <p class="text-sm mt-2">到「學習區」點擊愛心圖示即可收藏！</p>
                    </div>`;
                return;
            }

            // 簡單查找最愛內容的原始字串(為了顯示)
            const getFavText = (id) => {
                let found = "未知內容";
                const checkArr = [
                    "朔", "塑", "溯", "槊", "柝", "析", "拆", "折", "鬢", "鬚", "髻", "髟", "蘭", "欄", "攔", "瀾", "斕", "爛", "織", "識", "熾", "幟", "征", "怔", "症", "駿", "俊", "濺", "啾", "揪", "愀", "戎", "戊", "戍", "戌", "傍",
                    "女中豪傑", "不讓鬚眉", "詠絮之才", "秀外慧中", "小家碧玉", "蕙質蘭心", "綽約多姿", "閉月羞花", "沉魚落雁", "淡掃蛾眉", "不櫛進士",
                    "直搗黃龍", "南征北討", "勢如破竹", "窮兵黩武", "所向披靡", "槍林彈雨", "棄甲曳兵", "兵不血刃", "潰不成軍", "枕戈待旦", "狼煙四起", "追亡逐北", "兵臨城下", "化干戈為玉帛", "鐵馬金戈", "馬革裹屍", "兵馬倥偬", "投筆從戎"
                ];
                // 由於前面是動態生成的，這裡簡單對照
                // 若需完整內容可建立索引，為簡化單檔，此處只顯示被收藏的關鍵字
                return id; 
            };

            container.innerHTML = `
                <div class="w-full p-6 overflow-y-auto">
                    <div class="max-w-3xl mx-auto">
                        <h2 class="text-2xl font-bold text-pink-800 border-b-2 border-pink-200 pb-2 mb-6"><i class="fas fa-heart mr-2"></i>我的最愛</h2>
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                            ${userData.favorites.map(favId => `
                                <div class="bg-white p-4 rounded-lg shadow-sm border border-pink-100 flex justify-between items-center group relative overflow-hidden">
                                    <div class="absolute inset-0 bg-pink-50 transform translate-y-full group-hover:translate-y-0 transition-transform"></div>
                                    <span class="font-bold text-gray-800 z-10">${favId}</span>
                                    <button onclick="toggleFavorite('${favId}')" class="text-pink-500 hover:text-red-600 z-10"><i class="fas fa-heart"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        // 啟動應用
        initApp();

    </script>
</body>
</html>
